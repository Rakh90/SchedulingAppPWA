        const LINE_TYPE_ICONS = [
            { type: 'text', icon: 'T' },
            { type: 'bulleted', icon: '•' },
            { type: 'numbered', icon: '#' },
            { type: 'checklist', icon: '☐' },
        ];

        // Caps how deep a bulleted/numbered/checklist line can nest via the
        // empty-line Enter cycle — a handful of levels is already more than
        // useful on a phone-width screen.
        const MAX_LINE_INDENT = 4;
        const LINE_INDENT_PX = 22;

        // Column layout of the original fixed Mileage Table feature — still
        // the source of truth both for migrating pre-v103 notes (whose
        // `table` field had exactly these four columns) and for the one-tap
        // "Mileage" preset in the table creator.
        const MILEAGE_COLUMNS = ['Date', 'Start Point', 'End Point', 'Miles'];

        function makeMileageTable() {
            return {
                id: makeId(),
                name: 'Mileage Table',
                columns: MILEAGE_COLUMNS.map((colName, i) => ({
                    id: makeId(),
                    name: colName,
                    type: i === 0 ? 'date' : (i === MILEAGE_COLUMNS.length - 1 ? 'number' : 'text'),
                })),
                rows: [],
                collapsed: false,
            };
        }

        // Lossless, idempotent bridge from the pre-v103 single-mileage-table
        // note shape (`table` + `mileageCollapsed`) to the generic `tables`
        // array. Run everywhere a note or template is read from storage:
        // IndexedDB load, backup import, and both template-instantiation
        // paths. A note that already has a `tables` array (even an empty
        // one) is trusted as-is and never re-migrated.
        function migrateNoteTables(raw) {
            if (Array.isArray(raw.tables)) return raw.tables;
            if (raw.table) {
                return [{
                    ...makeMileageTable(),
                    // Rows reused verbatim (ids preserved); old template
                    // tables stored rows without ids, so backfill those.
                    rows: (raw.table.rows || []).map((r) => ({ id: r.id || makeId(), cells: [...r.cells] })),
                    collapsed: !!raw.mileageCollapsed,
                }];
            }
            return [];
        }

        function csvEscapeCell(value) {
            const s = String(value == null ? '' : value);
            return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
        }

        function tableToCsv(table) {
            const lines = [table.columns.map((c) => csvEscapeCell(c.name)).join(',')];
            table.rows.forEach((row) => lines.push(row.cells.map(csvEscapeCell).join(',')));
            return lines.join('\r\n');
        }

        function downloadTableCsv(table, noteTitle) {

                    blocks: d.blocks.map((b) => b.id === blockId
                        ? { ...b, type, checked: type === 'checklist' ? !!b.checked : false }
                        : b),
                }));
            };

            const setBlockSize = (blockId, size) => {
                const current = draft.blocks.find(b => b.id === blockId);
                if (current && (current.size || 'medium') === size) return;
                pushEditHistory();
                setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, size } : b) }));
            };

            // These "open" functions stash where a picked date should land in
            // dateTargetRef, then open the shared CalendarPickerSheet. An
            // earlier design overlaid a real, invisible native <input
            // type="date"> on each button instead — that worked on Android,
            // but went through several rounds of real-device iOS failures
            // (the native picker would flash open and immediately auto-close
            // with today's date) that survived every gesture-timing fix
            // tried. The sheet sidesteps that entire class of bug: it's just
            // another sheet, like the size menu or background picker, with
            // no native picker for iOS to quietly sabotage.
            const openDateSheetForBlock = () => {
                if (!editingBlockId) return;
                const el = document.querySelector('.block-editable[data-block-id="' + editingBlockId + '"]');
                if (!el) return;
                dateTargetRef.current = {
                    kind: 'block',
                    blockId: editingBlockId,
                    offset: getCaretCharOffset(el),
                    html: sanitizeInlineHtml(el.innerHTML),
                };
                setShowDatePickerSheet(true);
            };

            const openDateSheetForTitle = () => {
                const el = titleInputRef.current;
                if (!el) return;
                dateTargetRef.current = {
                    kind: 'title',
                    selStart: el.selectionStart == null ? draft.title.length : el.selectionStart,
                    selEnd: el.selectionEnd == null ? draft.title.length : el.selectionEnd,
                    value: draft.title,
                };
                setShowDatePickerSheet(true);
            };

            // One button (in the line toolbar) serves both the title field
            // and body lines. It uses onMouseDown+preventDefault, like every
            // other line-toolbar button, so document.activeElement is still
            // whichever of the two was actually focused when this runs —
            // reliably saying which one to target — and opening the sheet
            // never blurs the field in the first place.
            const openDateSheetSmart = () => {
                const active = document.activeElement;
                if (active && active.classList && active.classList.contains('editor-title-input')) {
                    openDateSheetForTitle();
                } else if (editingBlockId) {
                    openDateSheetForBlock();
                }
            };

            // Mirrors a table's "Today" button: if one of its date-typed
            // cells is currently focused, target it directly. Otherwise
            // leave rowId null and let applyPickedDate add a fresh row once
            // a date is actually picked.
            const openDateSheetForTable = (tableId) => {
                const ref = tableRefs.current[tableId];
                const active = ref && ref.getActiveDateCell ? ref.getActiveDateCell() : null;
                dateTargetRef.current = { kind: 'table', tableId, rowId: active ? active.rowId : null, colIdx: active ? active.colIdx : null };
                setShowDatePickerSheet(true);
            };

            // Applies the picked date to whichever target openDateSheetFor*
            // stashed in dateTargetRef — a body line (splicing into the plain
            // text at the saved caret offset, then re-wrapping in whatever
            // bold/italic/underline chain the line already had — formatting is
            // always whole-line, never partial, so this is safe), the title
            // field, or a table's date-typed cell. isoDateStr is the sheet's
            // own 'YYYY-MM-DD' value, or null if the sheet was dismissed
            // without picking anything.
            const applyPickedDate = (isoDateStr) => {
                setShowDatePickerSheet(false);
                const target = dateTargetRef.current;
                dateTargetRef.current = null;
                if (!isoDateStr || !target) return;
                const dateStr = new Date(isoDateStr + 'T00:00:00').toLocaleDateString();

                if (target.kind === 'block') {
                    const { blockId, html: sourceHtml } = target;
                    if (!draft.blocks.some(b => b.id === blockId)) return;
                    const plain = stripHtml(sourceHtml);
                    const offset = target.offset == null ? plain.length : Math.min(target.offset, plain.length);
                    const newPlain = plain.slice(0, offset) + dateStr + plain.slice(offset);
                    const chain = getWholeLineTagChain(sourceHtml);
                    const newHtml = wrapInTagChain(escapeHtml(newPlain), chain);
                    const caretTarget = offset + dateStr.length;
                    pushEditHistory();
                    setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, html: newHtml } : b) }));
                    // The day button in the sheet uses onMouseDown+preventDefault
                    // so the line normally never blurs out of edit mode while
                    // picking, but just in case: if the editable DOM node is
                    // still right there, update it directly —
                    // React won't otherwise touch a contentEditable's innerHTML on
                    // re-render, and the reseed effect below only fires on an edit
                    // mode *transition*, which won't happen if focus never left.
                    const liveEl = document.querySelector('.block-editable[data-block-id="' + blockId + '"]');
                    if (liveEl) {
                        liveEl.innerHTML = newHtml;
                        liveEl.focus();
                        setCaretCharOffset(liveEl, caretTarget);
                    } else {
                        pendingCaretOffsetRef.current = caretTarget;
                    }
                    setEditingBlockId(blockId);
                    return;
                }

                if (target.kind === 'title') {
                    const { selStart, selEnd, value } = target;
                    const newTitle = value.slice(0, selStart) + dateStr + value.slice(selEnd);
                    updateField('title', newTitle);
                    const caretTarget = selStart + dateStr.length;
                    // Same reasoning as the block case: refocus and restore
                    // the caret defensively, in case anything did blur it.
                    requestAnimationFrame(() => {
                        const el = titleInputRef.current;
                        if (el) { el.focus(); el.setSelectionRange(caretTarget, caretTarget); }
                    });
                    return;
                }

                if (target.kind === 'table') {
                    const table = (draft.tables || []).find(t => t.id === target.tableId);
                    if (!table) return;
                    if (target.rowId) {
                        pushEditHistory();
                        updateTableCell(target.tableId, target.rowId, target.colIdx, dateStr);
                        const rowIdx = table.rows.findIndex(r => r.id === target.rowId);
                        const ref = tableRefs.current[target.tableId];
                        if (rowIdx !== -1 && ref) {
                            ref.focusRowCell(rowIdx, Math.min(target.colIdx + 1, table.columns.length - 1));
                        }
                    } else {
                        // No cell was focused when the sheet opened — add a
                        // fresh row with the picked date already in its first
                        // date-typed column, and queue focus on the next cell
                        // (the effect below resolves it once the row renders).
                        const dateColIdx = table.columns.findIndex(c => c.type === 'date');
                        if (dateColIdx === -1) return;
                        const newRowId = makeId();
                        pushEditHistory();
                        setDraft((d) => ({
                            ...d,
                            tables: (d.tables || []).map(t => t.id === target.tableId
                                ? { ...t, rows: [...t.rows, { id: newRowId, cells: t.columns.map((c, i) => i === dateColIdx ? dateStr : '') }] }
                                : t),
                        }));
                        pendingTableFocusRef.current = { tableId: target.tableId, rowId: newRowId, colIdx: Math.min(dateColIdx + 1, table.columns.length - 1) };
                    }
                }
            };

            // Covers the case where something *did* blur the line out of edit
            // mode: re-entering edit mode from applyPickedDate re-triggers
            // BlockLine's own effect (which reseeds the DOM and places the
            // caret at the end) — this runs after that child effect and
            // moves the caret to just past the inserted date.
            useEffect(() => {
                if (pendingCaretOffsetRef.current == null || !editingBlockId) return;
                const el = document.querySelector('.block-editable[data-block-id="' + editingBlockId + '"]');
                if (el) setCaretCharOffset(el, pendingCaretOffsetRef.current);
                pendingCaretOffsetRef.current = null;
            }, [editingBlockId]);

            // Resolves a table focus-advance request queued against a row
            // that didn't exist as a rendered cell yet at the time it was
            // requested (see pendingTableFocusRef) — runs again on every
            // tables change until the row actually shows up.
            useEffect(() => {
                const pending = pendingTableFocusRef.current;
                if (!pending) return;
                const table = (draft.tables || []).find(t => t.id === pending.tableId);
                const ref = tableRefs.current[pending.tableId];
                if (!table || !ref) return;
                const rowIdx = table.rows.findIndex(r => r.id === pending.rowId);
                if (rowIdx === -1) return;
                ref.focusRowCell(rowIdx, pending.colIdx);
                pendingTableFocusRef.current = null;
            }, [draft.tables]);

            // Reads the live DOM (not stale React state) so a format toggle picks up
            // whatever was just typed, then writes the result straight back into the
            // DOM and refocuses — see the note above toggleWholeLineFormat for why
            // this avoids execCommand entirely.
            const toggleLineFormat = (tag) => {
                if (!editingBlockId) return;
                const el = document.querySelector('.block-editable');
                if (!el) return;
                const newHtml = sanitizeInlineHtml(toggleWholeLineFormat(el.innerHTML, tag));
                el.innerHTML = newHtml;
                el.focus();
                placeCursorAtDeepestEnd(el);
                const blockId = editingBlockId;
                pushEditHistory();
                setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, html: newHtml } : b) }));
            };

            // Master toggle: if all three are already on, turn all three off;
            // otherwise turn on whichever of the three aren't already active.
            const toggleAllFormats = () => {
                if (!editingBlockId) return;
                const el = document.querySelector('.block-editable');
                if (!el) return;
                const allActive = ['b', 'i', 'u'].every((tag) => hasWholeLineTag(el.innerHTML, tag));
                let html = el.innerHTML;
                ['b', 'i', 'u'].forEach((tag) => {
                    const has = hasWholeLineTag(html, tag);
                    if (allActive === has) {
                        html = toggleWholeLineFormat(html, tag);
                    }
                });
                const newHtml = sanitizeInlineHtml(html);
                el.innerHTML = newHtml;
                el.focus();
                placeCursorAtDeepestEnd(el);
                const blockId = editingBlockId;
                pushEditHistory();
                setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, html: newHtml } : b) }));
            };

            const toggleChecked = (blockId) => {
                // A drag release fires a synthetic click right after — swallow that
                // one so picking a checklist item up and dropping it never also
                // flips its checked state.
                if (justDraggedBlockRef.current) {
                    justDraggedBlockRef.current = false;
                    return;
                }
                pushEditHistory();
                setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, checked: !b.checked } : b) }));
            };

            // Resets the body text only — title, category, background,
            // tables, and photos are untouched.
            const clearAllBlocks = () => {
                pushEditHistory();
                setDraft((d) => ({ ...d, blocks: [{ id: makeId(), type: 'text', html: '' }] }));
                setEditingBlockId(null);
            };

            const copyContent = async () => {
                try {
                    await navigator.clipboard.writeText(noteToPlainText(draft));
                    if (copiedFlashTimer.current) clearTimeout(copiedFlashTimer.current);
                    setCopiedFlash(true);
                    copiedFlashTimer.current = setTimeout(() => setCopiedFlash(false), 1500);
                } catch (err) {
                    // Clipboard permission denied or unavailable — nothing
                    // useful to do beyond not pretending it worked.
                }
            };

            const reorderBlocks = (blocks, draggedId, targetId) => {
                const dragIdx = blocks.findIndex(b => b.id === draggedId);
                const targetIdx = blocks.findIndex(b => b.id === targetId);
                if (dragIdx === -1 || targetIdx === -1) return blocks;
                const reordered = [...blocks];
                const [moved] = reordered.splice(dragIdx, 1);
                reordered.splice(targetIdx, 0, moved);
                return reordered;
            };

            // Long-press-and-drag on a line's marker (checkbox/bullet/number)
            // reorders it — the same timer-based long-press-vs-tap trick used for
            // dragging note cards and category rows, so a quick tap still just
            // toggles the checkbox instead of starting a drag.
            const handleMarkerPointerDown = (e, blockId) => {
                e.currentTarget.setPointerCapture(e.pointerId);
                blockDragRef.current = { pointerId: e.pointerId, blockId, timer: null, dragging: false, startX: e.clientX, startY: e.clientY };
                blockDragRef.current.timer = setTimeout(() => {
                    blockDragRef.current.dragging = true;
                    setDraggingBlockId(blockId);
                    pushEditHistory();
                    if (navigator.vibrate) navigator.vibrate(12);
                }, 450);
            };

            const handleMarkerPointerMove = (e) => {
                if (blockDragRef.current.pointerId !== e.pointerId || !blockDragRef.current.blockId) return;
                if (!blockDragRef.current.dragging) {
                    const dx = Math.abs(e.clientX - blockDragRef.current.startX);
                    const dy = Math.abs(e.clientY - blockDragRef.current.startY);
                    if (dx > 14 || dy > 14) {
                        clearTimeout(blockDragRef.current.timer);
                        blockDragRef.current.blockId = null;
                    }
                    return;
                }
                e.preventDefault();
                const el = document.elementFromPoint(e.clientX, e.clientY);
                const rowEl = el && el.closest('[data-block-id]');
                const targetId = rowEl && rowEl.getAttribute('data-block-id');
                if (targetId && targetId !== blockDragRef.current.blockId) {
                    setDraft((d) => ({ ...d, blocks: reorderBlocks(d.blocks, blockDragRef.current.blockId, targetId) }));
                }
            };

            const handleMarkerPointerUp = () => {
                clearTimeout(blockDragRef.current.timer);
                if (blockDragRef.current.dragging) {
                    justDraggedBlockRef.current = true;
                }
                blockDragRef.current = { pointerId: null, blockId: null, timer: null, dragging: false, startX: 0, startY: 0 };
                setDraggingBlockId(null);
            };

            // Press-and-hold a line then drag up/down to highlight a
            // contiguous range for bulk reformatting or deletion. Same
            // timer-based long-press-vs-tap trick as the marker drag above,
            // but only live while lineSelectMode is on (see the state
            // declaration for why: touch-action:none has to be set from the
            // very start of the touch to reliably win the drag-vs-scroll
            // arbitration on a real touchscreen — this project already hit
            // that the hard way with note cards and line markers — so making
            // every line's full row always draggable like this would disable
            // normal scroll-by-touching-the-text everywhere in every note).
            const stopLineAutoScroll = () => {
                if (lineAutoScrollRef.current) {
                    clearInterval(lineAutoScrollRef.current);
                    lineAutoScrollRef.current = null;
                }
            };

            // Keeps whichever line the drag is currently over scrolled into
            // view — without this, dragging past the top or bottom edge of
            // the note while highlighting a range would just stop, with no
            // way to reach further lines without lifting your finger and
            // starting a new selection.
            const updateLineAutoScroll = (clientY) => {
                const body = editorBodyRef.current;
                if (!body) return;
                const rect = body.getBoundingClientRect();
                const EDGE = 56;
                const SPEED = 10;
                if (clientY < rect.top + EDGE) {
                    if (!lineAutoScrollRef.current) lineAutoScrollRef.current = setInterval(() => { body.scrollTop -= SPEED; }, 16);
                } else if (clientY > rect.bottom - EDGE) {
                    if (!lineAutoScrollRef.current) lineAutoScrollRef.current = setInterval(() => { body.scrollTop += SPEED; }, 16);
                } else {
                    stopLineAutoScroll();
                }
            };

            // Document-order union of a base id list with the contiguous
            // index range [a..b] — keeps selectedLineIdList free of dupes
            // and ordered the way the note reads.
            const unionWithRange = (baseIds, a, b) => {
                const lo = Math.min(a, b);
                const hi = Math.max(a, b);
                const idSet = new Set(baseIds);
                draft.blocks.forEach((blk, i) => { if (i >= lo && i <= hi) idSet.add(blk.id); });
                return draft.blocks.filter((blk) => idSet.has(blk.id)).map((blk) => blk.id);
            };

            const handleLineSelectPointerDown = (e, idx) => {
                e.currentTarget.setPointerCapture(e.pointerId);
                lineSelectDragRef.current = { pointerId: e.pointerId, active: false, scrolling: false, timer: null, startX: e.clientX, startY: e.clientY, lastY: e.clientY, anchorIdx: idx, baseIds: selectedLineIdList };
                lineSelectDragRef.current.timer = setTimeout(() => {
                    // Long-press: this line joins the existing selection (it
                    // does NOT replace it), and becomes the anchor of a
                    // possible follow-on drag.
                    lineSelectDragRef.current.active = true;
                    setSelectedLineIdList(unionWithRange(lineSelectDragRef.current.baseIds, idx, idx));
                    if (navigator.vibrate) navigator.vibrate(12);
                }, 350);
            };

            const handleLineSelectPointerMove = (e) => {
                const ref = lineSelectDragRef.current;
                if (ref.pointerId !== e.pointerId) return;
                // touch-action is 'none' on these rows (see rowSelectProps),
                // so nothing scrolls on its own — a swipe that never turns
                // into a long-press has to be driven manually here, same as
                // the near-edge auto-scroll below once a selection drag is
                // active.
                if (ref.scrolling) {
                    e.preventDefault();
                    const body = editorBodyRef.current;
                    if (body) body.scrollTop -= (e.clientY - ref.lastY);
                    ref.lastY = e.clientY;
                    return;
                }
                if (ref.anchorIdx === null) return;
                if (!ref.active) {
                    const dx = Math.abs(e.clientX - ref.startX);
                    const dy = Math.abs(e.clientY - ref.startY);
                    if (dx > 14 || dy > 14) {
                        clearTimeout(ref.timer);
                        ref.anchorIdx = null;
                        // Predominantly-vertical movement before the long-press
                        // fired means the user wanted to scroll, not select —
                        // hand the rest of this touch over to manual scrolling.
                        if (dy > dx) {
                            ref.scrolling = true;
                            ref.lastY = e.clientY;
                            const body = editorBodyRef.current;
                            if (body) body.scrollTop -= (e.clientY - ref.startY);
                        }
                    }
                    return;
                }
                e.preventDefault();
                updateLineAutoScroll(e.clientY);
                const el = document.elementFromPoint(e.clientX, e.clientY);
                const rowEl = el && el.closest('[data-block-id]');
                const targetId = rowEl && rowEl.getAttribute('data-block-id');
                if (targetId) {
                    const idx = draft.blocks.findIndex((b) => b.id === targetId);
                    if (idx !== -1) setSelectedLineIdList(unionWithRange(ref.baseIds, ref.anchorIdx, idx));
                }
            };

            const handleLineSelectPointerUp = (e, idx) => {
                const ref = lineSelectDragRef.current;
                clearTimeout(ref.timer);
                stopLineAutoScroll();
                // A quick tap (released before the long-press timer fired,
                // without wandering into a scroll) on an already-selected
                // line un-selects just that line. Tapping an unselected line
                // does nothing — adding is deliberate (long-press/drag) so a
                // stray tap can't quietly grow the selection.
                if (!ref.active && !ref.scrolling && ref.anchorIdx !== null && typeof idx === 'number') {
                    const block = draft.blocks[idx];
                    if (block && selectedLineIdList.includes(block.id)) {
                        setSelectedLineIdList((prev) => prev.filter((id) => id !== block.id));
                    }
                }
                lineSelectDragRef.current = { pointerId: null, active: false, scrolling: false, timer: null, startX: 0, startY: 0, lastY: 0, anchorIdx: null, baseIds: [] };
            };

            // The --keyboard-inset padding gives .editor-body room to scroll
            // into, but nothing actually scrolls it there on its own as text
            // is typed — a long wrapped line can push the caret down below
            // the keyboard with no automatic (or, it turns out, obvious
            // manual) way back to it. Runs on every keystroke instead of
            // just on keyboard open/close, since the caret keeps moving
            // while the keyboard itself stays put.
            const scrollRectIntoView = (rect) => {
                if (!rect || (rect.width === 0 && rect.height === 0)) return;
                const body = editorBodyRef.current;
                if (!body) return;
                const vv = window.visualViewport;
                const visibleTop = vv ? vv.offsetTop : 0;
                const visibleBottom = vv ? vv.offsetTop + vv.height : window.innerHeight;
                const margin = 16;
                if (rect.bottom > visibleBottom - margin) {
                    body.scrollTop += rect.bottom - (visibleBottom - margin);
                } else if (rect.top < visibleTop + margin) {
                    body.scrollTop -= (visibleTop + margin) - rect.top;
                }
            };

            const scrollCaretIntoView = () => {
                const sel = window.getSelection();
                if (!sel || sel.rangeCount === 0) return;
                const range = sel.getRangeAt(0);
                let rect = range.getBoundingClientRect();
                // A collapsed range at the very end of a text node can report
                // a zero-size rect in some browsers — fall back to the
                // container element's own rect, which is still close enough
                // to the caret to be useful here.
                if (rect.width === 0 && rect.height === 0) {
                    const node = range.startContainer;
                    const el = node.nodeType === Node.TEXT_NODE ? node.parentElement : node;
                    if (el && el.getBoundingClientRect) rect = el.getBoundingClientRect();
                }
                scrollRectIntoView(rect);
            };

            // Table cell inputs aren't part of the document Selection API the
            // way contentEditable blocks are, so scrollCaretIntoView never
            // covers them — and the visualViewport-driven fix elsewhere only
            // re-runs when the keyboard's inset actually changes size, which
            // it doesn't when the keyboard is already open and focus just
            // moves to a cell in a different (e.g. lower) table. Runs twice:
            // once right away for the common case, and once after a short
            // delay to correct for a keyboard that's still animating open
            // when this first fires (e.g. tapping straight into a table cell
            // from the dashboard with no keyboard up yet).
            const scrollFocusedCellIntoView = () => {
                const run = () => {
                    const el = document.activeElement;
                    if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) scrollRectIntoView(el.getBoundingClientRect());
                };
                requestAnimationFrame(run);
                setTimeout(run, 300);
            };

            // Filtered against the live blocks so ids of since-removed lines
            // can never leak into the bulk actions below.
            const selectedLineIds = selectedLineIdList.filter((id) => draft.blocks.some((b) => b.id === id));

            const applyTypeToSelection = (type) => {
                if (!selectedLineIds.length) return;
                pushEditHistory();
                setDraft((d) => ({
                    ...d,
                    blocks: d.blocks.map((b) => selectedLineIds.includes(b.id) ? { ...b, type, checked: type === 'checklist' ? !!b.checked : false } : b),
                }));
            };

            // Mirrors toggleAllFormats' logic for a single line: if every
            // selected line already has the tag, remove it from all of them;
            // otherwise add it to whichever ones don't have it yet, so one
            // tap always ends with the whole selection in a consistent state.
            const applyFormatToSelection = (tag) => {
                if (!selectedLineIds.length) return;
                const targets = draft.blocks.filter((b) => selectedLineIds.includes(b.id));
                const allActive = targets.every((b) => hasWholeLineTag(b.html, tag));
                pushEditHistory();
                setDraft((d) => ({
                    ...d,
                    blocks: d.blocks.map((b) => {
                        if (!selectedLineIds.includes(b.id)) return b;
                        const has = hasWholeLineTag(b.html, tag);
                        if (allActive !== has) return b;
                        return { ...b, html: sanitizeInlineHtml(toggleWholeLineFormat(b.html, tag)) };
                    }),
                }));
            };

            // Bulk version of toggleAllFormats: if every selected line already
            // has all three of b/i/u, strip all three from all of them;
            // otherwise add whichever of the three a line is missing, per line.
            const applyAllFormatsToSelection = () => {
                if (!selectedLineIds.length) return;
                const targets = draft.blocks.filter((b) => selectedLineIds.includes(b.id));
                const allActive = ['b', 'i', 'u'].every((tag) => targets.every((b) => hasWholeLineTag(b.html, tag)));
                pushEditHistory();
                setDraft((d) => ({
                    ...d,
                    blocks: d.blocks.map((b) => {
                        if (!selectedLineIds.includes(b.id)) return b;
                        let html = b.html;
                        ['b', 'i', 'u'].forEach((tag) => {
                            const has = hasWholeLineTag(html, tag);
                            if (allActive === has) html = toggleWholeLineFormat(html, tag);
                        });
                        return { ...b, html: sanitizeInlineHtml(html) };
                    }),
                }));
            };

            const deleteSelectedLines = () => {
                if (!selectedLineIds.length) return;
                pushEditHistory();
                setDraft((d) => {
                    const remaining = d.blocks.filter((b) => !selectedLineIds.includes(b.id));
                    return { ...d, blocks: remaining.length > 0 ? remaining : [{ id: makeId(), type: 'text', html: '' }] };
                });
                setSelectedLineIdList([]);
                setLineSelectMode(false);
                setEditingBlockId(null);
            };

            // Bulleted/numbered/checklist lines get a 3-stage Enter cycle on
            // an EMPTY line: 1st Enter (line has content) — normal, moves to
            // a new line of the same type/indent. 2nd Enter (that new line
            // is still empty) — indents it a level instead of adding yet
            // another line. 3rd Enter (still empty, already indented) —
            // gives up on the list and turns it into a plain text line.
            // emptyEnterRef distinguishes "1st time landing on this empty
            // line" from "2nd consecutive Enter on it", since a fresh empty
            // list line and an already-indented-but-still-empty one are
            // otherwise indistinguishable from block state alone. Reads the
            // live DOM (not draft.blocks) for the emptiness check — the
            // block's html in state doesn't get updated until blur/commit,
            // which BlockLine's onKeyDown does *just* before calling this,
            // but that update is async and hasn't landed in this closure's
            // `draft` yet.
            const handleEnter = (blockId) => {
                const current = draft.blocks.find(b => b.id === blockId);
                if (!current) return;
                const isListType = current.type === 'bulleted' || current.type === 'numbered' || current.type === 'checklist';
                const liveEl = document.querySelector('.block-editable[data-block-id="' + blockId + '"]');
                const isEmpty = stripHtml(liveEl ? liveEl.innerHTML : current.html).trim() === '';

                if (isListType && isEmpty) {
                    const alreadyIndentedThisLine = emptyEnterRef.current.blockId === blockId && emptyEnterRef.current.indented;
                    if (!alreadyIndentedThisLine) {
                        const nextIndent = Math.min((current.indent || 0) + 1, MAX_LINE_INDENT);
                        if (nextIndent !== (current.indent || 0)) {
                            pushEditHistory();
                            setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, indent: nextIndent } : b) }));
                        }
                        emptyEnterRef.current = { blockId, indented: true };
                        return;
                    }
                    pushEditHistory();
                    setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, type: 'text', indent: 0 } : b) }));
                    emptyEnterRef.current = { blockId: null, indented: false };
                    return;
                }

                emptyEnterRef.current = { blockId: null, indented: false };
                const newId = makeId();
                pushEditHistory();
                setDraft((d) => {
                    const idx = d.blocks.findIndex(b => b.id === blockId);
                    const blocks = [...d.blocks];
                    const chain = getWholeLineTagChain(current.html);
                    const newHtml = chain.length > 0 ? wrapInTagChain(ZWSP, chain) : '';
                    blocks.splice(idx + 1, 0, { id: newId, type: current.type, html: newHtml, checked: false, size: current.size, indent: current.indent });
                    return { ...d, blocks };
                });
                setEditingBlockId(newId);
            };

            // Mirrors the Enter cycle in reverse for an indented, empty
            // bulleted/numbered/checklist line: Backspace steps the indent
            // down one level at a time; once it's back at 0, the next
            // Backspace gives up on the list and converts it to plain text
            // (matching the Enter cycle's own "give up" step) — only once
            // it's a plain, unindented, empty text line does Backspace fall
            // through to the original behavior of deleting the line and
            // merging into the previous one.
            const handleBackspaceEmpty = (blockId) => {
                const current = draft.blocks.find(b => b.id === blockId);
                if (!current) return;
                // Any Backspace on an empty line invalidates whatever the
                // Enter cycle above was tracking for it — otherwise a stray
                // stale "already indented this line" flag could make the
                // *next* Enter press skip straight to converting to text
                // instead of indenting again.
                if (emptyEnterRef.current.blockId === blockId) emptyEnterRef.current = { blockId: null, indented: false };

                const isListType = current.type === 'bulleted' || current.type === 'numbered' || current.type === 'checklist';
                const indent = current.indent || 0;

                if (isListType && indent > 0) {
                    pushEditHistory();
                    setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, indent: indent - 1 } : b) }));
                    return;
                }
                if (isListType && indent === 0) {
                    pushEditHistory();
                    setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, type: 'text' } : b) }));
                    return;
                }

                if (draft.blocks.length <= 1) return;
                const idx = draft.blocks.findIndex(b => b.id === blockId);
                const nextFocusId = draft.blocks[idx - 1] ? draft.blocks[idx - 1].id : (draft.blocks[idx + 1] ? draft.blocks[idx + 1].id : null);
                pushEditHistory();
                setDraft((d) => ({ ...d, blocks: d.blocks.filter(b => b.id !== blockId) }));
                setEditingBlockId(nextFocusId);
            };

            // Reads the live DOM of the block currently being edited so we don't
            // rely on a stale React state snapshot when leaving edit mode.
            const getFlushedDraft = () => {
                const el = document.activeElement;
                if (el && el.classList && el.classList.contains('block-editable')) {
                    const blockId = el.getAttribute('data-block-id');
                    if (blockId) {
                        const clean = stripZeroWidthSpace(sanitizeInlineHtml(el.innerHTML));
                        return { ...draft, blocks: draft.blocks.map(b => b.id === blockId ? { ...b, html: clean } : b) };
                    }
                }
                return draft;
            };

            const handleAddPhotos = async (e) => {
                // The Files picker (unlike Gallery) has no accept restriction, so it
                // can return non-image files if someone browses into a folder full
                // of documents — filter those out instead of trying to render them.
                const files = Array.from(e.target.files || []).filter(f => f.type.startsWith('image/'));
                if (files.length === 0) return;
                pushEditHistory();
                setUploading(true);
                try {
                    const newPhotos = [];
                    for (const file of files) {
                        const raw = await readFileAsDataUrl(file);
                        const resized = await resizeImage(raw, 1280, 0.82);
                        newPhotos.push({ id: makeId(), dataUrl: resized });
                    }
                    setDraft((d) => ({ ...d, photos: [...d.photos, ...newPhotos] }));
                } finally {
                    setUploading(false);
                    if (cameraInputRef.current) cameraInputRef.current.value = '';
                    if (galleryInputRef.current) galleryInputRef.current.value = '';
                    if (filesInputRef.current) filesInputRef.current.value = '';
                }
            };

            const removePhoto = (id) => {
                pushEditHistory();
                setDraft((d) => ({ ...d, photos: d.photos.filter(p => p.id !== id) }));
            };

            // Replaces this note's content with a saved template's — reversible
            // via the Undo button, so there's no need for a separate "are you
            // sure" confirmation on top of that.
            const loadTemplateIntoDraft = (template) => {
                pushEditHistory();
                const blocks = (template.blocks && template.blocks.length > 0 ? template.blocks : [{ type: 'text', html: '' }])
                    .map((b) => ({ id: makeId(), type: b.type, html: b.html || '', checked: false }));
                const tables = migrateNoteTables(template).map((t) => ({
                    ...t,
                    id: makeId(),
                    columns: t.columns.map((c) => ({ ...c, id: makeId() })),
                    rows: t.rows.map((r) => ({ id: makeId(), cells: [...r.cells] })),
                    collapsed: !!t.collapsed,
                }));
                const photos = (template.photos || []).map((p) => ({ id: makeId(), dataUrl: p.dataUrl }));
                setDraft((d) => ({
                    ...d,
                    title: template.name || d.title,
                    blocks,
                    tables,
                    photos,
                    background: template.background || d.background,
                    categoryIds: (template.categoryIds && template.categoryIds.length > 0) ? template.categoryIds : d.categoryIds,
                }));
                setEditingBlockId(null);
                setShowTemplateMenu(false);
            };

            // Applies `updater` to one table in the draft's tables array,
            // leaving every other table untouched.
            const updateOneTable = (tableId, updater) => {
                setDraft((d) => ({ ...d, tables: (d.tables || []).map(t => t.id === tableId ? updater(t) : t) }));
            };

            const handleTableHandlePointerDown = (e, tableId) => {
                e.currentTarget.setPointerCapture(e.pointerId);
                tableDragRef.current = { pointerId: e.pointerId, tableId, moved: false };
                setDraggingTableId(tableId);
                if (navigator.vibrate) navigator.vibrate(12);
            };

            const handleTableHandlePointerMove = (e) => {
                if (tableDragRef.current.pointerId !== e.pointerId || !tableDragRef.current.tableId) return;
                e.preventDefault();
                const el = document.elementFromPoint(e.clientX, e.clientY);
                const rowEl = el && el.closest('[data-table-drag-id]');
                const targetId = rowEl && rowEl.getAttribute('data-table-drag-id');
                if (targetId && targetId !== tableDragRef.current.tableId) {
                    // One history entry per completed drag, pushed lazily on
                    // the first actual move so a no-op press doesn't pollute
                    // the undo stack.
                    if (!tableDragRef.current.moved) {
                        tableDragRef.current.moved = true;
                        pushEditHistory();
                    }
                    setDraft((d) => {
                        const tables = [...(d.tables || [])];
                        const dragIdx = tables.findIndex((t) => t.id === tableDragRef.current.tableId);
                        const targetIdx = tables.findIndex((t) => t.id === targetId);
                        if (dragIdx === -1 || targetIdx === -1) return d;
                        const [moved] = tables.splice(dragIdx, 1);
                        tables.splice(targetIdx, 0, moved);
                        return { ...d, tables };
                    });
                }
            };

            const handleTableHandlePointerUp = () => {
                tableDragRef.current = { pointerId: null, tableId: null, moved: false };
                setDraggingTableId(null);
            };

            // Collapse is a view preference, not a content edit — no history
            // entry, matching the old mileageCollapsed behavior.
            const toggleTableCollapsed = (tableId) => {
                updateOneTable(tableId, (t) => ({ ...t, collapsed: !t.collapsed }));
            };

            // Renames flow per keystroke; undo for them is covered by the
            // focus/blur snapshot pair below, not per-keystroke history.
            const renameTable = (tableId, name) => {
                updateOneTable(tableId, (t) => ({ ...t, name }));
            };

            const addTable = (tableObj) => {
                pushEditHistory();
                setDraft((d) => ({ ...d, tables: [...(d.tables || []), tableObj] }));
                setShowTableCreator(false);
            };

            const removeTable = (tableId) => {
                pushEditHistory();
                setDraft((d) => {
                    const tables = d.tables || [];
                    const index = tables.findIndex(t => t.id === tableId);
                    if (index === -1) return d;
                    if (removedTableToastTimer.current) clearTimeout(removedTableToastTimer.current);
                    setRemovedRowToast(null);
                    setRemovedTableToast({ table: tables[index], index });
                    removedTableToastTimer.current = setTimeout(() => setRemovedTableToast(null), 5000);
                    return { ...d, tables: tables.filter(t => t.id !== tableId) };
                });
            };

            const undoRemoveTable = () => {
                if (removedTableToastTimer.current) clearTimeout(removedTableToastTimer.current);
                const toast = removedTableToast;
                setRemovedTableToast(null);
                if (!toast) return;
                setDraft((d) => {
                    const tables = [...(d.tables || [])];
                    tables.splice(Math.min(toast.index, tables.length), 0, toast.table);
                    return { ...d, tables };
                });
            };

            // Replaces a table's column set (add/rename/retype/remove) and
            // re-aligns every row's cells by column id: surviving columns
            // keep their data at their new position, brand-new columns start
            // empty, and removed columns' data is dropped.
            const applyColumnEdits = (tableId, newColumns) => {
                pushEditHistory();
                updateOneTable(tableId, (t) => ({
                    ...t,
                    columns: newColumns,
                    rows: t.rows.map((r) => ({
                        ...r,
                        cells: newColumns.map((nc) => {
                            const oldIdx = t.columns.findIndex(c => c.id === nc.id);
                            return oldIdx === -1 ? '' : (r.cells[oldIdx] != null ? r.cells[oldIdx] : '');
                        }),
                    })),
                }));
                setColumnEditorTableId(null);
            };

            const addTableRow = (tableId) => {
                pushEditHistory();
                updateOneTable(tableId, (t) => ({ ...t, rows: [...t.rows, { id: makeId(), cells: t.columns.map(() => '') }] }));
            };

            // Used by a table's Today button when none of its date cells is
            // focused: rather than doing nothing, add a fresh row pre-filled
            // with today's date in its first date column.
            const addTableRowWithToday = (tableId) => {
                const table = (draft.tables || []).find(t => t.id === tableId);
                if (!table) return;
                const todayStr = new Date().toLocaleDateString();
                const dateColIdx = table.columns.findIndex(c => c.type === 'date');
                const newRowIdx = table.rows.length;
                pushEditHistory();
                updateOneTable(tableId, (t) => ({
                    ...t,
                    rows: [...t.rows, { id: makeId(), cells: t.columns.map((c, i) => i === dateColIdx ? todayStr : '') }],
                }));
                const ref = tableRefs.current[tableId];
                if (ref) {
                    ref.focusRowCell(newRowIdx, Math.min(dateColIdx + 1, table.columns.length - 1));
                }
            };

            const removeLastTableRow = (tableId) => {
                pushEditHistory();
                setDraft((d) => {
                    const table = (d.tables || []).find(t => t.id === tableId);
                    if (!table || table.rows.length === 0) return d;
                    const removed = table.rows[table.rows.length - 1];
                    if (removedRowToastTimer.current) clearTimeout(removedRowToastTimer.current);
                    setRemovedTableToast(null);
                    setRemovedRowToast({ tableId, row: removed });
                    removedRowToastTimer.current = setTimeout(() => setRemovedRowToast(null), 5000);
                    return { ...d, tables: d.tables.map(t => t.id === tableId ? { ...t, rows: t.rows.slice(0, -1) } : t) };
                });
            };

            const undoRemoveRow = () => {
                if (removedRowToastTimer.current) clearTimeout(removedRowToastTimer.current);
                const toast = removedRowToast;
                setRemovedRowToast(null);
                if (!toast) return;
                setDraft((d) => ({
                    ...d,
                    tables: (d.tables || []).map(t => t.id === toast.tableId ? { ...t, rows: [...t.rows, toast.row] } : t),
                }));
            };

            const updateTableCell = (tableId, rowId, cellIndex, value) => {
                updateOneTable(tableId, (t) => ({
                    ...t,
                    rows: t.rows.map(r => r.id === rowId
                        ? { ...r, cells: r.cells.map((c, i) => i === cellIndex ? value : c) }
                        : r),
                }));
            };

            const handleTableCellFocus = () => {
                tableEditSnapshotRef.current = { title: draft.title, blocks: draft.blocks, photos: draft.photos, background: draft.background, categoryIds: draft.categoryIds, tables: draft.tables };
                scrollFocusedCellIntoView();
            };

            const handleTableCellBlur = () => {
                const snapshot = tableEditSnapshotRef.current;
                tableEditSnapshotRef.current = null;
                if (snapshot && JSON.stringify(snapshot.tables) !== JSON.stringify(draft.tables)) {
                    editHistoryRef.current.push(snapshot);
                    if (editHistoryRef.current.length > 25) editHistoryRef.current.shift();
                    setCanUndoEdit(true);
                }
            };

            const handleBack = () => {
                const finalDraft = getFlushedDraft();
                onSave({ ...finalDraft, updatedAt: Date.now() });
                onBack();
            };

            const listNumbers = computeListNumbers(draft.blocks);
            const activeBlock = editingBlockId ? draft.blocks.find(b => b.id === editingBlockId) : null;
            const activeFormats = activeBlock
                ? { b: hasWholeLineTag(activeBlock.html, 'b'), i: hasWholeLineTag(activeBlock.html, 'i'), u: hasWholeLineTag(activeBlock.html, 'u') }
                : { b: false, i: false, u: false };

            const editorHeaderDark = isThemeDark(draft.background);
            const editorHeaderRainbow = isThemeRainbow(draft.background);
            const editorDefaultBadgeStyle = { background: headerBadgeBg(editorHeaderDark), color: headerIconColor(editorHeaderDark) };

            // Long-press any icon below to drag it into a new position — the
            // order is saved to settings, so it applies to every note.
            const editorIconDefs = {
                background: { className: 'icon-btn', style: editorDefaultBadgeStyle, title: 'Background', onClick: () => setShowBackgroundPicker(true), content: '🎨' },
                copy: { className: 'icon-btn', style: editorDefaultBadgeStyle, title: 'Copy content', onClick: copyContent, content: copiedFlash ? '✓' : '📋' },
                templates: isTemplate ? null : { className: 'icon-btn', style: editorDefaultBadgeStyle, title: 'Templates', onClick: () => setShowTemplateMenu(true), content: '📑' },
                pin: isTemplate ? null : {
                    className: 'icon-btn' + (draft.pinned ? ' active' : ''),
                    style: draft.pinned ? { background: 'rgba(102,126,234,0.85)', color: '#fff' } : editorDefaultBadgeStyle,
                    title: draft.pinned ? 'Unpin' : 'Pin to top',
                    onClick: () => updateField('pinned', !draft.pinned),
                    content: '📌',
                },
                trash: { className: 'icon-btn', style: { background: headerBadgeBg(editorHeaderDark), color: '#c5221f' }, title: isTemplate ? 'Delete template' : 'Move to trash', onClick: () => setConfirmTrash(true), content: '🗑' },
                lock: isTemplate ? null : {
                    className: 'icon-btn' + (draft.locked ? ' active' : ''),
                    style: draft.locked ? { background: 'rgba(102,126,234,0.85)', color: '#fff' } : editorDefaultBadgeStyle,
                    title: draft.locked ? 'Unlock' : 'Lock',
                    onClick: () => { if (hasPin) { updateField('locked', !draft.locked); } else { setShowPinSetup(true); } },
                    content: draft.locked ? '🔒' : '🔓',
                },
            };

            return (
                <div className={'editor-screen' + (editorHeaderDark ? ' dark-content' : '') + (editorHeaderRainbow ? ' theme-rainbow' : '')} style={resolvePageBackground(draft.background)}>
                    <div className="editor-header" style={resolveHeaderBackground(draft.background)}>
                        <button className="icon-btn" style={{ background: headerBadgeBg(editorHeaderDark), color: headerIconColor(editorHeaderDark) }} onClick={handleBack}>←</button>
                        <div className="editor-header-actions">
                            {resolvedEditorIconOrder.map((id) => {
                                const def = editorIconDefs[id];
                                if (!def) return null;
                                return (
                                    <button
                                        key={id}
                                        className={def.className + (editorIconDrag.draggingId === id ? ' dragging' : '')}
                                        style={def.style}
                                        title={def.title}
                                        onClick={editorIconDrag.wrapClick(def.onClick)}
                                        {...editorIconDrag.getDragProps(id)}
                                    >
                                        {def.content}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                    <div className={'editor-body' + (keyboardActive ? ' keyboard-active' : '')} ref={editorBodyRef} style={resolvePageBackground(draft.background)}>
                        <form autoComplete="off" onSubmit={(e) => e.preventDefault()} style={{ display: 'contents' }}>
                            <input
                                ref={titleInputRef}
                                className="editor-title-input"
                                autoComplete="note-title-nofill"
                                data-lpignore="true"
                                data-form-type="other"
                                placeholder={isTemplate ? 'Template name' : 'Title'}
                                value={draft.title}
                                onChange={(e) => updateField('title', e.target.value)}
                                onFocus={() => {
                                    setTitleFocused(true);
                                    titleEditSnapshotRef.current = { title: draft.title, blocks: draft.blocks, photos: draft.photos, background: draft.background, categoryIds: draft.categoryIds, tables: draft.tables };
                                }}
                                onBlur={() => {
                                    setTitleFocused(false);
                                    const snapshot = titleEditSnapshotRef.current;
                                    titleEditSnapshotRef.current = null;
                                    if (snapshot && snapshot.title !== draft.title) {
                                        editHistoryRef.current.push(snapshot);
                                        if (editHistoryRef.current.length > 25) editHistoryRef.current.shift();
                                        setCanUndoEdit(true);
                                    }
                                }}
                                autoFocus={note.title === ''}
                            />
                        </form>

                        <div className="editor-meta-row">
                            {lineSelectMode ? (
                                <LineSelectionToolbar
                                    count={selectedLineIds.length}
                                    uniformType={(() => {
                                        if (!selectedLineIds.length) return null;
                                        const selBlocks = draft.blocks.filter((b) => selectedLineIds.includes(b.id));
                                        return selBlocks.every((b) => b.type === selBlocks[0].type) ? selBlocks[0].type : null;
                                    })()}
                                    activeFormats={(() => {
                                        const selBlocks = draft.blocks.filter((b) => selectedLineIds.includes(b.id));
                                        if (!selBlocks.length) return { b: false, i: false, u: false };
                                        return {
                                            b: selBlocks.every((blk) => hasWholeLineTag(blk.html, 'b')),
                                            i: selBlocks.every((blk) => hasWholeLineTag(blk.html, 'i')),
                                            u: selBlocks.every((blk) => hasWholeLineTag(blk.html, 'u')),
                                        };
                                    })()}
                                    onSetType={applyTypeToSelection}
                                    onFormat={applyFormatToSelection}
                                    onFormatAll={applyAllFormatsToSelection}
                                    onDelete={deleteSelectedLines}
                                    onDone={() => { setLineSelectMode(false); setSelectedLineIdList([]); }}
                                />
                            ) : (
                                <React.Fragment>
                                    <button
                                        type="button"
                                        className="category-select"
                                        onClick={() => setShowCategoryPicker(true)}
                                    >
                                        {draft.categoryIds && draft.categoryIds.length > 0 ? (
                                            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                                                {draft.categoryIds.map((id) => {
                                                    const cat = categories.find(c => c.id === id);
                                                    return cat ? <span key={id} className="color-dot" style={{ background: cat.color }}></span> : null;
                                                })}
                                                {draft.categoryIds.length === 1
                                                    ? (categories.find(c => c.id === draft.categoryIds[0]) || {}).name
                                                    : draft.categoryIds.length + ' categories'}
                                            </span>
                                        ) : 'Uncategorized'}
                                    </button>
                                    <LineToolbar
                                        hasActiveLine={!!editingBlockId}
                                        dateAvailable={!!editingBlockId || titleFocused}
                                        activeType={activeBlock ? activeBlock.type : null}
                                        activeFormats={activeFormats}
                                        onFormat={toggleLineFormat}
                                        onToggleAllFormats={toggleAllFormats}
                                        onSetType={(type) => setBlockType(editingBlockId, type)}
                                        onOpenSizeMenu={() => setTextSizeMenuBlockId(editingBlockId)}
                                        onOpenDatePicker={openDateSheetSmart}
                                        onEnterSelectMode={() => {
                                            // Entering select mode clears editingBlockId directly rather
                                            // than blurring the field (this button uses onMouseDown +
                                            // preventDefault, same as every other toolbar button, so the
                                            // browser's own blur never fires) — so whatever's been typed
                                            // since the last commit (blur/Enter) has to be flushed to
                                            // draft.blocks here, or it's just discarded when the
                                            // contentEditable unmounts.
                                            if (editingBlockId) {
                                                const el = document.querySelector('.block-editable');
                                                if (el) commitBlockHtml(editingBlockId, el.innerHTML);
                                            }
                                            setLineSelectMode(true);
                                            setSelectedLineIdList([]);
                                            setEditingBlockId(null);
                                        }}
                                        onDismissKeyboard={() => { if (document.activeElement) document.activeElement.blur(); }}
                                        canUndo={canUndoEdit}
                                        onUndo={undoLastEdit}
                                    />
                                </React.Fragment>
                            )}
                        </div>

                        {draft.blocks.some(b => stripHtml(b.html).trim()) ? (
                            <button className="clear-body-btn" onClick={() => setConfirmClearAll(true)}>Clear</button>
                        ) : null}

                        <div className="list-items">
                            {draft.blocks.map((block, idx) => (
                                <BlockLine
                                    key={block.id}
                                    block={block}
                                    idx={idx}
                                    isEditing={editingBlockId === block.id}
                                    isDragging={draggingBlockId === block.id}
                                    listNumber={listNumbers[idx]}
                                    onStartEdit={() => setEditingBlockId(block.id)}
                                    onExitEdit={(id) => setEditingBlockId((current) => current === id ? null : current)}
                                    onCommit={commitBlockHtml}
                                    onEnter={handleEnter}
                                    onBackspaceEmpty={handleBackspaceEmpty}
                                    onToggleChecked={toggleChecked}
                                    onMarkerPointerDown={handleMarkerPointerDown}
                                    onMarkerPointerMove={handleMarkerPointerMove}
                                    onMarkerPointerUp={handleMarkerPointerUp}
                                    selectMode={lineSelectMode}
                                    isSelected={selectedLineIds.includes(block.id)}
                                    onLineSelectPointerDown={handleLineSelectPointerDown}
                                    onLineSelectPointerMove={handleLineSelectPointerMove}
                                    onLineSelectPointerUp={handleLineSelectPointerUp}
                                    onCaretMove={scrollCaretIntoView}
                                />
                            ))}
                        </div>

                        {(draft.tables || []).map((table) => {
                            const hasDateColumn = table.columns.some((c) => c.type === 'date');
                            return (
                                <React.Fragment key={table.id}>
                                    <div
                                        className={'section-label-row' + (draggingTableId === table.id ? ' dragging' : '')}
                                        data-table-drag-id={table.id}
                                    >
                                        {(draft.tables || []).length > 1 ? (
                                            <span
                                                className="category-drag-handle"
                                                title="Drag to reorder tables"
                                                // zIndex keeps the handle's own hit area on top of the
                                                // collapse button's negative-margin hit slop, which
                                                // otherwise overlaps (and would steal) the handle's
                                                // right edge.
                                                style={{ touchAction: 'none', position: 'relative', zIndex: 1, padding: '10px 6px', margin: '-10px 0' }}
                                                onPointerDown={(e) => handleTableHandlePointerDown(e, table.id)}
                                                onPointerMove={handleTableHandlePointerMove}
                                                onPointerUp={handleTableHandlePointerUp}
                                                onPointerCancel={handleTableHandlePointerUp}
                                            ><DragHandleIcon /></span>
                                        ) : null}
                                        <button
                                            type="button"
                                            className="section-collapse-btn"
                                            onClick={() => toggleTableCollapsed(table.id)}
                                            title={table.collapsed ? 'Expand table' : 'Minimize table'}
                                        >
