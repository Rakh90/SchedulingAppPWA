                            />
                        </form>
                        <div className="btn-row">
                            <button className="secondary-btn" onClick={onCancel}>Cancel</button>
                            <button className="primary-btn" onClick={() => { if (value.trim()) onConfirm(value.trim()); }}>{confirmLabel}</button>
                        </div>
                    </div>
                </div>
            );
        }

        function TemplatePickerSheet({ background, templates, onPick, onDeleteTemplate, onClose }) {
            const dark = isThemeDark(background);
            return (
                <div className="sheet-backdrop" onClick={onClose}>
                    <div className={'sheet' + (dark ? ' dark-content' : '')} style={resolvePageBackground(background)} onClick={(e) => e.stopPropagation()}>
                        <h2>New note</h2>
                        <button className="category-picker-row" onClick={() => onPick(null)}>
                            <span className="category-picker-name">📝 Blank note</span>
                        </button>
                        {BUILT_IN_TEMPLATES.map((t) => (
                            <button key={t.id} className="category-picker-row" onClick={() => onPick(t)}>
                                <span className="category-picker-name">🧾 {t.name}</span>
                            </button>
                        ))}
                        {templates.map((t) => (
                            <div className="category-manager-row" key={t.id}>
                                <button
                                    type="button"
                                    onClick={() => onPick(t)}
                                    style={{ flex: 1, textAlign: 'left', background: 'transparent', border: 'none', font: 'inherit', color: 'inherit', padding: '4px 0' }}
                                >
                                    📄 {t.name}
                                </button>
                                <button className="small-icon-btn" onClick={() => onDeleteTemplate(t.id)}>✕</button>
                            </div>
                        ))}
                        {templates.length === 0 ? (
                            <p className="sheet-muted-text" style={{ fontSize: 12, marginTop: 10 }}>Save any note as a template (see the Templates section inside a note) to see it here.</p>
                        ) : null}
                    </div>
                </div>
            );
        }

        const LINE_TYPE_ICONS = [
            { type: 'text', icon: 'T' },
            { type: 'bulleted', icon: '•' },
            { type: 'numbered', icon: '#' },
            { type: 'checklist', icon: '☐' },
        ];

        const MILEAGE_COLUMNS = ['Date', 'Start Point', 'End Point', 'Miles'];

        function csvEscapeCell(value) {
            const s = String(value == null ? '' : value);
            return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
        }

        function mileageTableToCsv(table) {
            const lines = [MILEAGE_COLUMNS.map(csvEscapeCell).join(',')];
            table.rows.forEach((row) => lines.push(row.cells.map(csvEscapeCell).join(',')));
            return lines.join('\r\n');
        }

        function downloadMileageCsv(table, noteTitle) {
            const csv = mileageTableToCsv(table);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const safeName = (noteTitle || 'mileage').trim().replace(/[^a-z0-9\-_ ]/gi, '').trim() || 'mileage';
            const a = document.createElement('a');
            a.href = url;
            a.download = safeName + '-mileage.csv';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Always-visible row next to the category dropdown that acts on whichever
        // line currently has editing focus. Every button uses onMouseDown +
        // preventDefault so tapping it never blurs (and thus never loses) the
        // active line — the same trick that keeps a text selection alive for
        // execCommand.
        function LineToolbar({ hasActiveLine, activeType, activeFormats, onFormat, onToggleAllFormats, onSetType }) {
            const runFormat = (tag) => (e) => {
                e.preventDefault();
                if (!hasActiveLine) return;
                onFormat(tag);
            };
            const runToggleAll = (e) => {
                e.preventDefault();
                if (!hasActiveLine) return;
                onToggleAllFormats();
            };
            // Pressing the already-active bullet/#/checkbox button again turns
            // the line back into plain text instead of just re-applying itself.
            const runType = (type) => (e) => {
                e.preventDefault();
                if (!hasActiveLine) return;
                onSetType(activeType === type && type !== 'text' ? 'text' : type);
            };
            const allActive = activeFormats.b && activeFormats.i && activeFormats.u;
            return (
                <div className="line-toolbar">
                    <button className={'line-toolbar-btn' + (activeFormats.b ? ' active' : '')} disabled={!hasActiveLine} onMouseDown={runFormat('b')} title="Bold"><b>B</b></button>
                    <button className={'line-toolbar-btn' + (activeFormats.i ? ' active' : '')} disabled={!hasActiveLine} onMouseDown={runFormat('i')} title="Italic"><i>I</i></button>
                    <button className={'line-toolbar-btn' + (activeFormats.u ? ' active' : '')} disabled={!hasActiveLine} onMouseDown={runFormat('u')} title="Underline"><u>U</u></button>
                    <button className={'line-toolbar-btn line-toolbar-btn-all' + (allActive ? ' active' : '')} disabled={!hasActiveLine} onMouseDown={runToggleAll} title="Toggle all formats">BIU</button>
                    <span className="line-toolbar-divider"></span>
                    {LINE_TYPE_ICONS.map(({ type, icon }) => (
                        <button
                            key={type}
                            className={'line-toolbar-btn' + (activeType === type ? ' active' : '')}
                            disabled={!hasActiveLine}
                            onMouseDown={runType(type)}
                            title={type}
                        >
                            {icon}
                        </button>
                    ))}
                </div>
            );
        }

        function BlockLine({ block, isEditing, listNumber, isDragging, onStartEdit, onExitEdit, onCommit, onEnter, onBackspaceEmpty, onToggleChecked, onMarkerPointerDown, onMarkerPointerMove, onMarkerPointerUp }) {
            const editableRef = useRef(null);

            // Re-seed the contentEditable's DOM content every time this block enters
            // edit mode (not just on first mount) — otherwise re-opening a line for a
            // second edit would wipe it back to whatever it held the very first time.
            useEffect(() => {
                if (isEditing && editableRef.current) {
                    const el = editableRef.current;
                    el.innerHTML = block.html;
                    el.focus();
                    placeCursorAtDeepestEnd(el);
                }
            }, [isEditing]);

            const handleBlur = (e) => {
                onCommit(block.id, e.currentTarget.innerHTML);
                // Only clear edit state if it's still pointing at this block — Enter
                // may have already moved it to a newly created block by the time this
                // (async, focus-shift-triggered) blur fires.
                onExitEdit(block.id);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    onCommit(block.id, e.currentTarget.innerHTML);
                    onEnter(block.id);
                } else if (e.key === 'Backspace') {
                    const empty = e.currentTarget.innerText.trim() === '';
                    if (empty) {
                        e.preventDefault();
                        onBackspaceEmpty(block.id);
                    }
                }
            };

            // A press-and-hold on the marker (checkbox/bullet/number) reorders the
            // line, exactly like a quick tap still toggles the checkbox — the same
            // long-press-vs-tap trick used for dragging note cards and category
            // rows. This keeps the text itself untouched by drag handling entirely.
            const markerDragProps = {
                style: { touchAction: 'none' },
                onPointerDown: (e) => onMarkerPointerDown(e, block.id),
                onPointerMove: onMarkerPointerMove,
                onPointerUp: onMarkerPointerUp,
                onPointerCancel: onMarkerPointerUp,
            };

            const marker = block.type === 'checklist' ? (
                <button
                    className={'checkbox-marker' + (block.checked ? ' checked' : '')}
                    onMouseDown={(e) => e.preventDefault()}
                    onClick={() => onToggleChecked(block.id)}
                    {...markerDragProps}
                >
                    {block.checked ? '✓' : ''}
                </button>
            ) : block.type === 'numbered' ? (
                <span className="list-item-marker" {...markerDragProps}>{listNumber}.</span>
            ) : block.type === 'bulleted' ? (
                <span className="list-item-marker" {...markerDragProps}>•</span>
            ) : (
                <span className="list-item-marker" {...markerDragProps}></span>
            );

            return (
                <div className={'block-row' + (isDragging ? ' dragging' : '')} data-block-id={block.id}>
                    {marker}
                    {isEditing ? (
                        <div
                            ref={editableRef}
                            className="block-editable"
                            data-block-id={block.id}
                            contentEditable
                            suppressContentEditableWarning
                            onBlur={handleBlur}
                            onKeyDown={handleKeyDown}
                        />
                    ) : (
                        <div
                            className={'block-display' + (block.type === 'checklist' && block.checked ? ' checked' : '')}
                            onClick={(e) => { if (e.target.tagName === 'A') return; onStartEdit(); }}
                            dangerouslySetInnerHTML={{ __html: stripHtml(block.html).trim() ? linkify(block.html) : '<span class="block-placeholder">List item</span>' }}
                        />
                    )}
                </div>
            );
        }

        function NoteEditor({ note, categories, onBack, onSave, onTrash, onAddCategory, onSaveTemplate }) {
            const [draft, setDraft] = useState(note);
            const [editingBlockId, setEditingBlockId] = useState(null);
            const [confirmTrash, setConfirmTrash] = useState(false);
            const [previewPhoto, setPreviewPhoto] = useState(null);
            const [uploading, setUploading] = useState(false);
            const [dateCellActive, setDateCellActive] = useState(false);
            const [confirmRemoveRow, setConfirmRemoveRow] = useState(false);
            const [removedRowToast, setRemovedRowToast] = useState(null);
            const [showCategoryPicker, setShowCategoryPicker] = useState(false);
            const [showSaveTemplate, setShowSaveTemplate] = useState(false);
            const [draggingBlockId, setDraggingBlockId] = useState(null);
            const cameraInputRef = useRef(null);
            const galleryInputRef = useRef(null);
            const filesInputRef = useRef(null);
            const mileageTableRef = useRef(null);
            const saveTimer = useRef(null);
            const removedRowToastTimer = useRef(null);
            const blockDragRef = useRef({ pointerId: null, blockId: null, timer: null, dragging: false, startX: 0, startY: 0 });
            const justDraggedBlockRef = useRef(false);
            // In-memory-only undo stack for this editing session (not persisted) —
            // one snapshot per line-level action (a line committed, added, removed,
            // retyped, reformatted, checked, reordered, or a photo added/removed),
            // not per keystroke.
            const editHistoryRef = useRef([]);
            const [canUndoEdit, setCanUndoEdit] = useState(false);

            useEffect(() => {
                if (saveTimer.current) clearTimeout(saveTimer.current);
                saveTimer.current = setTimeout(() => {
                    onSave({ ...draft, updatedAt: Date.now() });
                }, 350);
                return () => clearTimeout(saveTimer.current);
            }, [draft]);

            const updateField = (field, value) => setDraft((d) => ({ ...d, [field]: value }));

            // Call before applying a line-level change to snapshot what the note
            // looked like just prior, so undoLastEdit can step back to it.
            const pushEditHistory = () => {
                editHistoryRef.current.push({ blocks: draft.blocks, photos: draft.photos });
                if (editHistoryRef.current.length > 25) editHistoryRef.current.shift();
                setCanUndoEdit(true);
            };

            const undoLastEdit = () => {
                const prev = editHistoryRef.current.pop();
                if (!prev) return;
                setDraft((d) => ({ ...d, blocks: prev.blocks, photos: prev.photos }));
                setEditingBlockId(null);
                setCanUndoEdit(editHistoryRef.current.length > 0);
            };

            const toggleDraftCategory = (id) => {
                setDraft((d) => {
                    const current = d.categoryIds || [];
                    const next = current.includes(id) ? current.filter(c => c !== id) : [...current, id];
                    return { ...d, categoryIds: next };
                });
            };

            const createAndSelectCategory = (name, color) => {
                const id = onAddCategory(name, color);
                setDraft((d) => ({ ...d, categoryIds: [...(d.categoryIds || []), id] }));
            };

            const commitBlockHtml = (blockId, rawHtml) => {
                const clean = stripZeroWidthSpace(sanitizeInlineHtml(rawHtml));
                const current = draft.blocks.find(b => b.id === blockId);
                if (current && current.html === clean) return;
                pushEditHistory();
                setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, html: clean } : b) }));
            };

            const setBlockType = (blockId, type) => {
                const current = draft.blocks.find(b => b.id === blockId);
                if (current && current.type === type) return;
                pushEditHistory();
                setDraft((d) => ({
                    ...d,
                    blocks: d.blocks.map((b) => b.id === blockId
                        ? { ...b, type, checked: type === 'checklist' ? !!b.checked : false }
                        : b),
                }));
            };

            // Reads the live DOM (not stale React state) so a format toggle picks up
            // whatever was just typed, then writes the result straight back into the
            // DOM and refocuses — see the note above toggleWholeLineFormat for why
            // this avoids execCommand entirely.
            const toggleLineFormat = (tag) => {
                if (!editingBlockId) return;
                const el = document.querySelector('.block-editable');
                if (!el) return;
                const newHtml = sanitizeInlineHtml(toggleWholeLineFormat(el.innerHTML, tag));
                el.innerHTML = newHtml;
                el.focus();
                placeCursorAtDeepestEnd(el);
                const blockId = editingBlockId;
                pushEditHistory();
                setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, html: newHtml } : b) }));
            };

            // Master toggle: if all three are already on, turn all three off;
            // otherwise turn on whichever of the three aren't already active.
            const toggleAllFormats = () => {
                if (!editingBlockId) return;
                const el = document.querySelector('.block-editable');
                if (!el) return;
                const allActive = ['b', 'i', 'u'].every((tag) => hasWholeLineTag(el.innerHTML, tag));
                let html = el.innerHTML;
                ['b', 'i', 'u'].forEach((tag) => {
                    const has = hasWholeLineTag(html, tag);
                    if (allActive === has) {
                        html = toggleWholeLineFormat(html, tag);
                    }
                });
                const newHtml = sanitizeInlineHtml(html);
                el.innerHTML = newHtml;
                el.focus();
                placeCursorAtDeepestEnd(el);
                const blockId = editingBlockId;
                pushEditHistory();
                setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, html: newHtml } : b) }));
            };

            const toggleChecked = (blockId) => {
                // A drag release fires a synthetic click right after — swallow that
                // one so picking a checklist item up and dropping it never also
                // flips its checked state.
                if (justDraggedBlockRef.current) {
                    justDraggedBlockRef.current = false;
                    return;
                }
                pushEditHistory();
                setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, checked: !b.checked } : b) }));
            };

            const reorderBlocks = (blocks, draggedId, targetId) => {
                const dragIdx = blocks.findIndex(b => b.id === draggedId);
                const targetIdx = blocks.findIndex(b => b.id === targetId);
                if (dragIdx === -1 || targetIdx === -1) return blocks;
                const reordered = [...blocks];
                const [moved] = reordered.splice(dragIdx, 1);
                reordered.splice(targetIdx, 0, moved);
                return reordered;
            };

            // Long-press-and-drag on a line's marker (checkbox/bullet/number)
            // reorders it — the same timer-based long-press-vs-tap trick used for
            // dragging note cards and category rows, so a quick tap still just
            // toggles the checkbox instead of starting a drag.
            const handleMarkerPointerDown = (e, blockId) => {
                e.currentTarget.setPointerCapture(e.pointerId);
                blockDragRef.current = { pointerId: e.pointerId, blockId, timer: null, dragging: false, startX: e.clientX, startY: e.clientY };
                blockDragRef.current.timer = setTimeout(() => {
                    blockDragRef.current.dragging = true;
                    setDraggingBlockId(blockId);
                    pushEditHistory();
                    if (navigator.vibrate) navigator.vibrate(12);
                }, 450);
            };

            const handleMarkerPointerMove = (e) => {
                if (blockDragRef.current.pointerId !== e.pointerId || !blockDragRef.current.blockId) return;
                if (!blockDragRef.current.dragging) {
                    const dx = Math.abs(e.clientX - blockDragRef.current.startX);
                    const dy = Math.abs(e.clientY - blockDragRef.current.startY);
                    if (dx > 14 || dy > 14) {
                        clearTimeout(blockDragRef.current.timer);
                        blockDragRef.current.blockId = null;
                    }
                    return;
                }
                e.preventDefault();
                const el = document.elementFromPoint(e.clientX, e.clientY);
                const rowEl = el && el.closest('[data-block-id]');
                const targetId = rowEl && rowEl.getAttribute('data-block-id');
                if (targetId && targetId !== blockDragRef.current.blockId) {
                    setDraft((d) => ({ ...d, blocks: reorderBlocks(d.blocks, blockDragRef.current.blockId, targetId) }));
                }
            };

            const handleMarkerPointerUp = () => {
                clearTimeout(blockDragRef.current.timer);
                if (blockDragRef.current.dragging) {
                    justDraggedBlockRef.current = true;
                }
                blockDragRef.current = { pointerId: null, blockId: null, timer: null, dragging: false, startX: 0, startY: 0 };
                setDraggingBlockId(null);
            };

            const handleEnter = (blockId) => {
                const newId = makeId();
                pushEditHistory();
                setDraft((d) => {
                    const idx = d.blocks.findIndex(b => b.id === blockId);
                    const current = d.blocks[idx];
                    const blocks = [...d.blocks];
                    const chain = getWholeLineTagChain(current.html);
                    const newHtml = chain.length > 0 ? wrapInTagChain(ZWSP, chain) : '';
                    blocks.splice(idx + 1, 0, { id: newId, type: current.type, html: newHtml, checked: false });
                    return { ...d, blocks };
                });
                setEditingBlockId(newId);
            };

            const handleBackspaceEmpty = (blockId) => {
                if (draft.blocks.length <= 1) return;
                const idx = draft.blocks.findIndex(b => b.id === blockId);
                const nextFocusId = draft.blocks[idx - 1] ? draft.blocks[idx - 1].id : (draft.blocks[idx + 1] ? draft.blocks[idx + 1].id : null);
                pushEditHistory();
                setDraft((d) => ({ ...d, blocks: d.blocks.filter(b => b.id !== blockId) }));
                setEditingBlockId(nextFocusId);
            };

            // Reads the live DOM of the block currently being edited so we don't
            // rely on a stale React state snapshot when leaving edit mode.
            const getFlushedDraft = () => {
                const el = document.activeElement;
                if (el && el.classList && el.classList.contains('block-editable')) {
                    const blockId = el.getAttribute('data-block-id');
                    if (blockId) {
                        const clean = stripZeroWidthSpace(sanitizeInlineHtml(el.innerHTML));
                        return { ...draft, blocks: draft.blocks.map(b => b.id === blockId ? { ...b, html: clean } : b) };
                    }
                }
                return draft;
            };

            const handleAddPhotos = async (e) => {
                // The Files picker (unlike Gallery) has no accept restriction, so it
                // can return non-image files if someone browses into a folder full
                // of documents — filter those out instead of trying to render them.
                const files = Array.from(e.target.files || []).filter(f => f.type.startsWith('image/'));
                if (files.length === 0) return;
                pushEditHistory();
                setUploading(true);
                try {
                    const newPhotos = [];
                    for (const file of files) {
                        const raw = await readFileAsDataUrl(file);
                        const resized = await resizeImage(raw, 1280, 0.82);
                        newPhotos.push({ id: makeId(), dataUrl: resized });
                    }
                    setDraft((d) => ({ ...d, photos: [...d.photos, ...newPhotos] }));
                } finally {
                    setUploading(false);
                    if (cameraInputRef.current) cameraInputRef.current.value = '';
                    if (galleryInputRef.current) galleryInputRef.current.value = '';
                    if (filesInputRef.current) filesInputRef.current.value = '';
                }
            };

            const removePhoto = (id) => {
                pushEditHistory();
                setDraft((d) => ({ ...d, photos: d.photos.filter(p => p.id !== id) }));
            };

            // Also creates the table (with these fixed mileage columns) on its
            // first press if one doesn't exist yet on this note.
            const addMileageRow = () => {
                setDraft((d) => {
                    const table = d.table || { columns: MILEAGE_COLUMNS, rows: [] };
                    const newRow = { id: makeId(), cells: ['', '', '', ''] };
                    return { ...d, table: { ...table, rows: [...table.rows, newRow] } };
                });
            };

            // Used by the Today button when no date cell is currently
            // focused: rather than doing nothing, add a fresh row pre-filled
            // with today's date instead of an empty one.
            const addMileageRowWithToday = () => {
                const todayStr = new Date().toLocaleDateString();
                const newRowIdx = draft.table ? draft.table.rows.length : 0;
                setDraft((d) => {
                    const table = d.table || { columns: MILEAGE_COLUMNS, rows: [] };
                    const newRow = { id: makeId(), cells: [todayStr, '', '', ''] };
                    return { ...d, table: { ...table, rows: [...table.rows, newRow] } };
                });
                if (mileageTableRef.current) {
                    mileageTableRef.current.focusRowCell(newRowIdx, 1);
                }
            };

            const removeLastMileageRow = () => {
                setDraft((d) => {
                    if (!d.table || d.table.rows.length === 0) return d;
                    const removed = d.table.rows[d.table.rows.length - 1];
                    if (removedRowToastTimer.current) clearTimeout(removedRowToastTimer.current);
                    setRemovedRowToast(removed);
                    removedRowToastTimer.current = setTimeout(() => setRemovedRowToast(null), 5000);
                    return { ...d, table: { ...d.table, rows: d.table.rows.slice(0, -1) } };
                });
            };

            const undoRemoveRow = () => {
                if (removedRowToastTimer.current) clearTimeout(removedRowToastTimer.current);
                setRemovedRowToast(null);
                setDraft((d) => {
                    if (!removedRowToast || !d.table) return d;
                    return { ...d, table: { ...d.table, rows: [...d.table.rows, removedRowToast] } };
                });
            };

            const updateMileageCell = (rowId, cellIndex, value) => {
                setDraft((d) => {
                    if (!d.table) return d;
                    return {
                        ...d,
                        table: {
                            ...d.table,
                            rows: d.table.rows.map(r => r.id === rowId
                                ? { ...r, cells: r.cells.map((c, i) => i === cellIndex ? value : c) }
                                : r),
                        },
                    };
                });
            };

            const handleBack = () => {
                const finalDraft = getFlushedDraft();
                onSave({ ...finalDraft, updatedAt: Date.now() });
                onBack();
            };

            const listNumbers = computeListNumbers(draft.blocks);
            const activeBlock = editingBlockId ? draft.blocks.find(b => b.id === editingBlockId) : null;
            const activeFormats = activeBlock
                ? { b: hasWholeLineTag(activeBlock.html, 'b'), i: hasWholeLineTag(activeBlock.html, 'i'), u: hasWholeLineTag(activeBlock.html, 'u') }
                : { b: false, i: false, u: false };

            const editorHeaderDark = isThemeDark(draft.background);

            return (
                <div className={'editor-screen' + (editorHeaderDark ? ' dark-content' : '')} style={resolvePageBackground(draft.background)}>
                    <div className="editor-header" style={resolveHeaderBackground(draft.background)}>
                        <button className="icon-btn" style={{ background: headerBadgeBg(editorHeaderDark), color: headerIconColor(editorHeaderDark) }} onClick={handleBack}>←</button>
                        <div className="editor-header-actions">
                            {canUndoEdit ? (
                                <button
                                    className="icon-btn"
                                    style={{ background: headerBadgeBg(editorHeaderDark), color: headerIconColor(editorHeaderDark) }}
                                    title="Undo last edit"
                                    onClick={undoLastEdit}
                                >
                                    ↩
                                </button>
                            ) : null}
                            <button
                                className={'icon-btn' + (draft.pinned ? ' active' : '')}
                                style={draft.pinned ? { background: 'rgba(102,126,234,0.85)', color: '#fff' } : { background: headerBadgeBg(editorHeaderDark), color: headerIconColor(editorHeaderDark) }}
                                title={draft.pinned ? 'Unpin' : 'Pin to top'}
                                onClick={() => updateField('pinned', !draft.pinned)}
                            >
                                📌
                            </button>
                            <button className="icon-btn" style={{ background: headerBadgeBg(editorHeaderDark), color: '#c5221f' }} onClick={() => setConfirmTrash(true)}>🗑</button>
                        </div>
                    </div>
                    <div className="editor-body" style={resolvePageBackground(draft.background)}>
                        <form autoComplete="off" onSubmit={(e) => e.preventDefault()} style={{ display: 'contents' }}>
                            <input
                                className="editor-title-input"
                                autoComplete="note-title-nofill"
                                data-lpignore="true"
                                data-form-type="other"
                                placeholder="Title"
                                value={draft.title}
                                onChange={(e) => updateField('title', e.target.value)}
                                autoFocus={note.title === ''}
                            />
                        </form>

                        <div className="editor-meta-row">
                            <button
                                type="button"

                            <input

                            {/* No `accept` here on purpose — an image/* accept steers
                                Android into its restricted Photos picker, which has no

                                handleAddPhotos filters the result down to images. */}
                            <input

                        <div className="section-label">Background</div>

                    {previewPhoto ? (

                    {confirmTrash ? (

        }

        function TrashScreen({ notes, background, onBack, onRestore, onDeleteForever, onEmptyTrash }) {
            const [confirmEmptyOpen, setConfirmEmptyOpen] = useState(false);
            const [confirmDeleteId, setConfirmDeleteId] = useState(null);
            const trashHeaderDark = isThemeDark(background);

            return (
                <div className={'editor-screen' + (trashHeaderDark ? ' dark-content' : '')} style={resolvePageBackground(background)}>
                    <div className="editor-header" style={resolveHeaderBackground(background)}>
                        <button className="icon-btn" style={{ background: headerBadgeBg(trashHeaderDark), color: headerIconColor(trashHeaderDark) }} onClick={onBack}>←</button>
                        <div className="editor-header-title">Trash</div>
                        <button
                            className="icon-btn"
                            style={{ background: headerBadgeBg(trashHeaderDark), color: '#c5221f' }}
                            onClick={() => setConfirmEmptyOpen(true)}
                            disabled={notes.length === 0}
                        >
                            🗑
                        </button>
                    </div>
                    <div className="editor-body" style={{ padding: 0, ...resolvePageBackground(background) }}>
                        {notes.length === 0 ? (
                            <div className="empty-state">
                                <div className="emoji">🗑️</div>
                                <p>Trash is empty.</p>
                            </div>
                        ) : (
                            notes.map((note) => (
                                <div className="trash-row" key={note.id}>
                                    <div className="trash-row-title">{note.title || 'Untitled note'}</div>
                                    <div className="trash-row-actions">
                                        <button className="secondary-btn" onClick={() => onRestore(note.id)}>Restore</button>
                                        <button className="danger-btn" onClick={() => setConfirmDeleteId(note.id)}>Delete</button>
                                    </div>
                                </div>
                            ))
                        )}
                    </div>

                    {confirmEmptyOpen ? (
                        <ConfirmSheet
                            title="Empty trash?"
                            message="All notes in the trash will be permanently deleted."
                            confirmLabel="Empty Trash"
                            onCancel={() => setConfirmEmptyOpen(false)}
                            onConfirm={() => { onEmptyTrash(); setConfirmEmptyOpen(false); }}
                        />
                    ) : null}

                    {confirmDeleteId ? (
                        <ConfirmSheet
                            title="Delete forever?"
                            message="This note will be permanently deleted and cannot be recovered."
                            confirmLabel="Delete"
                            onCancel={() => setConfirmDeleteId(null)}
                            onConfirm={() => { onDeleteForever(confirmDeleteId); setConfirmDeleteId(null); }}
                        />
                    ) : null}
                </div>
            );
        }

        function App() {
            const [db, setDb] = useState(null);
            const [loading, setLoading] = useState(true);
            const [categories, setCategories] = useState([]);
            const [notes, setNotes] = useState([]);
            const [templates, setTemplates] = useState([]);
            const [showTemplatePicker, setShowTemplatePicker] = useState(false);
            // IndexedDB reads are always async, so settings.dashboardBackground
            // would briefly be null on first paint (flashing the default
            // purple header before the real theme loads a moment later).
            // localStorage is synchronous, so seed the initial state from
            // there to have the correct theme from the very first frame;
            // idbPut below keeps it in sync on every change, and the DB load
            // effect further down still treats IndexedDB as the source of
            // truth once it resolves.
            const [settings, setSettings] = useState({ id: 'app', dashboardBackground: localStorage.getItem('dashboardBackground') || null });
            const [filterCategory, setFilterCategory] = useState('all');
            const [activeNoteId, setActiveNoteId] = useState(null);
            const [view, setView] = useState('home');
            const [showCategoryManager, setShowCategoryManager] = useState(false);
            const [showDashboardBg, setShowDashboardBg] = useState(false);
            const [deleteCategoryId, setDeleteCategoryId] = useState(null);
            const [draggingId, setDraggingId] = useState(null);
            const [draggingCategoryId, setDraggingCategoryId] = useState(null);
            const [showSearch, setShowSearch] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [showPinnedOnly, setShowPinnedOnly] = useState(false);
            const [trashToast, setTrashToast] = useState(null);
            const [selectMode, setSelectMode] = useState(false);
            const [selectedIds, setSelectedIds] = useState([]);
            const [showBatchCategory, setShowBatchCategory] = useState(false);
            const [pendingImport, setPendingImport] = useState(null);
            const [importError, setImportError] = useState('');

            const dragRef = useRef({ pointerId: null, noteId: null, timer: null, dragging: false, startX: 0, startY: 0 });
            const justDraggedRef = useRef(false);
            const categoryDragRef = useRef({ pointerId: null, categoryId: null });
            const trashToastTimer = useRef(null);
            const fabRef = useRef({ pointerId: null, timer: null, longPressed: false, startX: 0, startY: 0 });

            useEffect(() => {
                openDatabase().then(async (database) => {
                    setDb(database);
                    const [cats, rawNotes, settingsRows, templateRows] = await Promise.all([
                        idbGetAll(database, 'categories'),
                        idbGetAll(database, 'notes'),
                        idbGetAll(database, 'settings'),
                        idbGetAll(database, 'templates'),
                    ]);
                    setTemplates(templateRows);
                    const migrated = rawNotes.map((raw) => {
                        const m = migrateNote(raw);
                        if (!raw.blocks) idbPut(database, 'notes', m);
                        return m;
                    });
                    // Older categories predate the `order` field used for
                    // manual drag-reordering — backfill using their existing
                    // alphabetical position so the first load doesn't jumble
                    // an already-familiar list.
                    const sortedCats = cats.slice().sort((a, b) => a.name.localeCompare(b.name));
                    const catsWithOrder = sortedCats.map((c, idx) => {
                        if (c.order != null) return c;
                        const withOrder = { ...c, order: idx };
                        idbPut(database, 'categories', withOrder);
                        return withOrder;
                    });
                    setCategories(catsWithOrder.sort((a, b) => a.order - b.order));
                    setNotes(migrated);
                    setSettings(settingsRows[0] || { id: 'app', dashboardBackground: localStorage.getItem('dashboardBackground') || null });
                    setLoading(false);

                    // The service worker intercepts the OS share sheet's POST
                    // (manifest.json's share_target) and leaves one pending
                    // title/text/url/photos payload here before redirecting back
                    // to the app — pick it up and turn it straight into a note.
                    const inboxRows = await idbGetAll(database, 'shareInbox');
                    const pending = inboxRows[0];
                    if (pending) {
                        idbDelete(database, 'shareInbox', pending.id);
                        const sharedTitle = (pending.title || '').trim();
                        const sharedText = (pending.text || '').trim();
                        const sharedUrl = (pending.url || '').trim();
                        const photos = [];
                        for (const file of (pending.files || [])) {
                            const raw = await readFileAsDataUrl(file);
                            const resized = await resizeImage(raw, 1280, 0.82);
                            photos.push({ id: makeId(), dataUrl: resized });
                        }
                        const bodyParts = [sharedText];
                        if (sharedUrl && !sharedText.includes(sharedUrl)) bodyParts.push(sharedUrl);
                        const lines = bodyParts.filter(Boolean).join('\n').split('\n').filter(l => l.trim() !== '');
                        const titleFallback = sharedText.split('\n')[0] || sharedUrl || '';
                        const note = {
                            ...blankNote([]),
                            title: (sharedTitle || titleFallback).slice(0, 200),
                            blocks: lines.length > 0
                                ? lines.map(line => ({ id: makeId(), type: 'text', html: escapeHtml(line) }))
                                : [{ id: makeId(), type: 'text', html: '' }],
                            photos,
                        };
                        idbPut(database, 'notes', note);
                        setNotes((prev) => [note, ...prev]);
                        setActiveNoteId(note.id);
                    }
                });
            }, []);

            useEffect(() => {
                const meta = document.querySelector('meta[name="theme-color"]');
                if (meta) meta.setAttribute('content', resolveStatusBarColor(settings.dashboardBackground));
            }, [settings.dashboardBackground]);

            // Safety net for iOS Safari's sub-pixel rendering gap at the
            // bottom edge of position:fixed full-screen panels (NoteEditor /
            // TrashScreen), which lets the plain <body> background show
            // through as a thin gray strip below the home indicator. Keeping
            // <body> itself painted with whatever background is currently
            // active makes any such gap imperceptible instead of chasing the
            // exact geometry bug.
            useEffect(() => {
                const activeNote = activeNoteId ? notes.find(n => n.id === activeNoteId) : null;
                const bg = activeNote ? activeNote.background : settings.dashboardBackground;
                const resolved = resolvePageBackground(bg);
                document.body.style.backgroundImage = resolved.backgroundImage || 'none';
                document.body.style.backgroundColor = resolved.background || '';
            }, [activeNoteId, notes, settings.dashboardBackground]);

            const persistNote = useCallback((updatedNote) => {
                setNotes((prev) => {
                    const exists = prev.some(n => n.id === updatedNote.id);
                    return exists
                        ? prev.map(n => n.id === updatedNote.id ? updatedNote : n)
                        : [updatedNote, ...prev];
                });
                if (db) idbPut(db, 'notes', updatedNote);
            }, [db]);

            const trashNote = useCallback((id) => {
                setNotes((prev) => prev.map((n) => {
                    if (n.id !== id) return n;
                    const updated = { ...n, deletedAt: Date.now(), updatedAt: Date.now() };
                    if (db) idbPut(db, 'notes', updated);
                    return updated;
                }));
                if (trashToastTimer.current) clearTimeout(trashToastTimer.current);
                setTrashToast(id);
                trashToastTimer.current = setTimeout(() => setTrashToast(null), 5000);
            }, [db]);

            const undoTrashNote = useCallback((id) => {
                if (trashToastTimer.current) clearTimeout(trashToastTimer.current);
                setTrashToast(null);
                setNotes((prev) => prev.map((n) => {
                    if (n.id !== id) return n;
                    const updated = { ...n, deletedAt: null };
                    if (db) idbPut(db, 'notes', updated);
                    return updated;
                }));
            }, [db]);

            const togglePin = useCallback((id) => {
                setNotes((prev) => prev.map((n) => {
                    if (n.id !== id) return n;
                    const updated = { ...n, pinned: !n.pinned };
                    if (db) idbPut(db, 'notes', updated);
                    return updated;
                }));
            }, [db]);

            const toggleSelectMode = () => {
                setSelectMode((v) => !v);
                setSelectedIds([]);
            };

            const toggleSelected = (id) => {
                setSelectedIds((prev) => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            };

            const batchTrashSelected = () => {
                const ids = selectedIds;
                setNotes((prev) => prev.map((n) => {
                    if (!ids.includes(n.id)) return n;
                    const updated = { ...n, deletedAt: Date.now(), updatedAt: Date.now() };
                    if (db) idbPut(db, 'notes', updated);
                    return updated;
                }));
                setSelectedIds([]);
                setSelectMode(false);
            };

            // Mirrors the "toggle all formats" convention used for line
            // formatting: if every selected note is already pinned, unpin them
            // all; otherwise pin whichever aren't pinned yet.
            const batchTogglePinSelected = () => {
                const ids = selectedIds;
                const allPinned = notes.filter(n => ids.includes(n.id)).every(n => n.pinned);
                setNotes((prev) => prev.map((n) => {
                    if (!ids.includes(n.id)) return n;
                    const updated = { ...n, pinned: !allPinned };
                    if (db) idbPut(db, 'notes', updated);
                    return updated;
                }));
                setSelectedIds([]);
                setSelectMode(false);
            };

            const batchAddCategoryToSelected = (categoryId) => {
                const ids = selectedIds;
                setNotes((prev) => prev.map((n) => {
                    if (!ids.includes(n.id) || (n.categoryIds && n.categoryIds.includes(categoryId))) return n;
                    const updated = { ...n, categoryIds: [...(n.categoryIds || []), categoryId] };
                    if (db) idbPut(db, 'notes', updated);
                    return updated;
                }));
            };

            const restoreNote = useCallback((id) => {
                setNotes((prev) => prev.map((n) => {
                    if (n.id !== id) return n;
                    const updated = { ...n, deletedAt: null };
                    if (db) idbPut(db, 'notes', updated);
                    return updated;
                }));
            }, [db]);

            const deleteForever = useCallback((id) => {
                setNotes((prev) => prev.filter(n => n.id !== id));
                if (db) idbDelete(db, 'notes', id);
            }, [db]);

            const emptyTrash = useCallback(() => {
                setNotes((prev) => {
                    prev.filter(n => n.deletedAt).forEach((n) => { if (db) idbDelete(db, 'notes', n.id); });
                    return prev.filter(n => !n.deletedAt);
                });
            }, [db]);

            const createNote = () => {
                const categoryId = filterCategory !== 'all' && filterCategory !== 'uncategorized' ? filterCategory : null;
                const note = blankNote(categoryId ? [categoryId] : []);
                setNotes((prev) => [note, ...prev]);
                if (db) idbPut(db, 'notes', note);
                setActiveNoteId(note.id);
            };

            const createNoteFromTemplate = (template) => {
                setShowTemplatePicker(false);
                if (!template) { createNote(); return; }
                const categoryId = filterCategory !== 'all' && filterCategory !== 'uncategorized' ? filterCategory : null;
                const note = noteFromTemplate(template, categoryId ? [categoryId] : []);
                setNotes((prev) => [note, ...prev]);
                if (db) idbPut(db, 'notes', note);
                setActiveNoteId(note.id);
            };

            const saveTemplate = (name, sourceNote) => {
                const tmpl = {
                    id: makeId(),
                    name,
                    title: sourceNote.title,
                    blocks: sourceNote.blocks.map((b) => ({ type: b.type, html: b.html })),
                    table: sourceNote.table
                        ? { columns: sourceNote.table.columns, rows: sourceNote.table.rows.map((r) => ({ cells: [...r.cells] })) }
                        : null,
                    background: sourceNote.background,
                    createdAt: Date.now(),
                };
                setTemplates((prev) => [...prev, tmpl]);
                if (db) idbPut(db, 'templates', tmpl);
            };

            const deleteTemplate = (id) => {
                setTemplates((prev) => prev.filter(t => t.id !== id));
                if (db) idbDelete(db, 'templates', id);
            };

            // A quick tap on the + button creates a blank note as always; holding
            // it down opens the template picker instead — the same long-press
            // trick used elsewhere, so the common "just make a note" path never
            // gets slower or picks up an extra step.
            const handleFabPointerDown = (e) => {
                fabRef.current = { pointerId: e.pointerId, timer: null, longPressed: false, startX: e.clientX, startY: e.clientY };
                fabRef.current.timer = setTimeout(() => {
                    fabRef.current.longPressed = true;
                    if (navigator.vibrate) navigator.vibrate(12);
                    setShowTemplatePicker(true);
                }, 450);
            };

            const handleFabPointerMove = (e) => {
                if (fabRef.current.pointerId !== e.pointerId) return;
                const dx = Math.abs(e.clientX - fabRef.current.startX);
                const dy = Math.abs(e.clientY - fabRef.current.startY);
                if (dx > 14 || dy > 14) clearTimeout(fabRef.current.timer);
            };

            const handleFabPointerUp = () => {
                clearTimeout(fabRef.current.timer);
                fabRef.current.pointerId = null;
            };

            const handleFabClick = () => {
                if (fabRef.current.longPressed) {
                    fabRef.current.longPressed = false;
                    return;
                }
                createNote();
            };

            const addCategory = (name, color) => {
                const id = makeId();
                setCategories((prev) => {
                    const nextOrder = prev.length ? Math.max(...prev.map(c => c.order || 0)) + 1 : 0;
                    const cat = { id, name, color, order: nextOrder };
                    if (db) idbPut(db, 'categories', cat);
                    return [...prev, cat];
                });
                return id;
            };

            // Splices the dragged category to targetId's position and
            // immediately reassigns sequential `order` values, mirroring
            // reorderNotes — the sort-by-order render would otherwise snap
            // the array position back on the very next update.
            const reorderCategories = (prev, draggedId, targetId) => {
                const dragIdx = prev.findIndex(c => c.id === draggedId);
                const targetIdx = prev.findIndex(c => c.id === targetId);
                if (dragIdx === -1 || targetIdx === -1) return prev;
                const reordered = [...prev];
                const [moved] = reordered.splice(dragIdx, 1);
                reordered.splice(targetIdx, 0, moved);
                return reordered.map((c, idx) => ({ ...c, order: idx }));
            };

            const persistCategoryOrder = (cats) => {
                cats.forEach((c) => { if (db) idbPut(db, 'categories', c); });
            };

            // Category rows are reordered via a dedicated drag handle rather
            // than a long-press on the whole row, since the row also holds a
            // text input for renaming — a long-press there would fight with
            // placing a text cursor.
            const handleCategoryHandlePointerDown = (e, categoryId) => {
                e.currentTarget.setPointerCapture(e.pointerId);
                categoryDragRef.current = { pointerId: e.pointerId, categoryId };
                setDraggingCategoryId(categoryId);
                if (navigator.vibrate) navigator.vibrate(12);
            };

            const handleCategoryHandlePointerMove = (e) => {
                if (categoryDragRef.current.pointerId !== e.pointerId || !categoryDragRef.current.categoryId) return;
                e.preventDefault();
                const el = document.elementFromPoint(e.clientX, e.clientY);
                const rowEl = el && el.closest('[data-category-id]');
                const targetId = rowEl && rowEl.getAttribute('data-category-id');
                if (targetId && targetId !== categoryDragRef.current.categoryId) {
                    setCategories((prev) => reorderCategories(prev, categoryDragRef.current.categoryId, targetId));
                }
            };

            const handleCategoryHandlePointerUp = () => {
                if (categoryDragRef.current.categoryId) {
                    setCategories((prev) => {
                        persistCategoryOrder(prev);
                        return prev;
                    });
                }
                categoryDragRef.current = { pointerId: null, categoryId: null };
                setDraggingCategoryId(null);
            };

            const renameCategory = (id, name) => {
                setCategories((prev) => prev.map(c => c.id === id ? { ...c, name } : c));
                const cat = categories.find(c => c.id === id);
                if (db && cat) idbPut(db, 'categories', { ...cat, name });
            };

            const deleteCategory = (id) => {
                setCategories((prev) => prev.filter(c => c.id !== id));
                if (db) idbDelete(db, 'categories', id);
                const affected = notes.filter(n => n.categoryIds && n.categoryIds.includes(id));
                affected.forEach((n) => {
                    const updated = { ...n, categoryIds: n.categoryIds.filter(cid => cid !== id) };
                    if (db) idbPut(db, 'notes', updated);
                });
                if (affected.length > 0) {
                    setNotes((prev) => prev.map(n => (n.categoryIds && n.categoryIds.includes(id))
                        ? { ...n, categoryIds: n.categoryIds.filter(cid => cid !== id) }
                        : n));
                }
                if (filterCategory === id) setFilterCategory('all');
                setDeleteCategoryId(null);
            };

            const updateDashboardBackground = (bg) => {
                setSettings((s) => ({ ...s, dashboardBackground: bg }));
                if (db) idbPut(db, 'settings', { id: 'app', dashboardBackground: bg });
                if (bg) {
                    localStorage.setItem('dashboardBackground', bg);
                } else {
                    localStorage.removeItem('dashboardBackground');
                }
            };

            const exportAllData = () => {
                const payload = {
                    app: 'Sly Notes',
                    version: APP_VERSION,
                    exportedAt: Date.now(),
                    notes,
                    categories,
                    settings,
                };
                const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'sly-notes-backup-' + new Date().toISOString().slice(0, 10) + '.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const handleImportFile = (file) => {
                setImportError('');
                const reader = new FileReader();
                reader.onload = () => {
                    try {
                        const parsed = JSON.parse(reader.result);
                        if (!parsed || !Array.isArray(parsed.notes) || !Array.isArray(parsed.categories)) {
                            setImportError("That file doesn't look like a Sly Notes backup.");
                            return;
                        }
                        setPendingImport(parsed);
                    } catch (err) {
                        setImportError('Could not read that file — is it a Sly Notes backup?');
                    }
                };
                reader.onerror = () => setImportError('Could not read that file.');
                reader.readAsText(file);
            };

            // Upserts by id so importing a backup never wipes out notes/categories
            // created since the backup was made — matching ids are overwritten,
            // everything else is left alone.
            const confirmImport = () => {
                if (!pendingImport || !db) return;
                const importedNotes = pendingImport.notes.map(migrateNote);
                importedNotes.forEach((n) => idbPut(db, 'notes', n));
                pendingImport.categories.forEach((c) => idbPut(db, 'categories', c));
                setNotes((prev) => {
                    const byId = Object.fromEntries(prev.map(n => [n.id, n]));
                    importedNotes.forEach((n) => { byId[n.id] = n; });
                    return Object.values(byId);
                });
                setCategories((prev) => {
                    const byId = Object.fromEntries(prev.map(c => [c.id, c]));
                    pendingImport.categories.forEach((c) => { byId[c.id] = c; });
                    return Object.values(byId).sort((a, b) => (a.order || 0) - (b.order || 0));
                });
                if (pendingImport.settings && pendingImport.settings.dashboardBackground !== undefined) {
                    updateDashboardBackground(pendingImport.settings.dashboardBackground);
                }
                setPendingImport(null);
            };

            // Splices the dragged note to targetId's position and immediately
            // reassigns sequential `order` values to the whole visible set. The
            // render always re-sorts notes by `order`, so reordering array
            // *position* alone (without touching `order`) gets silently undone by
            // the very next render — this keeps the sort key itself live during
            // the drag, not just at drop.
            const reorderNotes = (prev, draggedId, targetId) => {
                const active = prev.filter(n => !n.deletedAt).sort(noteSortCompare);
                const trashed = prev.filter(n => n.deletedAt);
                const dragIdx = active.findIndex(n => n.id === draggedId);
                const targetIdx = active.findIndex(n => n.id === targetId);
                if (dragIdx === -1 || targetIdx === -1) return prev;
                const reordered = [...active];
                const [moved] = reordered.splice(dragIdx, 1);
                reordered.splice(targetIdx, 0, moved);
                const base = Date.now();
                const renumbered = reordered.map((n, idx) => ({ ...n, order: base - idx }));
                return [...renumbered, ...trashed];
            };

            const handleCardPointerDown = (e, noteId) => {
                if (filterCategory !== 'all') return;
                e.currentTarget.setPointerCapture(e.pointerId);
                dragRef.current = { pointerId: e.pointerId, noteId, timer: null, dragging: false, startX: e.clientX, startY: e.clientY };
                dragRef.current.timer = setTimeout(() => {
                    dragRef.current.dragging = true;
                    setDraggingId(noteId);
                    if (navigator.vibrate) navigator.vibrate(12);
                }, 450);
            };

            const handleCardPointerMove = (e) => {
                if (dragRef.current.pointerId !== e.pointerId || !dragRef.current.noteId) return;
                if (!dragRef.current.dragging) {
                    const dx = Math.abs(e.clientX - dragRef.current.startX);
                    const dy = Math.abs(e.clientY - dragRef.current.startY);
                    if (dx > 14 || dy > 14) {
                        clearTimeout(dragRef.current.timer);
                        dragRef.current.noteId = null;
                    }
                    return;
                }
                e.preventDefault();
                const el = document.elementFromPoint(e.clientX, e.clientY);
                const cardEl = el && el.closest('[data-note-id]');
                const targetId = cardEl && cardEl.getAttribute('data-note-id');
                if (targetId && targetId !== dragRef.current.noteId) {
                    setNotes((prev) => reorderNotes(prev, dragRef.current.noteId, targetId));
                }
            };

            const handleCardPointerUp = () => {
                clearTimeout(dragRef.current.timer);
                if (dragRef.current.dragging) {
                    justDraggedRef.current = true;
                    setNotes((prev) => {
                        const active = prev.filter(n => !n.deletedAt).sort(noteSortCompare);
                        const trashed = prev.filter(n => n.deletedAt);
                        const base = Date.now();
                        const reOrdered = active.map((n, idx) => {
                            const updated = { ...n, order: base - idx };
                            if (db) idbPut(db, 'notes', updated);
                            return updated;
                        });
                        return [...reOrdered, ...trashed];
                    });
                }
                dragRef.current = { pointerId: null, noteId: null, timer: null, dragging: false, startX: 0, startY: 0 };
                setDraggingId(null);
            };

            const handleCardOpen = (noteId) => {
                if (justDraggedRef.current) {
                    justDraggedRef.current = false;
                    return;
                }
                setActiveNoteId(noteId);
            };

            if (view === 'trash') {
                const trashedNotes = notes.filter(n => n.deletedAt).sort((a, b) => b.deletedAt - a.deletedAt);
                return (
                    <TrashScreen
                        notes={trashedNotes}
                        background={settings.dashboardBackground}
                        onBack={() => setView('home')}
                        onRestore={restoreNote}
                        onDeleteForever={deleteForever}
                        onEmptyTrash={emptyTrash}
                    />
                );
            }

            const activeNote = activeNoteId ? notes.find(n => n.id === activeNoteId) : null;

            if (activeNote) {
                return (
                    <NoteEditor
                        key={activeNote.id}
                        note={activeNote}
                        categories={categories}
                        onBack={() => setActiveNoteId(null)}
                        onSave={persistNote}
                        onTrash={trashNote}
                        onAddCategory={addCategory}
                        onSaveTemplate={saveTemplate}
                    />
                );
            }

            const visibleNotes = notes
                .filter(n => !n.deletedAt && noteMatchesCategory(n, filterCategory) && noteMatchesSearch(n, searchQuery) && (!showPinnedOnly || n.pinned))
                .sort(noteSortCompare);
            const categoryById = Object.fromEntries(categories.map(c => [c.id, c]));

            const toggleSearch = () => {
                setShowSearch((s) => {
                    if (s) setSearchQuery('');
                    return !s;
                });
            };

            return (
                <div className="home-screen">
                    <div className="app-header" style={resolveHeaderBackground(settings.dashboardBackground)}>
                        <div className="header-row">
                            {selectMode ? (
                                <React.Fragment>
                                    <button className="icon-btn" onClick={toggleSelectMode} title="Cancel selection">✕</button>
                                    <div className="header-actions select-toolbar">
                                        <span className="select-count">{selectedIds.length} selected</span>
                                        <button className="icon-btn" disabled={selectedIds.length === 0} onClick={batchTogglePinSelected} title="Pin/unpin selected">📌</button>
                                        <button className="icon-btn" disabled={selectedIds.length === 0} onClick={() => setShowBatchCategory(true)} title="Add category to selected">🏷</button>
                                        <button className="icon-btn" disabled={selectedIds.length === 0} onClick={batchTrashSelected} title="Trash selected">🗑</button>
                                    </div>
                                </React.Fragment>
                            ) : (
                                <React.Fragment>
                                    <h1>📓 Sly Notes</h1>
                                    <div className="header-actions">
                                        <button className={'icon-btn' + (showSearch ? ' active' : '')} onClick={toggleSearch} title="Search">🔍</button>
                                        <button className={'icon-btn' + (showPinnedOnly ? ' active' : '')} onClick={() => setShowPinnedOnly((v) => !v)} title="Show pinned only">📌</button>
                                        <button className="icon-btn" onClick={() => setShowDashboardBg(true)} title="Dashboard background">🎨</button>
                                        <button className="icon-btn" onClick={() => setView('trash')} title="Trash">🗑</button>
                                        <button className="icon-btn" onClick={toggleSelectMode} title="Select notes">☑</button>
                                        <button className="icon-btn" onClick={() => setShowCategoryManager(true)} title="Categories">⚙</button>
                                    </div>
                                </React.Fragment>
                            )}
                        </div>
                        {showSearch ? (
                            <div className="search-bar">
                                <form autoComplete="off" onSubmit={(e) => e.preventDefault()} style={{ display: 'contents' }}>
                                    <input
                                        type="text"
                                        className="search-input"
                                        autoComplete="notes-search-nofill"
                                        data-lpignore="true"
                                        data-form-type="other"
                                        placeholder="Search notes..."
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        autoFocus
                                    />
                                </form>
                                {searchQuery ? (
                                    <button className="search-clear-btn" onClick={() => setSearchQuery('')}>✕</button>
                                ) : null}
                            </div>
                        ) : null}
                        <div className="category-tabs">
                            <button
                                className={'category-pill' + (filterCategory === 'all' ? ' active' : '')}
                                onClick={() => setFilterCategory('all')}
                            >
                                All
                            </button>
                            <button
                                className={'category-pill' + (filterCategory === 'uncategorized' ? ' active' : '')}
                                onClick={() => setFilterCategory('uncategorized')}
                            >
                                Uncategorized
                            </button>
                            {categories.map((cat) => (
                                <button
                                    key={cat.id}
                                    className={'category-pill' + (filterCategory === cat.id ? ' active' : '')}
                                    onClick={() => setFilterCategory(cat.id)}
                                >
                                    <span className="color-dot" style={{ background: cat.color }}></span>
                                    {cat.name}
                                </button>
                            ))}
                            <button className="category-pill add-pill" onClick={() => setShowCategoryManager(true)}>+</button>
                        </div>
                    </div>

                    <div className="notes-area" style={resolvePageBackground(settings.dashboardBackground)}>
                        {loading ? null : visibleNotes.length === 0 ? (
                            <div className="empty-state">
                                <div className="emoji">{searchQuery.trim() ? '🔍' : showPinnedOnly ? '📌' : '🗒️'}</div>
                                {searchQuery.trim() ? (
                                    <p>No notes match "{searchQuery.trim()}".</p>
                                ) : showPinnedOnly ? (
                                    <p>No pinned notes yet.<br/>Tap 📌 on a note to pin it.</p>
                                ) : (
                                    <p>No notes here yet.<br/>Tap + to create one.</p>
                                )}
                            </div>
                        ) : (
                            <div className="notes-grid">
                                {visibleNotes.map((note) => (
                                    <NoteCard
                                        key={note.id}
                                        note={note}
                                        noteCategories={(note.categoryIds || []).map(id => categoryById[id]).filter(Boolean)}
                                        onOpen={handleCardOpen}
                                        onTrash={trashNote}
                                        onTogglePin={togglePin}
                                        dragEnabled={filterCategory === 'all' && !selectMode}
                                        isDragging={draggingId === note.id}
                                        onCardPointerDown={handleCardPointerDown}
                                        onCardPointerMove={handleCardPointerMove}
                                        onCardPointerUp={handleCardPointerUp}
                                        selectMode={selectMode}
                                        selected={selectedIds.includes(note.id)}
                                        onToggleSelect={toggleSelected}
                                    />
                                ))}
                            </div>
                        )}
                    </div>

                    <button
                        className="fab"
                        onClick={handleFabClick}
                        onPointerDown={handleFabPointerDown}
                        onPointerMove={handleFabPointerMove}
                        onPointerUp={handleFabPointerUp}
                        onPointerCancel={handleFabPointerUp}
                    >
                        +
                    </button>

                    {showTemplatePicker ? (
                        <TemplatePickerSheet
                            background={settings.dashboardBackground}
                            templates={templates}
                            onPick={createNoteFromTemplate}
                            onDeleteTemplate={deleteTemplate}
                            onClose={() => setShowTemplatePicker(false)}
                        />
                    ) : null}

                    {showBatchCategory ? (
                        <BatchCategorySheet
                            background={settings.dashboardBackground}
                            categories={categories}
                            onAddCategory={batchAddCategoryToSelected}
                            onClose={() => { setShowBatchCategory(false); setSelectedIds([]); setSelectMode(false); }}
                        />
                    ) : null}

                    {trashToast ? (
                        <div className="undo-toast">
                            <span>Note moved to trash</span>
                            <button onClick={() => undoTrashNote(trashToast)}>Undo</button>
                        </div>
                    ) : null}

                    {showCategoryManager ? (
                        <CategoryManagerSheet
                            background={settings.dashboardBackground}
                            categories={categories}
                            onAdd={addCategory}
                            onRename={renameCategory}
                            onDelete={(id) => setDeleteCategoryId(id)}
                            onClose={() => { setShowCategoryManager(false); setImportError(''); }}
                            draggingCategoryId={draggingCategoryId}
                            onHandlePointerDown={handleCategoryHandlePointerDown}
                            onHandlePointerMove={handleCategoryHandlePointerMove}
                            onHandlePointerUp={handleCategoryHandlePointerUp}
                            onExport={exportAllData}
                            onImportFile={handleImportFile}
                            importError={importError}
                        />
                    ) : null}

                    {showDashboardBg ? (
                        <DashboardBackgroundSheet
                            value={settings.dashboardBackground}
                            onChange={updateDashboardBackground}
                            onClose={() => setShowDashboardBg(false)}
                        />
                    ) : null}

                    {deleteCategoryId ? (
                        <ConfirmSheet
                            title="Delete category?"
                            message="Notes in this category will become uncategorized."
                            confirmLabel="Delete"
                            onCancel={() => setDeleteCategoryId(null)}
                            onConfirm={() => deleteCategory(deleteCategoryId)}
                        />
                    ) : null}

                    {pendingImport ? (
                        <ConfirmSheet
                            title="Import backup?"
                            message={'This will add ' + pendingImport.notes.length + ' note(s) and ' + pendingImport.categories.length + ' categor' + (pendingImport.categories.length === 1 ? 'y' : 'ies') + ' from the backup, overwriting any with matching IDs. Nothing else is removed.'}
                            confirmLabel="Import"
                            onCancel={() => setPendingImport(null)}
                            onConfirm={confirmImport}
                        />
                    ) : null}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            let swRegistration = null;

            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').then((reg) => {
                    swRegistration = reg;
                    // register() alone doesn't reliably re-check for a new
                    // worker on every launch — Android often resumes an
                    // installed PWA from a suspended process instead of a
                    // fresh navigation, which skips the browser's own update
                    // check entirely. Force one explicitly every time.
                    reg.update().catch(() => {});
                }).catch((err) => {
                    console.error('Service worker registration failed:', err);
                });
            });

            // Also force a check whenever the app becomes visible again
            // (e.g. switching back to it from the recent-apps list), which
            // covers the common case where the process never fully died.
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && swRegistration) {
                    swRegistration.update().catch(() => {});
                }
            });

            // With skipWaiting + clients.claim on the worker side, a new
            // version takes control of this already-open page automatically.
            // Reload once when that happens so the update is visible right
            // away instead of needing a manual close-and-reopen.
            let refreshingAfterUpdate = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshingAfterUpdate) return;
                refreshingAfterUpdate = true;
                window.location.reload();
            });
        }
    </script>
</body>
</html>
