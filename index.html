        }

        function TrashScreen({ notes, background, onBack, onRestore, onDeleteForever, onEmptyTrash }) {
            const [confirmEmptyOpen, setConfirmEmptyOpen] = useState(false);
            const [confirmDeleteId, setConfirmDeleteId] = useState(null);
            const trashHeaderDark = isThemeDark(background);

            useBackClose(true, onBack);
            useBackClose(confirmEmptyOpen, () => setConfirmEmptyOpen(false));
            useBackClose(!!confirmDeleteId, () => setConfirmDeleteId(null));

            return (
                <div className={'editor-screen' + (trashHeaderDark ? ' dark-content' : '')} style={resolvePageBackground(background)}>
                    <div className="editor-header" style={resolveHeaderBackground(background)}>
                        <button className="icon-btn" style={{ background: headerBadgeBg(trashHeaderDark), color: headerIconColor(trashHeaderDark) }} onClick={onBack}>←</button>
                        <div className="editor-header-title">Trash</div>
                        <button
                            className="icon-btn"
                            style={{ background: headerBadgeBg(trashHeaderDark), color: '#c5221f' }}
                            onClick={() => setConfirmEmptyOpen(true)}
                            disabled={notes.length === 0}
                        >
                            🗑
                        </button>
                    </div>
                    <div className="editor-body" style={{ padding: 0, ...resolvePageBackground(background) }}>
                        {notes.length === 0 ? (
                            <div className="empty-state">
                                <div className="emoji">🗑️</div>
                                <p>Trash is empty.</p>
                            </div>
                        ) : (
                            <React.Fragment>
                                <p className="sheet-muted-text" style={{ fontSize: 12, padding: '10px 16px 0' }}>Notes are permanently deleted after {TRASH_AUTO_PURGE_DAYS} days in the trash.</p>
                                {notes.map((note) => (
                                    <div className="trash-row" key={note.id}>
                                        <div className="trash-row-title">{note.title || 'Untitled note'}</div>
                                        <div className="trash-row-actions">
                                            <button className="secondary-btn" onClick={() => onRestore(note.id)}>Restore</button>
                                            <button className="danger-btn" onClick={() => setConfirmDeleteId(note.id)}>Delete</button>
                                        </div>
                                    </div>
                                ))}
                            </React.Fragment>
                        )}
                    </div>

                    {confirmEmptyOpen ? (
                        <ConfirmSheet
                            title="Empty trash?"
                            message="All notes in the trash will be permanently deleted."
                            confirmLabel="Empty Trash"
                            onCancel={() => setConfirmEmptyOpen(false)}
                            onConfirm={() => { onEmptyTrash(); setConfirmEmptyOpen(false); }}
                        />
                    ) : null}

                    {confirmDeleteId ? (
                        <ConfirmSheet
                            title="Delete forever?"
                            message="This note will be permanently deleted and cannot be recovered."
                            confirmLabel="Delete"
                            onCancel={() => setConfirmDeleteId(null)}
                            onConfirm={() => { onDeleteForever(confirmDeleteId); setConfirmDeleteId(null); }}
                        />
                    ) : null}
                </div>
            );
        }

        function App() {
            const [db, setDb] = useState(null);
            const [loading, setLoading] = useState(true);
            const [categories, setCategories] = useState([]);
            const [notes, setNotes] = useState([]);
            const [templates, setTemplates] = useState([]);
            const [showTemplatePicker, setShowTemplatePicker] = useState(false);
            const [editingTemplateId, setEditingTemplateId] = useState(null);
            // IndexedDB reads are always async, so settings.dashboardBackground
            // would briefly be null on first paint (flashing the default
            // purple header before the real theme loads a moment later).
            // localStorage is synchronous, so seed the initial state from
            // there to have the correct theme from the very first frame;
            // idbPut below keeps it in sync on every change, and the DB load
            // effect further down still treats IndexedDB as the source of
            // truth once it resolves.
            const [settings, setSettings] = useState({ id: 'app', dashboardBackground: localStorage.getItem('dashboardBackground') || null });
            const [filterCategory, setFilterCategory] = useState('all');
            const [activeNoteId, setActiveNoteId] = useState(null);
            const [view, setView] = useState('home');
            const [showCategoryManager, setShowCategoryManager] = useState(false);
            const [deleteCategoryId, setDeleteCategoryId] = useState(null);
            const [draggingId, setDraggingId] = useState(null);
            const [draggingCategoryId, setDraggingCategoryId] = useState(null);
            const [showSearch, setShowSearch] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [showPinnedOnly, setShowPinnedOnly] = useState(false);
            const [trashToast, setTrashToast] = useState(null);
            const [selectMode, setSelectMode] = useState(false);
            const [selectedIds, setSelectedIds] = useState([]);
            const [showBatchCategory, setShowBatchCategory] = useState(false);
            const [showSortMenu, setShowSortMenu] = useState(false);
            // In-memory only — verifying the PIN once unlocks every locked
            // note for the rest of this session, rather than re-prompting per
            // note (matches how phone lock screens behave).
            const [pinUnlockedThisSession, setPinUnlockedThisSession] = useState(false);
            const [pendingUnlockNoteId, setPendingUnlockNoteId] = useState(null);
            // 'setup' | 'change-verify' | 'change-setup' | 'remove-verify'
            const [pinFlow, setPinFlow] = useState(null);
            const [pendingImport, setPendingImport] = useState(null);
            const [importError, setImportError] = useState('');

            // Hardware/gesture back button, for whichever of the dashboard's
            // own sheets/modes is open. Declared unconditionally (same as any
            // other hook) even though App has early returns further down for
            // the Trash screen and the note editor — those screens manage
            // their own back-closable layers themselves, and these ones are
            // simply inactive (no-ops) while a different screen is showing.
            useBackClose(showCategoryManager, () => { setShowCategoryManager(false); setImportError(''); });
            useBackClose(showSortMenu, () => setShowSortMenu(false));
            useBackClose(showBatchCategory, () => { setShowBatchCategory(false); setSelectedIds([]); setSelectMode(false); });
            useBackClose(showTemplatePicker, () => setShowTemplatePicker(false));
            useBackClose(!!pendingUnlockNoteId, () => setPendingUnlockNoteId(null));
            useBackClose(!!pinFlow, () => setPinFlow(null));
            useBackClose(selectMode, () => { setSelectMode(false); setSelectedIds([]); });
            useBackClose(showSearch, () => { setShowSearch(false); setSearchQuery(''); });
            useBackClose(!!deleteCategoryId, () => setDeleteCategoryId(null));
            useBackClose(!!pendingImport, () => setPendingImport(null));

            const dashboardIconOrder = resolveIconOrder(settings.dashboardIconOrder, DEFAULT_DASHBOARD_ICON_ORDER);
            const dashboardIconDrag = useIconReorder(dashboardIconOrder, (order) => updateDashboardIconOrder(order));

            const dragRef = useRef({ pointerId: null, noteId: null, timer: null, dragging: false, startX: 0, startY: 0 });
            const justDraggedRef = useRef(false);
            const categoryDragRef = useRef({ pointerId: null, categoryId: null });
            const trashToastTimer = useRef(null);

            // On-screen-keyboard-aware scroll room. The editor screen and
            // every sheet are position:fixed containers with their own
            // internal overflow-y:auto scroll (not the plain document), so
            // their scrollable range is based on their own box height, not
            // on how much of that box the keyboard is currently covering. If
            // everything already "fits" in the box without overflowing, the
            // browser has nothing to scroll even though the keyboard is
            // visually hiding the bottom of it — the field just can't be
            // brought into view no matter how you try to scroll. dvh units
            // are *supposed* to track the shrunk visual viewport live and
            // avoid exactly this, but that isn't reliable across every
            // Android WebView/Chrome version in practice. The VisualViewport
            // API always reports the true visible height, so this keeps a
            // --keyboard-inset CSS variable in sync with it; .editor-body and
            // .sheet add it as extra bottom padding, guaranteeing there's
            // always room to scroll whatever the keyboard is covering up
            // above it, regardless of whether dvh itself did the right thing.
            useEffect(() => {
                const vv = window.visualViewport;
                if (!vv) return undefined;
                const updateKeyboardInset = () => {
                    const inset = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
                    document.documentElement.style.setProperty('--keyboard-inset', inset + 'px');
                };
                vv.addEventListener('resize', updateKeyboardInset);
                vv.addEventListener('scroll', updateKeyboardInset);
                updateKeyboardInset();
                return () => {
                    vv.removeEventListener('resize', updateKeyboardInset);
                    vv.removeEventListener('scroll', updateKeyboardInset);
                };
            }, []);

            useEffect(() => {
                openDatabase().then(async (database) => {
                    setDb(database);
                    const [cats, rawNotes, settingsRows, templateRows] = await Promise.all([
                        idbGetAll(database, 'categories'),
                        idbGetAll(database, 'notes'),
                        idbGetAll(database, 'settings'),
                        idbGetAll(database, 'templates'),
                    ]);
                    setTemplates(templateRows);
                    const migrated = rawNotes.map((raw) => {
                        const m = migrateNote(raw);
                        if (!raw.blocks) idbPut(database, 'notes', m);
                        return m;
                    });
                    // Quietly purge anything that's been sitting in the trash
                    // longer than the retention window, so it doesn't pile up
                    // forever if nobody remembers to empty it manually.
                    const purgeBefore = Date.now() - TRASH_AUTO_PURGE_DAYS * 24 * 60 * 60 * 1000;
                    const surviving = migrated.filter((n) => {
                        const expired = n.deletedAt && n.deletedAt < purgeBefore;
                        if (expired) idbDelete(database, 'notes', n.id);
                        return !expired;
                    });
                    // Older categories predate the `order` field used for
                    // manual drag-reordering — backfill using their existing
                    // alphabetical position so the first load doesn't jumble
                    // an already-familiar list.
                    const sortedCats = cats.slice().sort((a, b) => a.name.localeCompare(b.name));
                    const catsWithOrder = sortedCats.map((c, idx) => {
                        if (c.order != null) return c;
                        const withOrder = { ...c, order: idx };
                        idbPut(database, 'categories', withOrder);
                        return withOrder;
                    });
                    setCategories(catsWithOrder.sort((a, b) => a.order - b.order));
                    setNotes(surviving);
                    setSettings(settingsRows[0] || { id: 'app', dashboardBackground: localStorage.getItem('dashboardBackground') || null });
                    setLoading(false);

                    // The service worker intercepts the OS share sheet's POST
                    // (manifest.json's share_target) and leaves one pending
                    // title/text/url/photos payload here before redirecting back
                    // to the app — pick it up and turn it straight into a note.
                    const inboxRows = await idbGetAll(database, 'shareInbox');
                    const pending = inboxRows[0];
                    if (pending) {
                        idbDelete(database, 'shareInbox', pending.id);
                        const sharedTitle = (pending.title || '').trim();
                        const sharedText = (pending.text || '').trim();
                        const sharedUrl = (pending.url || '').trim();
                        const photos = [];
                        for (const file of (pending.files || [])) {
                            const raw = await readFileAsDataUrl(file);
                            const resized = await resizeImage(raw, 1280, 0.82);
                            photos.push({ id: makeId(), dataUrl: resized });
                        }
                        const bodyParts = [sharedText];
                        if (sharedUrl && !sharedText.includes(sharedUrl)) bodyParts.push(sharedUrl);
                        const lines = bodyParts.filter(Boolean).join('\n').split('\n').filter(l => l.trim() !== '');
                        const titleFallback = sharedText.split('\n')[0] || sharedUrl || '';
                        const note = {
                            ...blankNote([], settingsRows[0] && settingsRows[0].defaultNoteBackground),
                            title: (sharedTitle || titleFallback).slice(0, 200),
                            blocks: lines.length > 0
                                ? lines.map(line => ({ id: makeId(), type: 'text', html: escapeHtml(line) }))
                                : [{ id: makeId(), type: 'text', html: '' }],
                            photos,
                        };
                        idbPut(database, 'notes', note);
                        setNotes((prev) => [note, ...prev]);
                        setActiveNoteId(note.id);
                    }
                });
            }, []);

            // The "New note" home screen shortcut (manifest.json's
            // `shortcuts`) launches the installed app at ./?new=1 — jumping
            // straight into a fresh blank note instead of the dashboard.
            // Waits for the full DB load (not just `db` itself, which is set
            // earlier) so settings.defaultNoteBackground is already the real
            // persisted value by the time the note is created, and strips
            // the query param immediately so a later reload or back press
            // doesn't keep re-triggering it.
            useEffect(() => {
                if (loading) return;
                const params = new URLSearchParams(window.location.search);
                if (params.get('new') !== '1') return;
                history.replaceState(null, '', window.location.pathname);
                createNote();
            }, [loading]);

            useEffect(() => {
                const meta = document.querySelector('meta[name="theme-color"]');
                if (meta) meta.setAttribute('content', resolveStatusBarColor(settings.dashboardBackground));
            }, [settings.dashboardBackground]);

            // Safety net for iOS Safari's sub-pixel rendering gap at the
            // bottom edge of position:fixed full-screen panels (NoteEditor /
            // TrashScreen), which lets the plain <body> background show
            // through as a thin gray strip below the home indicator. Keeping
            // <body> itself painted with whatever background is currently
            // active makes any such gap imperceptible instead of chasing the
            // exact geometry bug.
            useEffect(() => {
                const activeNote = activeNoteId ? notes.find(n => n.id === activeNoteId) : null;
                const bg = activeNote ? activeNote.background : settings.dashboardBackground;
                const resolved = resolvePageBackground(bg);
                document.body.style.backgroundImage = resolved.backgroundImage || 'none';
                document.body.style.backgroundColor = resolved.background || '';
            }, [activeNoteId, notes, settings.dashboardBackground]);

            const persistNote = useCallback((updatedNote) => {
                setNotes((prev) => {
                    const exists = prev.some(n => n.id === updatedNote.id);
                    return exists
                        ? prev.map(n => n.id === updatedNote.id ? updatedNote : n)
                        : [updatedNote, ...prev];
                });
                if (db) idbPut(db, 'notes', updatedNote);
            }, [db]);

            const trashNote = useCallback((id) => {
                setNotes((prev) => prev.map((n) => {
                    if (n.id !== id) return n;
                    const updated = { ...n, deletedAt: Date.now(), updatedAt: Date.now() };
                    if (db) idbPut(db, 'notes', updated);
                    return updated;
                }));
                if (trashToastTimer.current) clearTimeout(trashToastTimer.current);
                setTrashToast(id);
                trashToastTimer.current = setTimeout(() => setTrashToast(null), 5000);
            }, [db]);

            const undoTrashNote = useCallback((id) => {
                if (trashToastTimer.current) clearTimeout(trashToastTimer.current);
                setTrashToast(null);
                setNotes((prev) => prev.map((n) => {
                    if (n.id !== id) return n;
                    const updated = { ...n, deletedAt: null };
                    if (db) idbPut(db, 'notes', updated);
                    return updated;
                }));
            }, [db]);

            const togglePin = useCallback((id) => {
                setNotes((prev) => prev.map((n) => {
                    if (n.id !== id) return n;
                    const updated = { ...n, pinned: !n.pinned };
                    if (db) idbPut(db, 'notes', updated);
                    return updated;
                }));
            }, [db]);

            const toggleSelectMode = () => {
                setSelectMode((v) => !v);
                setSelectedIds([]);
            };

            const toggleSelected = (id) => {
                setSelectedIds((prev) => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            };

            const batchTrashSelected = () => {
                const ids = selectedIds;
                setNotes((prev) => prev.map((n) => {
                    if (!ids.includes(n.id)) return n;
                    const updated = { ...n, deletedAt: Date.now(), updatedAt: Date.now() };
                    if (db) idbPut(db, 'notes', updated);
                    return updated;
                }));
                setSelectedIds([]);
                setSelectMode(false);
            };

            // Mirrors the "toggle all formats" convention used for line
            // formatting: if every selected note is already pinned, unpin them
            // all; otherwise pin whichever aren't pinned yet.
            const batchTogglePinSelected = () => {
                const ids = selectedIds;
                const allPinned = notes.filter(n => ids.includes(n.id)).every(n => n.pinned);
                setNotes((prev) => prev.map((n) => {
                    if (!ids.includes(n.id)) return n;
                    const updated = { ...n, pinned: !allPinned };
                    if (db) idbPut(db, 'notes', updated);
                    return updated;
                }));
                setSelectedIds([]);
                setSelectMode(false);
            };

            const batchAddCategoryToSelected = (categoryId) => {
                const ids = selectedIds;
                setNotes((prev) => prev.map((n) => {
                    if (!ids.includes(n.id) || (n.categoryIds && n.categoryIds.includes(categoryId))) return n;
                    const updated = { ...n, categoryIds: [...(n.categoryIds || []), categoryId] };
                    if (db) idbPut(db, 'notes', updated);
                    return updated;
                }));
            };

            const restoreNote = useCallback((id) => {
                setNotes((prev) => prev.map((n) => {
                    if (n.id !== id) return n;
                    const updated = { ...n, deletedAt: null };
                    if (db) idbPut(db, 'notes', updated);
                    return updated;
                }));
            }, [db]);

            const deleteForever = useCallback((id) => {
                setNotes((prev) => prev.filter(n => n.id !== id));
                if (db) idbDelete(db, 'notes', id);
            }, [db]);

            const emptyTrash = useCallback(() => {
                setNotes((prev) => {
                    prev.filter(n => n.deletedAt).forEach((n) => { if (db) idbDelete(db, 'notes', n.id); });
                    return prev.filter(n => !n.deletedAt);
                });
            }, [db]);

            const createNote = () => {
                const categoryId = filterCategory !== 'all' && filterCategory !== 'uncategorized' ? filterCategory : null;
                const note = blankNote(categoryId ? [categoryId] : [], settings.defaultNoteBackground);
                setNotes((prev) => [note, ...prev]);
                if (db) idbPut(db, 'notes', note);
                setActiveNoteId(note.id);
            };

            const createNoteFromTemplate = (template) => {
                setShowTemplatePicker(false);
                if (!template) { createNote(); return; }
                const categoryId = filterCategory !== 'all' && filterCategory !== 'uncategorized' ? filterCategory : null;
                const note = noteFromTemplate(template, categoryId ? [categoryId] : []);
                setNotes((prev) => [note, ...prev]);
                if (db) idbPut(db, 'notes', note);
                setActiveNoteId(note.id);
            };

            const saveTemplate = (name, sourceNote) => {
                const tmpl = {
                    id: makeId(),
                    name,
                    categoryIds: sourceNote.categoryIds || [],
                    blocks: sourceNote.blocks.map((b) => ({ type: b.type, html: b.html })),
                    photos: (sourceNote.photos || []).map((p) => ({ dataUrl: p.dataUrl })),
                    table: sourceNote.table
                        ? { columns: sourceNote.table.columns, rows: sourceNote.table.rows.map((r) => ({ cells: [...r.cells] })) }
                        : null,
                    background: sourceNote.background,
                    createdAt: Date.now(),
                };
                setTemplates((prev) => [...prev, tmpl]);
                if (db) idbPut(db, 'templates', tmpl);
            };

            const updateTemplateContent = (updatedDraft) => {
                setTemplates((prev) => prev.map((t) => {
                    if (t.id !== editingTemplateId) return t;
                    const updated = {
                        ...t,
                        name: updatedDraft.title || t.name,
                        categoryIds: updatedDraft.categoryIds || [],
                        blocks: updatedDraft.blocks.map((b) => ({ type: b.type, html: b.html })),
                        photos: (updatedDraft.photos || []).map((p) => ({ dataUrl: p.dataUrl })),
                        table: updatedDraft.table
                            ? { columns: updatedDraft.table.columns, rows: updatedDraft.table.rows.map((r) => ({ cells: [...r.cells] })) }
                            : null,
                        background: updatedDraft.background,
                    };
                    if (db) idbPut(db, 'templates', updated);
                    return updated;
                }));
            };

            const deleteTemplate = (id) => {
                setTemplates((prev) => prev.filter(t => t.id !== id));
                if (db) idbDelete(db, 'templates', id);
                setEditingTemplateId((current) => current === id ? null : current);
            };

            // A plain tap opens the Blank note / template picker — long-press
            // used to trigger this instead, but holding the button down was
            // prone to also kicking off Android's native text-selection menu.
            const handleFabClick = () => setShowTemplatePicker(true);

            const addCategory = (name, color) => {
                const id = makeId();
                setCategories((prev) => {
                    const nextOrder = prev.length ? Math.max(...prev.map(c => c.order || 0)) + 1 : 0;
                    const cat = { id, name, color, order: nextOrder };
                    if (db) idbPut(db, 'categories', cat);
                    return [...prev, cat];
                });
                return id;
            };

            // Splices the dragged category to targetId's position and
            // immediately reassigns sequential `order` values, mirroring
            // reorderNotes — the sort-by-order render would otherwise snap
            // the array position back on the very next update.
            const reorderCategories = (prev, draggedId, targetId) => {
                const dragIdx = prev.findIndex(c => c.id === draggedId);
                const targetIdx = prev.findIndex(c => c.id === targetId);
                if (dragIdx === -1 || targetIdx === -1) return prev;
                const reordered = [...prev];
                const [moved] = reordered.splice(dragIdx, 1);
                reordered.splice(targetIdx, 0, moved);
                return reordered.map((c, idx) => ({ ...c, order: idx }));
            };

            const persistCategoryOrder = (cats) => {
                cats.forEach((c) => { if (db) idbPut(db, 'categories', c); });
            };

            // Category rows are reordered via a dedicated drag handle rather
            // than a long-press on the whole row, since the row also holds a
            // text input for renaming — a long-press there would fight with
            // placing a text cursor.
            const handleCategoryHandlePointerDown = (e, categoryId) => {
                e.currentTarget.setPointerCapture(e.pointerId);
                categoryDragRef.current = { pointerId: e.pointerId, categoryId };
                setDraggingCategoryId(categoryId);
                if (navigator.vibrate) navigator.vibrate(12);
            };

            const handleCategoryHandlePointerMove = (e) => {
                if (categoryDragRef.current.pointerId !== e.pointerId || !categoryDragRef.current.categoryId) return;
                e.preventDefault();
                const el = document.elementFromPoint(e.clientX, e.clientY);
                const rowEl = el && el.closest('[data-category-id]');
                const targetId = rowEl && rowEl.getAttribute('data-category-id');
                if (targetId && targetId !== categoryDragRef.current.categoryId) {
                    setCategories((prev) => reorderCategories(prev, categoryDragRef.current.categoryId, targetId));
                }
            };

            const handleCategoryHandlePointerUp = () => {
                if (categoryDragRef.current.categoryId) {
                    setCategories((prev) => {
                        persistCategoryOrder(prev);
                        return prev;
                    });
                }
                categoryDragRef.current = { pointerId: null, categoryId: null };
                setDraggingCategoryId(null);
            };

            const renameCategory = (id, name) => {
                setCategories((prev) => prev.map(c => c.id === id ? { ...c, name } : c));
                const cat = categories.find(c => c.id === id);
                if (db && cat) idbPut(db, 'categories', { ...cat, name });
            };

            const deleteCategory = (id) => {
                setCategories((prev) => prev.filter(c => c.id !== id));
                if (db) idbDelete(db, 'categories', id);
                const affected = notes.filter(n => n.categoryIds && n.categoryIds.includes(id));
                affected.forEach((n) => {
                    const updated = { ...n, categoryIds: n.categoryIds.filter(cid => cid !== id) };
                    if (db) idbPut(db, 'notes', updated);
                });
                if (affected.length > 0) {
                    setNotes((prev) => prev.map(n => (n.categoryIds && n.categoryIds.includes(id))
                        ? { ...n, categoryIds: n.categoryIds.filter(cid => cid !== id) }
                        : n));
                }
                const affectedTemplates = templates.filter(t => t.categoryIds && t.categoryIds.includes(id));
                affectedTemplates.forEach((t) => {
                    const updated = { ...t, categoryIds: t.categoryIds.filter(cid => cid !== id) };
                    if (db) idbPut(db, 'templates', updated);
                });
                if (affectedTemplates.length > 0) {
                    setTemplates((prev) => prev.map(t => (t.categoryIds && t.categoryIds.includes(id))
                        ? { ...t, categoryIds: t.categoryIds.filter(cid => cid !== id) }
                        : t));
                }
                if (filterCategory === id) setFilterCategory('all');
                setDeleteCategoryId(null);
            };

            const updateDashboardBackground = (bg) => {
                // Persist the whole settings object (not just this field) — an
                // idbPut with a partial object would otherwise silently drop
                // defaultNoteBackground (or any future setting) from storage.
                setSettings((s) => {
                    const updated = { ...s, dashboardBackground: bg };
                    if (db) idbPut(db, 'settings', updated);
                    return updated;
                });
                if (bg) {
                    localStorage.setItem('dashboardBackground', bg);
                } else {
                    localStorage.removeItem('dashboardBackground');
                }
            };

            const updateDefaultNoteBackground = (bg) => {
                setSettings((s) => {
                    const updated = { ...s, defaultNoteBackground: bg };
                    if (db) idbPut(db, 'settings', updated);
                    return updated;
                });
            };

            const updateNoteSortMode = (mode) => {
                setSettings((s) => {
                    const updated = { ...s, noteSortMode: mode };
                    if (db) idbPut(db, 'settings', updated);
                    return updated;
                });
            };

            const updateDashboardIconOrder = (order) => {
                setSettings((s) => {
                    const updated = { ...s, dashboardIconOrder: order };
                    if (db) idbPut(db, 'settings', updated);
                    return updated;
                });
            };

            const updateEditorIconOrder = (order) => {
                setSettings((s) => {
                    const updated = { ...s, editorIconOrder: order };
                    if (db) idbPut(db, 'settings', updated);
                    return updated;
                });
            };

            const setAppPin = async (pin) => {
                const pinHash = await hashPin(pin);
                setSettings((s) => {
                    const updated = { ...s, pinHash };
                    if (db) idbPut(db, 'settings', updated);
                    return updated;
                });
                setPinUnlockedThisSession(true);
            };

            const removeAppPin = () => {
                setSettings((s) => {
                    const updated = { ...s, pinHash: null };
                    if (db) idbPut(db, 'settings', updated);
                    return updated;
                });
            };

            const verifyPin = async (pin) => {
                if (!settings.pinHash) return true;
                const hash = await hashPin(pin);
                return hash === settings.pinHash;
            };

            const exportAllData = () => {
                const payload = {
                    app: 'Sly Notes',
                    version: APP_VERSION,
                    exportedAt: Date.now(),
                    notes,
                    categories,
                    settings,
                };
                const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'sly-notes-backup-' + new Date().toISOString().slice(0, 10) + '.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const handleImportFile = (file) => {
                setImportError('');
                const reader = new FileReader();
                reader.onload = () => {
                    try {
                        const parsed = JSON.parse(reader.result);
                        if (!parsed || !Array.isArray(parsed.notes) || !Array.isArray(parsed.categories)) {
                            setImportError("That file doesn't look like a Sly Notes backup.");
                            return;
                        }
                        setPendingImport(parsed);
                    } catch (err) {
                        setImportError('Could not read that file — is it a Sly Notes backup?');
                    }
                };
                reader.onerror = () => setImportError('Could not read that file.');
                reader.readAsText(file);
            };

            // Upserts by id so importing a backup never wipes out notes/categories
            // created since the backup was made — matching ids are overwritten,
            // everything else is left alone.
            const confirmImport = () => {
                if (!pendingImport || !db) return;
                const importedNotes = pendingImport.notes.map(migrateNote);
                importedNotes.forEach((n) => idbPut(db, 'notes', n));
                pendingImport.categories.forEach((c) => idbPut(db, 'categories', c));
                setNotes((prev) => {
                    const byId = Object.fromEntries(prev.map(n => [n.id, n]));
                    importedNotes.forEach((n) => { byId[n.id] = n; });
                    return Object.values(byId);
                });
                setCategories((prev) => {
                    const byId = Object.fromEntries(prev.map(c => [c.id, c]));
                    pendingImport.categories.forEach((c) => { byId[c.id] = c; });
                    return Object.values(byId).sort((a, b) => (a.order || 0) - (b.order || 0));
                });
                if (pendingImport.settings && pendingImport.settings.dashboardBackground !== undefined) {
                    updateDashboardBackground(pendingImport.settings.dashboardBackground);
                }
                setPendingImport(null);
            };

            // Splices the dragged note to targetId's position and immediately
            // reassigns sequential `order` values to the whole visible set. The
            // render always re-sorts notes by `order`, so reordering array
            // *position* alone (without touching `order`) gets silently undone by
            // the very next render — this keeps the sort key itself live during
            // the drag, not just at drop.
            const reorderNotes = (prev, draggedId, targetId) => {
                const active = prev.filter(n => !n.deletedAt).sort(noteSortCompare);
                const trashed = prev.filter(n => n.deletedAt);
                const dragIdx = active.findIndex(n => n.id === draggedId);
                const targetIdx = active.findIndex(n => n.id === targetId);
                if (dragIdx === -1 || targetIdx === -1) return prev;
                const reordered = [...active];
                const [moved] = reordered.splice(dragIdx, 1);
                reordered.splice(targetIdx, 0, moved);
                const base = Date.now();
                const renumbered = reordered.map((n, idx) => ({ ...n, order: base - idx }));
                return [...renumbered, ...trashed];
            };

            const handleCardPointerDown = (e, noteId) => {
                if (filterCategory !== 'all') return;
                e.currentTarget.setPointerCapture(e.pointerId);
                dragRef.current = { pointerId: e.pointerId, noteId, timer: null, dragging: false, startX: e.clientX, startY: e.clientY };
                dragRef.current.timer = setTimeout(() => {
                    dragRef.current.dragging = true;
                    setDraggingId(noteId);
                    if (navigator.vibrate) navigator.vibrate(12);
                }, 450);
            };

            const handleCardPointerMove = (e) => {
                if (dragRef.current.pointerId !== e.pointerId || !dragRef.current.noteId) return;
                if (!dragRef.current.dragging) {
                    const dx = Math.abs(e.clientX - dragRef.current.startX);
                    const dy = Math.abs(e.clientY - dragRef.current.startY);
                    if (dx > 14 || dy > 14) {
                        clearTimeout(dragRef.current.timer);
                        dragRef.current.noteId = null;
                    }
                    return;
                }
                e.preventDefault();
                const el = document.elementFromPoint(e.clientX, e.clientY);
                const cardEl = el && el.closest('[data-note-id]');
                const targetId = cardEl && cardEl.getAttribute('data-note-id');
                if (targetId && targetId !== dragRef.current.noteId) {
                    setNotes((prev) => reorderNotes(prev, dragRef.current.noteId, targetId));
                }
            };

            const handleCardPointerUp = () => {
                clearTimeout(dragRef.current.timer);
                if (dragRef.current.dragging) {
                    justDraggedRef.current = true;
                    setNotes((prev) => {
                        const active = prev.filter(n => !n.deletedAt).sort(noteSortCompare);
                        const trashed = prev.filter(n => n.deletedAt);
                        const base = Date.now();
                        const reOrdered = active.map((n, idx) => {
                            const updated = { ...n, order: base - idx };
                            if (db) idbPut(db, 'notes', updated);
                            return updated;
                        });
                        return [...reOrdered, ...trashed];
                    });
                }
                dragRef.current = { pointerId: null, noteId: null, timer: null, dragging: false, startX: 0, startY: 0 };
                setDraggingId(null);
            };

            const handleCardOpen = (noteId) => {
                if (justDraggedRef.current) {
                    justDraggedRef.current = false;
                    return;
                }
                const note = notes.find(n => n.id === noteId);
                if (note && note.locked && !pinUnlockedThisSession) {
                    setPendingUnlockNoteId(noteId);
                    return;
                }
                setActiveNoteId(noteId);
            };

            if (view === 'trash') {
                const trashedNotes = notes.filter(n => n.deletedAt).sort((a, b) => b.deletedAt - a.deletedAt);
                return (
                    <TrashScreen
                        notes={trashedNotes}
                        background={settings.dashboardBackground}
                        onBack={() => setView('home')}
                        onRestore={restoreNote}
                        onDeleteForever={deleteForever}
                        onEmptyTrash={emptyTrash}
                    />
                );
            }

            const editingTemplate = editingTemplateId ? templates.find(t => t.id === editingTemplateId) : null;

            if (editingTemplate) {
                return (
                    <NoteEditor
                        key={editingTemplate.id}
                        note={templateToNoteDraft(editingTemplate)}
                        categories={categories}
                        onBack={() => setEditingTemplateId(null)}
                        onSave={updateTemplateContent}
                        onTrash={deleteTemplate}
                        onAddCategory={addCategory}
                        isTemplate
                        editorIconOrder={settings.editorIconOrder}
                        onChangeEditorIconOrder={updateEditorIconOrder}
                    />
                );
            }

            const activeNote = activeNoteId ? notes.find(n => n.id === activeNoteId) : null;

            if (activeNote) {
                return (
                    <NoteEditor
                        key={activeNote.id}
                        note={activeNote}
                        categories={categories}
                        onBack={() => setActiveNoteId(null)}
                        onSave={persistNote}
                        onTrash={trashNote}
                        onAddCategory={addCategory}
                        onSaveTemplate={saveTemplate}
                        templates={templates}
                        hasPin={!!settings.pinHash}
                        onSetPin={setAppPin}
                        editorIconOrder={settings.editorIconOrder}
                        onChangeEditorIconOrder={updateEditorIconOrder}
                    />
                );
            }

            const noteSortMode = settings.noteSortMode || 'manual';
            const categoryById = Object.fromEntries(categories.map(c => [c.id, c]));
            const visibleNotes = notes
                .filter(n => !n.deletedAt && noteMatchesCategory(n, filterCategory) && noteMatchesSearch(n, searchQuery) && (!showPinnedOnly || n.pinned))
                .sort(makeNoteSortCompare(noteSortMode, categoryById));

            const toggleSearch = () => {
                setShowSearch((s) => {
                    if (s) setSearchQuery('');
                    return !s;
                });
            };

            // Long-press any icon below to drag it into a new position — the
            // order is saved to settings, so it applies everywhere, not just
            // this session.
            const dashboardIconDefs = {
                search: { className: 'icon-btn' + (showSearch ? ' active' : ''), title: 'Search', onClick: toggleSearch, content: '🔍' },
                pinnedFilter: { className: 'icon-btn' + (showPinnedOnly ? ' active' : ''), title: 'Show pinned only', onClick: () => setShowPinnedOnly((v) => !v), content: '📌' },
                sort: { className: 'icon-btn' + (noteSortMode !== 'manual' ? ' active' : ''), title: 'Sort notes', onClick: () => setShowSortMenu(true), content: '↕' },
                trash: { className: 'icon-btn', title: 'Trash', onClick: () => setView('trash'), content: '🗑' },
                select: { className: 'icon-btn', title: 'Select notes', onClick: toggleSelectMode, content: '☑' },
                settings: { className: 'icon-btn', title: 'Categories', onClick: () => setShowCategoryManager(true), content: '⚙' },
            };

            return (
                <div className="home-screen">
                    <div className="app-header" style={resolveHeaderBackground(settings.dashboardBackground)}>
                        <div className="header-row">
                            {selectMode ? (
                                <React.Fragment>
                                    <button className="icon-btn" onClick={toggleSelectMode} title="Cancel selection">✕</button>
                                    <div className="header-actions select-toolbar">
                                        <span className="select-count">{selectedIds.length} selected</span>
                                        <button className="icon-btn" disabled={selectedIds.length === 0} onClick={batchTogglePinSelected} title="Pin/unpin selected">📌</button>
                                        <button className="icon-btn" disabled={selectedIds.length === 0} onClick={() => setShowBatchCategory(true)} title="Add category to selected">🏷</button>
                                        <button className="icon-btn" disabled={selectedIds.length === 0} onClick={batchTrashSelected} title="Trash selected">🗑</button>
                                    </div>
                                </React.Fragment>
                            ) : (
                                <React.Fragment>
                                    <h1>📓 Sly Notes</h1>
                                    <div className="header-actions">
                                        {dashboardIconOrder.map((id) => {
                                            const def = dashboardIconDefs[id];
                                            if (!def) return null;
                                            return (
                                                <button
                                                    key={id}
                                                    className={def.className + (dashboardIconDrag.draggingId === id ? ' dragging' : '')}
                                                    title={def.title}
                                                    onClick={dashboardIconDrag.wrapClick(def.onClick)}
                                                    {...dashboardIconDrag.getDragProps(id)}
                                                >
                                                    {def.content}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </React.Fragment>
                            )}
                        </div>
                        {showSearch ? (
                            <div className="search-bar">
                                <form autoComplete="off" onSubmit={(e) => e.preventDefault()} style={{ display: 'contents' }}>
                                    <input
                                        type="text"
                                        className="search-input"
                                        autoComplete="notes-search-nofill"
                                        data-lpignore="true"
                                        data-form-type="other"
                                        placeholder="Search notes..."
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        autoFocus
                                    />
                                </form>
                                {searchQuery ? (
                                    <button className="search-clear-btn" onClick={() => setSearchQuery('')}>✕</button>
                                ) : null}
                            </div>
                        ) : null}
                        <div className="category-tabs">
                            <button
                                className={'category-pill' + (filterCategory === 'all' ? ' active' : '')}
                                onClick={() => setFilterCategory('all')}
                            >
                                All
                            </button>
                            <button
                                className={'category-pill' + (filterCategory === 'uncategorized' ? ' active' : '')}
                                onClick={() => setFilterCategory('uncategorized')}
                            >
                                Uncategorized
                            </button>
                            {categories.map((cat) => (
                                <button
                                    key={cat.id}
                                    className={'category-pill' + (filterCategory === cat.id ? ' active' : '')}
                                    onClick={() => setFilterCategory(cat.id)}
                                >
                                    <span className="color-dot" style={{ background: cat.color }}></span>
                                    {cat.name}
                                </button>
                            ))}
                            <button className="category-pill add-pill" onClick={() => setShowCategoryManager(true)}>+</button>
                        </div>
                    </div>

                    <div className="notes-area" style={resolvePageBackground(settings.dashboardBackground)}>
                        {loading ? null : visibleNotes.length === 0 ? (
                            <div className="empty-state">
                                <div className="emoji">{searchQuery.trim() ? '🔍' : showPinnedOnly ? '📌' : '🗒️'}</div>
                                {searchQuery.trim() ? (
                                    <p>No notes match "{searchQuery.trim()}".</p>
                                ) : showPinnedOnly ? (
                                    <p>No pinned notes yet.<br/>Tap 📌 on a note to pin it.</p>
                                ) : (
                                    <p>No notes here yet.<br/>Tap + to create one.</p>
                                )}
                            </div>
                        ) : (
                            <div className="notes-grid">
                                {visibleNotes.map((note) => (
                                    <NoteCard
                                        key={note.id}
                                        note={note}
                                        noteCategories={(note.categoryIds || []).map(id => categoryById[id]).filter(Boolean)}
                                        onOpen={handleCardOpen}
                                        onTrash={trashNote}
                                        onTogglePin={togglePin}
                                        dragEnabled={filterCategory === 'all' && !selectMode && noteSortMode === 'manual'}
                                        isDragging={draggingId === note.id}
                                        onCardPointerDown={handleCardPointerDown}
                                        onCardPointerMove={handleCardPointerMove}
                                        onCardPointerUp={handleCardPointerUp}
                                        selectMode={selectMode}
                                        selected={selectedIds.includes(note.id)}
                                        onToggleSelect={toggleSelected}
                                    />
                                ))}
                            </div>
                        )}
                    </div>

                    <button
                        className="fab"
                        onClick={handleFabClick}
                        onContextMenu={(e) => e.preventDefault()}
                    >
                        +
                    </button>

                    {showTemplatePicker ? (
                        <TemplatePickerSheet
                            background={settings.dashboardBackground}
                            templates={templates}
                            onPick={createNoteFromTemplate}
                            onEditTemplate={(id) => { setShowTemplatePicker(false); setEditingTemplateId(id); }}
                            onDeleteTemplate={deleteTemplate}
                            onClose={() => setShowTemplatePicker(false)}
                        />
                    ) : null}

                    {showBatchCategory ? (
                        <BatchCategorySheet
                            background={settings.dashboardBackground}
                            categories={categories}
                            onAddCategory={batchAddCategoryToSelected}
                            onClose={() => { setShowBatchCategory(false); setSelectedIds([]); setSelectMode(false); }}
                        />
                    ) : null}

                    {showSortMenu ? (
                        <SortMenuSheet
                            background={settings.dashboardBackground}
                            value={noteSortMode}
                            onChange={updateNoteSortMode}
                            onClose={() => setShowSortMenu(false)}
                        />
                    ) : null}

                    {pendingUnlockNoteId ? (
                        <PinEntrySheet
                            title="Enter PIN"
                            message="This note is locked."
                            onConfirm={async (pin) => {
                                const ok = await verifyPin(pin);
                                if (ok) {
                                    setPinUnlockedThisSession(true);
                                    setActiveNoteId(pendingUnlockNoteId);
                                    setPendingUnlockNoteId(null);
                                }
                                return ok;
                            }}
                            onCancel={() => setPendingUnlockNoteId(null)}
                            onForgotPin={() => {
                                removeAppPin();
                                setPinUnlockedThisSession(true);
                                setActiveNoteId(pendingUnlockNoteId);
                                setPendingUnlockNoteId(null);
                            }}
                        />
                    ) : null}

                    {pinFlow === 'setup' ? (
                        <PinSetupSheet
                            title="Set a PIN"
                            onConfirm={async (pin) => { await setAppPin(pin); setPinFlow(null); }}
                            onCancel={() => setPinFlow(null)}
                        />
                    ) : null}

                    {pinFlow === 'change-verify' ? (
                        <PinEntrySheet
                            title="Enter current PIN"
                            onConfirm={async (pin) => {
                                const ok = await verifyPin(pin);
                                if (ok) setPinFlow('change-setup');
                                return ok;
                            }}
                            onCancel={() => setPinFlow(null)}
                            onForgotPin={() => { removeAppPin(); setPinFlow(null); }}
                        />
                    ) : null}

                    {pinFlow === 'change-setup' ? (
                        <PinSetupSheet
                            title="Set a new PIN"
                            onConfirm={async (pin) => { await setAppPin(pin); setPinFlow(null); }}
                            onCancel={() => setPinFlow(null)}
                        />
                    ) : null}

                    {pinFlow === 'remove-verify' ? (
                        <PinEntrySheet
                            title="Enter current PIN"
                            message="Removing the PIN leaves any locked notes unlocked until a new one is set."
                            onConfirm={async (pin) => {
                                const ok = await verifyPin(pin);
                                if (ok) { removeAppPin(); setPinFlow(null); }
                                return ok;
                            }}
                            onCancel={() => setPinFlow(null)}
                            onForgotPin={() => { removeAppPin(); setPinFlow(null); }}
                        />
                    ) : null}

                    {trashToast ? (
                        <div className="undo-toast">
                            <span>Note moved to trash</span>
                            <button onClick={() => undoTrashNote(trashToast)}>Undo</button>
                        </div>
                    ) : null}

                    {showCategoryManager ? (
                        <CategoryManagerSheet
                            background={settings.dashboardBackground}
                            categories={categories}
                            onAdd={addCategory}
                            onRename={renameCategory}
                            onDelete={(id) => setDeleteCategoryId(id)}
                            onClose={() => { setShowCategoryManager(false); setImportError(''); }}
                            draggingCategoryId={draggingCategoryId}
                            onHandlePointerDown={handleCategoryHandlePointerDown}
                            onHandlePointerMove={handleCategoryHandlePointerMove}
                            onHandlePointerUp={handleCategoryHandlePointerUp}
                            onExport={exportAllData}
                            onImportFile={handleImportFile}
                            importError={importError}
                            defaultNoteBackground={settings.defaultNoteBackground}
                            onChangeDefaultNoteBackground={updateDefaultNoteBackground}
                            dashboardBackground={settings.dashboardBackground}
                            onChangeDashboardBackground={updateDashboardBackground}
                            hasPin={!!settings.pinHash}
                            onStartPinSetup={() => { setShowCategoryManager(false); setPinFlow('setup'); }}
                            onStartPinChange={() => { setShowCategoryManager(false); setPinFlow('change-verify'); }}
                            onStartPinRemove={() => { setShowCategoryManager(false); setPinFlow('remove-verify'); }}
                        />
                    ) : null}


                    {deleteCategoryId ? (
                        <ConfirmSheet
                            title="Delete category?"
                            message="Notes in this category will become uncategorized."
                            confirmLabel="Delete"
                            onCancel={() => setDeleteCategoryId(null)}
                            onConfirm={() => deleteCategory(deleteCategoryId)}
                        />
                    ) : null}

                    {pendingImport ? (
                        <ConfirmSheet
                            title="Import backup?"
                            message={'This will add ' + pendingImport.notes.length + ' note(s) and ' + pendingImport.categories.length + ' categor' + (pendingImport.categories.length === 1 ? 'y' : 'ies') + ' from the backup, overwriting any with matching IDs. Nothing else is removed.'}
                            confirmLabel="Import"
                            onCancel={() => setPendingImport(null)}
                            onConfirm={confirmImport}
                        />
                    ) : null}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            let swRegistration = null;

            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').then((reg) => {
                    swRegistration = reg;
                    // register() alone doesn't reliably re-check for a new
                    // worker on every launch — Android often resumes an
                    // installed PWA from a suspended process instead of a
                    // fresh navigation, which skips the browser's own update
                    // check entirely. Force one explicitly every time.
                    reg.update().catch(() => {});
                }).catch((err) => {
                    console.error('Service worker registration failed:', err);
                });
            });

            // Also force a check whenever the app becomes visible again
            // (e.g. switching back to it from the recent-apps list), which
            // covers the common case where the process never fully died.
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && swRegistration) {
                    swRegistration.update().catch(() => {});
                }
            });

            // With skipWaiting + clients.claim on the worker side, a new
            // version takes control of this already-open page automatically.
            // Reload once when that happens so the update is visible right
            // away instead of needing a manual close-and-reopen.
            let refreshingAfterUpdate = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshingAfterUpdate) return;
                refreshingAfterUpdate = true;
                window.location.reload();
            });
        }
    </script>
</body>
</html>
