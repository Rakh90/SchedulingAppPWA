                    updateDashboardBackground(pendingImport.settings.dashboardBackground);
                }
                setPendingImport(null);
            };

            // Splices the dragged note to targetId's position and immediately
            // reassigns sequential `order` values to the whole visible set. The
            // render always re-sorts notes by `order`, so reordering array
            // *position* alone (without touching `order`) gets silently undone by
            // the very next render — this keeps the sort key itself live during
            // the drag, not just at drop.
            const reorderNotes = (prev, draggedId, targetId) => {
                const active = prev.filter(n => !n.deletedAt).sort(noteSortCompare);
                const trashed = prev.filter(n => n.deletedAt);
                const dragIdx = active.findIndex(n => n.id === draggedId);
                const targetIdx = active.findIndex(n => n.id === targetId);
                if (dragIdx === -1 || targetIdx === -1) return prev;
                const reordered = [...active];
                const [moved] = reordered.splice(dragIdx, 1);
                reordered.splice(targetIdx, 0, moved);
                const base = Date.now();
                const renumbered = reordered.map((n, idx) => ({ ...n, order: base - idx }));
                return [...renumbered, ...trashed];
            };

            // These three (and handleCardOpen below) are useCallback-stable
            // for the same reason as toggleSelected: they're passed to every
            // memoized NoteCard.
            const handleCardPointerDown = useCallback((e, noteId) => {
                if (filterCategory !== 'all') return;
                e.currentTarget.setPointerCapture(e.pointerId);
                dragRef.current = { pointerId: e.pointerId, noteId, timer: null, dragging: false, startX: e.clientX, startY: e.clientY };
                dragRef.current.timer = setTimeout(() => {
                    dragRef.current.dragging = true;
                    setDraggingId(noteId);
                    if (navigator.vibrate) navigator.vibrate(12);
                }, 450);
            }, [filterCategory]);

            const handleCardPointerMove = useCallback((e) => {
                if (dragRef.current.pointerId !== e.pointerId || !dragRef.current.noteId) return;
                if (!dragRef.current.dragging) {
                    const dx = Math.abs(e.clientX - dragRef.current.startX);
                    const dy = Math.abs(e.clientY - dragRef.current.startY);
                    if (dx > 14 || dy > 14) {
                        clearTimeout(dragRef.current.timer);
                        dragRef.current.noteId = null;
                    }
                    return;
                }
                e.preventDefault();
                const el = document.elementFromPoint(e.clientX, e.clientY);
                const cardEl = el && el.closest('[data-note-id]');
                const targetId = cardEl && cardEl.getAttribute('data-note-id');
                if (targetId && targetId !== dragRef.current.noteId) {
                    setNotes((prev) => reorderNotes(prev, dragRef.current.noteId, targetId));
                }
                // reorderNotes is pure (operates only on its arguments), so
                // capturing the first render's instance here is safe.
            }, []);

            const handleCardPointerUp = useCallback(() => {
                clearTimeout(dragRef.current.timer);
                if (dragRef.current.dragging) {
                    justDraggedRef.current = true;
                    setNotes((prev) => {
                        const active = prev.filter(n => !n.deletedAt).sort(noteSortCompare);
                        const trashed = prev.filter(n => n.deletedAt);
                        const base = Date.now();
                        const reOrdered = active.map((n, idx) => {
                            const updated = { ...n, order: base - idx };
                            if (db) idbPut(db, 'notes', updated);
                            return updated;
                        });
                        return [...reOrdered, ...trashed];
                    });
                }
                dragRef.current = { pointerId: null, noteId: null, timer: null, dragging: false, startX: 0, startY: 0 };
                setDraggingId(null);
            }, [db]);

            // Read `notes` through a ref so handleCardOpen doesn't need the
            // notes array as a dependency — otherwise every note edit would
            // mint a new callback and re-render all memoized cards, exactly
            // what the memoization is there to prevent.
            const notesRef = useRef(notes);
            notesRef.current = notes;

            const handleCardOpen = useCallback((noteId) => {
                if (justDraggedRef.current) {
                    justDraggedRef.current = false;
                    return;
                }
                const note = notesRef.current.find(n => n.id === noteId);
                if (note && note.locked && !pinUnlockedThisSession) {
                    setPendingUnlockNoteId(noteId);
                    return;
                }
                setActiveNoteId(noteId);
            }, [pinUnlockedThisSession]);

            // Memoized so the dashboard doesn't re-filter/re-sort (and, pre-
            // cache, re-parse every note's HTML) on unrelated re-renders —
            // only when the inputs below actually change. Declared before the
            // early returns below, like every other hook in App.
            const categoryById = useMemo(
                () => Object.fromEntries(categories.map(c => [c.id, c])),
                [categories]
            );
            const noteSortMode = settings.noteSortMode || 'manual';
            const visibleNotes = useMemo(
                () => notes
                    .filter(n => !n.deletedAt && noteMatchesCategory(n, filterCategory) && noteMatchesSearch(n, searchQuery) && (!showPinnedOnly || n.pinned))
                    .sort(makeNoteSortCompare(noteSortMode, categoryById)),
                [notes, filterCategory, searchQuery, showPinnedOnly, noteSortMode, categoryById]
            );

            // Declared here (before the Trash-screen early return below) so
            // this hook always runs, regardless of which view is showing —
            // React requires every hook to run on every render, in the same
            // order, or it throws (error #300).
            const dashboardViewMode = settings.dashboardViewMode || 'pills';
            const folderIconTheme = FOLDER_ICON_THEMES.find((t) => t.id === settings.folderIconTheme) || FOLDER_ICON_THEMES[0];
            const allFolderIconTheme = (settings.allFolderIcon && FOLDER_ICON_THEMES.find((t) => t.id === settings.allFolderIcon)) || folderIconTheme;
            const uncategorizedFolderIconTheme = (settings.uncategorizedFolderIcon && FOLDER_ICON_THEMES.find((t) => t.id === settings.uncategorizedFolderIcon)) || folderIconTheme;
            const appIdentity = APP_IDENTITY_OPTIONS.find((o) => o.id === settings.appIdentity) || APP_IDENTITY_OPTIONS[0];
            useEffect(() => {
                document.title = appIdentity.label;
            }, [appIdentity.label]);
            // Folder view starts with nothing selected (no notes shown) and
            // tapping the already-active folder deselects it, rather than
            // always showing "All" the way the pill row does — switching
            // back to pills falls back to "All" so that view still always
            // shows something, matching its existing behavior.
            const prevDashboardViewModeRef = useRef(dashboardViewMode);
            useEffect(() => {
                const prev = prevDashboardViewModeRef.current;
                if (dashboardViewMode === 'folders' && prev !== 'folders') {
                    setFilterCategory(null);
                } else if (dashboardViewMode !== 'folders' && prev === 'folders' && filterCategory === null) {
                    setFilterCategory('all');
                }
                prevDashboardViewModeRef.current = dashboardViewMode;
            }, [dashboardViewMode]);

            if (view === 'trash') {
                const trashedNotes = notes.filter(n => n.deletedAt).sort((a, b) => b.deletedAt - a.deletedAt);
                return (
                    <TrashScreen
                        notes={trashedNotes}
                        background={settings.dashboardBackground}
                        onBack={() => setView('home')}
                        onRestore={restoreNote}
                        onDeleteForever={deleteForever}
                        onEmptyTrash={emptyTrash}
                    />
                );
            }

            const editingTemplate = editingTemplateId ? templates.find(t => t.id === editingTemplateId) : null;

            if (editingTemplate) {
                return (
                    <NoteEditor
                        key={editingTemplate.id}
                        note={templateToNoteDraft(editingTemplate)}
                        categories={categories}
                        onBack={() => setEditingTemplateId(null)}
                        onSave={updateTemplateContent}
                        onTrash={deleteTemplate}
                        onAddCategory={addCategory}
                        isTemplate
                        editorIconOrder={settings.editorIconOrder}
                        onChangeEditorIconOrder={updateEditorIconOrder}
                        tableTemplates={settings.tableTemplates || []}
                        onSaveTableTemplate={saveTableTemplate}
                        mileagePresetHidden={settings.mileagePresetHidden}
                    />
                );
            }

            const activeNote = activeNoteId ? notes.find(n => n.id === activeNoteId) : null;

            if (activeNote) {
                return (
                    <NoteEditor
                        key={activeNote.id}
                        note={activeNote}
                        categories={categories}
                        onBack={() => setActiveNoteId(null)}
                        onSave={persistNote}
                        onTrash={trashNote}
                        onAddCategory={addCategory}
                        onSaveTemplate={saveTemplate}
                        templates={templates}
                        hasPin={!!settings.pinHash}
                        onSetPin={setAppPin}
                        editorIconOrder={settings.editorIconOrder}
                        onChangeEditorIconOrder={updateEditorIconOrder}
                        tableTemplates={settings.tableTemplates || []}
                        onSaveTableTemplate={saveTableTemplate}
                        mileagePresetHidden={settings.mileagePresetHidden}
                    />
                );
            }

            // noteSortMode / categoryById / visibleNotes are computed above
            // (memoized, before the early returns) — see the useMemo block
            // following handleCardOpen.
            const selectedFolderName = dashboardViewMode === 'folders' && filterCategory
                ? (filterCategory === 'all' ? 'All' : filterCategory === 'uncategorized' ? 'Uncategorized' : (categories.find(c => c.id === filterCategory) || {}).name)
                : null;
            const dashboardBackgroundDark = isThemeDark(settings.dashboardBackground);

            const toggleFolder = (id) => setFilterCategory((current) => current === id ? null : id);

            const toggleSearch = () => {
                setShowSearch((s) => {
                    if (s) setSearchQuery('');
                    return !s;
                });
            };

            // Long-press any icon below to drag it into a new position — the
            // order is saved to settings, so it applies everywhere, not just
            // this session.
            const dashboardIconDefs = {
                search: { className: 'icon-btn' + (showSearch ? ' active' : ''), title: 'Search', onClick: toggleSearch, content: '🔍' },
                pinnedFilter: { className: 'icon-btn' + (showPinnedOnly ? ' active' : ''), title: 'Show pinned only', onClick: () => setShowPinnedOnly((v) => !v), content: '📌' },
                sort: { className: 'icon-btn' + (noteSortMode !== 'manual' ? ' active' : ''), title: 'Sort notes', onClick: () => setShowSortMenu(true), content: '↕' },
                folderView: {
                    className: 'icon-btn' + (dashboardViewMode === 'folders' ? ' active' : ''),
                    title: dashboardViewMode === 'folders' ? 'Switch to category tabs' : 'Switch to folder view',
                    onClick: () => updateDashboardViewMode(dashboardViewMode === 'folders' ? 'pills' : 'folders'),
                    content: '📁',
                },
                trash: { className: 'icon-btn', title: 'Trash', onClick: () => setView('trash'), content: '🗑' },
                select: { className: 'icon-btn', title: 'Select notes', onClick: toggleSelectMode, content: '☑' },
                settings: { className: 'icon-btn', title: 'Categories', onClick: () => setShowCategoryManager(true), content: '⚙' },
            };

            return (
                <div className="home-screen">
                    <div className="app-header" style={resolveHeaderBackground(settings.dashboardBackground)}>
                        <div className="header-row">
                            {selectMode ? (
                                <React.Fragment>
                                    <button className="icon-btn" onClick={toggleSelectMode} title="Cancel selection">✕</button>
                                    <div className="header-actions select-toolbar">
                                        <span className="select-count">{selectedIds.length} selected</span>
                                        <button className="icon-btn" disabled={selectedIds.length === 0} onClick={batchTogglePinSelected} title="Pin/unpin selected">📌</button>
                                        <button className="icon-btn" disabled={selectedIds.length === 0} onClick={() => setShowBatchCategory(true)} title="Add category to selected">🏷</button>
                                        <button className="icon-btn" disabled={selectedIds.length === 0} onClick={batchTrashSelected} title="Trash selected">🗑</button>
                                    </div>
                                </React.Fragment>
                            ) : (
                                <React.Fragment>
                                    <h1>
                                        {appIdentity.img ? (
                                            <img className="app-header-icon-img" src={appIdentity.img} alt="" aria-hidden="true" />
                                        ) : (
                                            <span aria-hidden="true">{appIdentity.emoji}</span>
                                        )}
                                        {appIdentity.label}
                                    </h1>
                                    <div className="header-actions">
                                        {dashboardIconOrder.map((id) => {
                                            const def = dashboardIconDefs[id];
                                            if (!def) return null;
                                            return (
                                                <button
                                                    key={id}
                                                    className={def.className + (dashboardIconDrag.draggingId === id ? ' dragging' : '')}
                                                    title={def.title}
                                                    onClick={dashboardIconDrag.wrapClick(def.onClick)}
                                                    {...dashboardIconDrag.getDragProps(id)}
                                                >
                                                    {def.content}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </React.Fragment>
                            )}
                        </div>
                        {showSearch ? (
                            <div className="search-bar">
                                <form autoComplete="off" onSubmit={(e) => e.preventDefault()} style={{ display: 'contents' }}>
                                    <input
                                        type="text"
                                        className="search-input"
                                        autoComplete="notes-search-nofill"
                                        data-lpignore="true"
                                        data-form-type="other"
                                        placeholder="Search notes..."
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        autoFocus
                                    />
                                </form>
                                {searchQuery ? (
                                    <button className="search-clear-btn" onClick={() => setSearchQuery('')}>✕</button>
                                ) : null}
                            </div>
                        ) : null}
                        {dashboardViewMode === 'folders' ? (
                            <div className="folder-tabs">
                                <button
                                    className={'folder-tile' + (filterCategory === 'all' ? ' active' : '')}
                                    onClick={() => toggleFolder('all')}
                                >
                                    {allFolderIconTheme.img ? (
                                        <img className="folder-tile-icon-img" src={allFolderIconTheme.img} alt="" aria-hidden="true" />
                                    ) : (
                                        <span className="folder-tile-icon" aria-hidden="true">{allFolderIconTheme.all}</span>
                                    )}
                                    <span className="folder-tile-name">All</span>
                                    <span className="folder-tile-count">{notes.filter(n => !n.deletedAt).length}</span>
                                </button>
                                <button
                                    className={'folder-tile' + (filterCategory === 'uncategorized' ? ' active' : '')}
                                    onClick={() => toggleFolder('uncategorized')}
                                >
                                    {uncategorizedFolderIconTheme.img ? (
                                        <img className="folder-tile-icon-img" src={uncategorizedFolderIconTheme.img} alt="" aria-hidden="true" />
                                    ) : (
                                        <span className="folder-tile-icon" aria-hidden="true">{uncategorizedFolderIconTheme.folder}</span>
                                    )}
                                    <span className="folder-tile-name">Uncategorized</span>
                                    <span className="folder-tile-count">{notes.filter(n => !n.deletedAt && noteMatchesCategory(n, 'uncategorized')).length}</span>
                                </button>
                                {categories.map((cat) => {
                                    const catTheme = (cat.folderIcon && FOLDER_ICON_THEMES.find((t) => t.id === cat.folderIcon)) || folderIconTheme;
                                    return (
                                        <button
                                            key={cat.id}
                                            className={'folder-tile' + (filterCategory === cat.id ? ' active' : '')}
                                            onClick={() => toggleFolder(cat.id)}
                                        >
                                            {catTheme.img ? (
                                                <img className="folder-tile-icon-img" src={catTheme.img} alt="" aria-hidden="true" />
                                            ) : (
                                                <span className="folder-tile-icon" aria-hidden="true">{catTheme.folder}</span>
                                            )}
                                            <span className="folder-tile-name">{cat.name}</span>
                                            <span className="folder-tile-count">{notes.filter(n => !n.deletedAt && noteMatchesCategory(n, cat.id)).length}</span>
                                        </button>
                                    );
                                })}
                                <button className="folder-tile folder-tile-add" onClick={() => setShowCategoryManager(true)}>
                                    <span className="folder-tile-icon" aria-hidden="true">+</span>
                                    <span className="folder-tile-name">Add</span>
                                </button>
                            </div>
                        ) : (
                            <div className="category-tabs">
                                <button
                                    className={'category-pill' + (filterCategory === 'all' ? ' active' : '')}
                                    onClick={() => setFilterCategory('all')}
                                >
                                    All
                                </button>
                                <button
                                    className={'category-pill' + (filterCategory === 'uncategorized' ? ' active' : '')}
                                    onClick={() => setFilterCategory('uncategorized')}
                                >
                                    Uncategorized
                                </button>
                                {categories.map((cat) => (
                                    <button
                                        key={cat.id}
                                        className={'category-pill' + (filterCategory === cat.id ? ' active' : '')}
                                        onClick={() => setFilterCategory(cat.id)}
                                    >
                                        <span className="color-dot" style={{ background: cat.color }}></span>
                                        {cat.name}
                                    </button>
                                ))}
                                <button className="category-pill add-pill" onClick={() => setShowCategoryManager(true)}>+</button>
                            </div>
                        )}
                    </div>

                    <div className="notes-area" style={resolvePageBackground(settings.dashboardBackground)}>
                        {selectedFolderName ? <h2 className={'folder-selected-heading' + (dashboardBackgroundDark ? ' dark' : '')}>{selectedFolderName}</h2> : null}
                        {loading ? null : visibleNotes.length === 0 ? (
                            <div className="empty-state">
                                {dashboardViewMode === 'folders' && filterCategory === null ? (
                                    folderIconTheme.img ? (
                                        <img className="empty-state-icon-img" src={folderIconTheme.img} alt="" aria-hidden="true" />
                                    ) : (
                                        <div className="emoji">{folderIconTheme.all}</div>
                                    )
                                ) : (
                                    <div className="emoji">{searchQuery.trim() ? '🔍' : showPinnedOnly ? '📌' : '🗒️'}</div>
                                )}
                                {dashboardViewMode === 'folders' && filterCategory === null ? (
                                    <p>Select a folder above to view its notes.</p>
                                ) : searchQuery.trim() ? (
                                    <p>No notes match "{searchQuery.trim()}".</p>
                                ) : showPinnedOnly ? (
                                    <p>No pinned notes yet.<br/>Tap 📌 on a note to pin it.</p>
                                ) : (
                                    <p>No notes here yet.<br/>Tap + to create one.</p>
                                )}
                            </div>
                        ) : (
                            <div className="notes-grid">
                                {visibleNotes.map((note) => (
                                    <NoteCard
                                        key={note.id}
                                        note={note}
                                        noteCategories={(note.categoryIds || []).map(id => categoryById[id]).filter(Boolean)}
                                        onOpen={handleCardOpen}
                                        onTrash={trashNote}
                                        onTogglePin={togglePin}
                                        dragEnabled={filterCategory === 'all' && !selectMode && noteSortMode === 'manual'}
                                        isDragging={draggingId === note.id}
                                        onCardPointerDown={handleCardPointerDown}
                                        onCardPointerMove={handleCardPointerMove}
                                        onCardPointerUp={handleCardPointerUp}
                                        selectMode={selectMode}
                                        selected={selectedIds.includes(note.id)}
                                        onToggleSelect={toggleSelected}
                                    />
                                ))}
                            </div>
                        )}
                    </div>

                    <button
                        className="fab"
                        onClick={handleFabClick}
                        onContextMenu={(e) => e.preventDefault()}
                    >
                        +
                    </button>

                    {showTemplatePicker ? (
                        <TemplatePickerSheet
                            background={settings.dashboardBackground}
                            templates={templates}
                            onPick={createNoteFromTemplate}
                            onEditTemplate={(id) => { setShowTemplatePicker(false); setEditingTemplateId(id); }}
                            onDeleteTemplate={deleteTemplate}
                            onClose={() => setShowTemplatePicker(false)}
                        />
                    ) : null}

                    {showBatchCategory ? (
                        <BatchCategorySheet
                            background={settings.dashboardBackground}
                            categories={categories}
                            selectedNotes={notes.filter((n) => selectedIds.includes(n.id))}
                            onToggleCategory={batchToggleCategoryOnSelected}
                            onClose={() => { setShowBatchCategory(false); setSelectedIds([]); setSelectMode(false); }}
                        />
                    ) : null}

                    {showSortMenu ? (
                        <SortMenuSheet
                            background={settings.dashboardBackground}
                            value={noteSortMode}
                            onChange={updateNoteSortMode}
                            onClose={() => setShowSortMenu(false)}
                        />
                    ) : null}

                    {pendingUnlockNoteId ? (
                        <PinEntrySheet
                            title="Enter PIN"
                            message="This note is locked."
                            onConfirm={async (pin) => {
                                const ok = await verifyPin(pin);
                                if (ok) {
                                    setPinUnlockedThisSession(true);
                                    setActiveNoteId(pendingUnlockNoteId);
                                    setPendingUnlockNoteId(null);
                                }
                                return ok;
                            }}
                            onCancel={() => setPendingUnlockNoteId(null)}
                        />
                    ) : null}

                    {pinFlow === 'setup' ? (
                        <PinSetupSheet
                            title="Set a PIN"
                            onConfirm={async (pin) => { await setAppPin(pin); setPinFlow(null); }}
                            onCancel={() => setPinFlow(null)}
                        />
                    ) : null}

                    {pinFlow === 'change-verify' ? (
                        <PinEntrySheet
                            title="Enter current PIN"
                            onConfirm={async (pin) => {
                                const ok = await verifyPin(pin);
                                if (ok) setPinFlow('change-setup');
                                return ok;
                            }}
                            onCancel={() => setPinFlow(null)}
                            onForgotPin={() => { removeAppPin(); setPinFlow(null); }}
                        />
                    ) : null}

                    {pinFlow === 'change-setup' ? (
                        <PinSetupSheet
                            title="Set a new PIN"
                            onConfirm={async (pin) => { await setAppPin(pin); setPinFlow(null); }}
                            onCancel={() => setPinFlow(null)}
                        />
                    ) : null}

                    {pinFlow === 'remove-verify' ? (
                        <PinEntrySheet
                            title="Enter current PIN"
                            message="Removing the PIN leaves any locked notes unlocked until a new one is set."
                            onConfirm={async (pin) => {
                                const ok = await verifyPin(pin);
                                if (ok) { removeAppPin(); setPinFlow(null); }
                                return ok;
                            }}
                            onCancel={() => setPinFlow(null)}
                            onForgotPin={() => { removeAppPin(); setPinFlow(null); }}
                        />
                    ) : null}

                    {trashToast ? (
                        <div className="undo-toast">
                            <span>Note moved to trash</span>
                            <button onClick={() => undoTrashNote(trashToast)}>Undo</button>
                        </div>
                    ) : null}

                    {showCategoryManager ? (
                        <CategoryManagerSheet
                            background={settings.dashboardBackground}
                            categories={categories}
                            onAdd={addCategory}
                            onRename={renameCategory}
                            onChangeColor={changeCategoryColor}
                            onChangeFolderIcon={changeCategoryFolderIcon}
                            allFolderIcon={settings.allFolderIcon}
                            onChangeAllFolderIcon={updateAllFolderIcon}
                            uncategorizedFolderIcon={settings.uncategorizedFolderIcon}
                            onChangeUncategorizedFolderIcon={updateUncategorizedFolderIcon}
                            onDelete={(id) => setDeleteCategoryId(id)}
                            onClose={() => { setShowCategoryManager(false); setImportError(''); }}
                            draggingCategoryId={draggingCategoryId}
                            onHandlePointerDown={handleCategoryHandlePointerDown}
                            onHandlePointerMove={handleCategoryHandlePointerMove}
                            onHandlePointerUp={handleCategoryHandlePointerUp}
                            onExport={exportAllData}
                            onImportFile={handleImportFile}
                            importError={importError}
                            defaultNoteBackground={settings.defaultNoteBackground}
                            onChangeDefaultNoteBackground={updateDefaultNoteBackground}
                            dashboardBackground={settings.dashboardBackground}
                            onChangeDashboardBackground={updateDashboardBackground}
                            hasPin={!!settings.pinHash}
                            onStartPinSetup={() => { setShowCategoryManager(false); setPinFlow('setup'); }}
                            onStartPinChange={() => { setShowCategoryManager(false); setPinFlow('change-verify'); }}
                            onStartPinRemove={() => { setShowCategoryManager(false); setPinFlow('remove-verify'); }}
                            onOpenHelp={() => { setShowCategoryManager(false); setHelpView('menu'); }}
                            folderIconTheme={folderIconTheme}
                            onChangeFolderIconTheme={updateFolderIconTheme}
                            appIdentity={appIdentity}
                            onChangeAppIdentity={updateAppIdentity}
                            tableTemplates={settings.tableTemplates || []}
                            onRenameTableTemplate={renameTableTemplate}
                            onDeleteTableTemplate={(id) => setDeleteTableTemplateId(id)}
                            mileagePresetHidden={settings.mileagePresetHidden}
                            onHideMileagePreset={() => setDeleteTableTemplateId('__mileage__')}
                        />
                    ) : null}

                    {helpView === 'menu' ? (
                        <HelpMenuSheet
                            onSelectTopic={(id) => setHelpView(id)}
                            onClose={() => setHelpView(null)}
                        />
                    ) : null}

                    {helpView && helpView !== 'menu' ? (
                        <HelpDetailSheet
                            topic={HELP_TOPICS.find((t) => t.id === helpView)}
                            onBack={() => setHelpView('menu')}
                            onClose={() => setHelpView(null)}
                        />
                    ) : null}


                    {deleteCategoryId ? (
                        <ConfirmSheet
                            title="Delete category?"
                            message="Notes in this category will become uncategorized."
                            confirmLabel="Delete"
                            onCancel={() => setDeleteCategoryId(null)}
                            onConfirm={() => deleteCategory(deleteCategoryId)}
                        />
                    ) : null}

                    {deleteTableTemplateId ? (
                        <ConfirmSheet
                            title="Delete template?"
                            message={
                                deleteTableTemplateId === '__mileage__'
                                    ? 'The Mileage preset will no longer appear in "+ Add table". Existing tables built from it are unaffected.'
                                    : 'This saved column layout will be removed. Existing tables built from it are unaffected — only the reusable preset itself goes away.'
                            }
                            confirmLabel="Delete"
                            onCancel={() => setDeleteTableTemplateId(null)}
                            onConfirm={() => {
                                if (deleteTableTemplateId === '__mileage__') hideMileagePreset();
                                else deleteTableTemplate(deleteTableTemplateId);
                                setDeleteTableTemplateId(null);
                            }}
                        />
                    ) : null}

                    {pendingImport ? (
                        <ConfirmSheet
                            title="Import backup?"
                            message={'This will add ' + pendingImport.notes.length + ' note(s) and ' + pendingImport.categories.length + ' categor' + (pendingImport.categories.length === 1 ? 'y' : 'ies') + ' from the backup, overwriting any with matching IDs. Nothing else is removed.'}
                            confirmLabel="Import"
                            onCancel={() => setPendingImport(null)}
                            onConfirm={confirmImport}
                        />
                    ) : null}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            let swRegistration = null;

            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').then((reg) => {
                    swRegistration = reg;
                    // register() alone doesn't reliably re-check for a new
                    // worker on every launch — Android often resumes an
                    // installed PWA from a suspended process instead of a
                    // fresh navigation, which skips the browser's own update
                    // check entirely. Force one explicitly every time.
                    reg.update().catch(() => {});
                }).catch((err) => {
                    console.error('Service worker registration failed:', err);
                });
            });

            // Also force a check whenever the app becomes visible again
            // (e.g. switching back to it from the recent-apps list), which
            // covers the common case where the process never fully died.
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && swRegistration) {
                    swRegistration.update().catch(() => {});
                }
            });

            // With skipWaiting + clients.claim on the worker side, a new
            // version takes control of this already-open page automatically.
            // Reload once when that happens so the update is visible right
            // away instead of needing a manual close-and-reopen.
            let refreshingAfterUpdate = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshingAfterUpdate) return;
                refreshingAfterUpdate = true;
                window.location.reload();
            });
        }
    </script>
</body>
</html>
