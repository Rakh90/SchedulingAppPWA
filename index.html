        const LINE_TYPE_ICONS = [
            { type: 'text', icon: 'T' },
            { type: 'bulleted', icon: '•' },
            { type: 'numbered', icon: '#' },
            { type: 'checklist', icon: '☐' },
        ];

        // Caps how deep a bulleted/numbered/checklist line can nest via the
        // empty-line Enter cycle — a handful of levels is already more than
        // useful on a phone-width screen.
        const MAX_LINE_INDENT = 4;
        const LINE_INDENT_PX = 22;

        const MILEAGE_COLUMNS = ['Date', 'Start Point', 'End Point', 'Miles'];

        function csvEscapeCell(value) {
            const s = String(value == null ? '' : value);
            return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
        }

        function mileageTableToCsv(table) {
            const lines = [MILEAGE_COLUMNS.map(csvEscapeCell).join(',')];
            table.rows.forEach((row) => lines.push(row.cells.map(csvEscapeCell).join(',')));
            return lines.join('\r\n');
        }

        function downloadMileageCsv(table, noteTitle) {
            const csv = mileageTableToCsv(table);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const safeName = (noteTitle || 'mileage').trim().replace(/[^a-z0-9\-_ ]/gi, '').trim() || 'mileage';
            const a = document.createElement('a');
            a.href = url;
            a.download = safeName + '-mileage.csv';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Always-visible row next to the category dropdown that acts on whichever
        // line currently has editing focus. Every button uses onMouseDown +
        // preventDefault so tapping it never blurs (and thus never loses) the
        // active line — the same trick that keeps a text selection alive for
        // execCommand.
        function LineToolbar({ hasActiveLine, dateAvailable, activeType, activeFormats, onFormat, onToggleAllFormats, onSetType, onOpenSizeMenu, onOpenDatePicker }) {
            const runFormat = (tag) => (e) => {
                e.preventDefault();
                if (!hasActiveLine) return;
                onFormat(tag);
            };
            const runToggleAll = (e) => {
                e.preventDefault();
                if (!hasActiveLine) return;
                onToggleAllFormats();
            };
            // Pressing the already-active bullet/#/checkbox button again turns
            // the line back into plain text instead of just re-applying itself.
            const runType = (type) => (e) => {
                e.preventDefault();
                if (!hasActiveLine) return;
                onSetType(activeType === type && type !== 'text' ? 'text' : type);
            };
            const runSizeMenu = (e) => {
                e.preventDefault();
                if (!hasActiveLine) return;
                onOpenSizeMenu();
            };
            const allActive = activeFormats.b && activeFormats.i && activeFormats.u;
            return (
                <div className="line-toolbar">
                    <button className={'line-toolbar-btn' + (activeFormats.b ? ' active' : '')} disabled={!hasActiveLine} onMouseDown={runFormat('b')} title="Bold"><b>B</b></button>
                    <button className={'line-toolbar-btn' + (activeFormats.i ? ' active' : '')} disabled={!hasActiveLine} onMouseDown={runFormat('i')} title="Italic"><i>I</i></button>
                    <button className={'line-toolbar-btn' + (activeFormats.u ? ' active' : '')} disabled={!hasActiveLine} onMouseDown={runFormat('u')} title="Underline"><u>U</u></button>
                    <button className={'line-toolbar-btn line-toolbar-btn-all' + (allActive ? ' active' : '')} disabled={!hasActiveLine} onMouseDown={runToggleAll} title="Toggle all formats">BIU</button>
                    <span className="line-toolbar-divider"></span>
                    {LINE_TYPE_ICONS.map(({ type, icon }) => (
                        <button
                            key={type}
                            className={'line-toolbar-btn' + (activeType === type ? ' active' : '')}
                            disabled={!hasActiveLine}
                            onMouseDown={runType(type)}
                            title={type}
                        >
                            {icon}
                        </button>
                    ))}
                    <span className="line-toolbar-divider"></span>
                    <button className="line-toolbar-btn" disabled={!hasActiveLine} onMouseDown={runSizeMenu} title="Text size">Aa</button>
                    {/* This used to overlay a real, invisible <input
                        type="date"> here to trigger iOS/Android's native
                        date picker — abandoned after several rounds of
                        real-device iOS bugs (flash-open-then-auto-close with
                        today's date) that survived every gesture-timing fix
                        tried. Opens the app's own CalendarPickerSheet
                        instead, which sidesteps all of that: it's just
                        another sheet, like the size menu or background
                        picker, with no native picker quirks to fight. */}
                    <button
                        className="line-toolbar-btn"
                        disabled={!dateAvailable}
                        onMouseDown={(e) => { e.preventDefault(); if (dateAvailable) onOpenDatePicker(); }}
                        title="Insert date"
                    >📅</button>
                </div>
            );
        }

        function BlockLine({ block, isEditing, listNumber, isDragging, onStartEdit, onExitEdit, onCommit, onEnter, onBackspaceEmpty, onToggleChecked, onMarkerPointerDown, onMarkerPointerMove, onMarkerPointerUp }) {
            const editableRef = useRef(null);

            // Re-seed the contentEditable's DOM content every time this block enters
            // edit mode (not just on first mount) — otherwise re-opening a line for a
            // second edit would wipe it back to whatever it held the very first time.
            useEffect(() => {
                if (isEditing && editableRef.current) {
                    const el = editableRef.current;
                    el.innerHTML = block.html;
                    el.focus();
                    placeCursorAtDeepestEnd(el);
                }
            }, [isEditing]);

            const handleBlur = (e) => {
                onCommit(block.id, e.currentTarget.innerHTML);
                // Only clear edit state if it's still pointing at this block — Enter
                // may have already moved it to a newly created block by the time this
                // (async, focus-shift-triggered) blur fires.
                onExitEdit(block.id);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    onCommit(block.id, e.currentTarget.innerHTML);
                    onEnter(block.id);
                } else if (e.key === 'Backspace') {
                    const empty = e.currentTarget.innerText.trim() === '';
                    if (empty) {
                        e.preventDefault();
                        onBackspaceEmpty(block.id);
                    }
                }
            };

            // A press-and-hold on the marker (checkbox/bullet/number) reorders the
            // line, exactly like a quick tap still toggles the checkbox — the same
            // long-press-vs-tap trick used for dragging note cards and category
            // rows. This keeps the text itself untouched by drag handling entirely.
            const markerDragProps = {
                style: { touchAction: 'none' },
                onPointerDown: (e) => onMarkerPointerDown(e, block.id),
                onPointerMove: onMarkerPointerMove,
                onPointerUp: onMarkerPointerUp,
                onPointerCancel: onMarkerPointerUp,
            };

            const marker = block.type === 'checklist' ? (
                <button
                    className={'checkbox-marker' + (block.checked ? ' checked' : '')}
                    onMouseDown={(e) => e.preventDefault()}
                    onClick={() => onToggleChecked(block.id)}
                    {...markerDragProps}
                >
                    {block.checked ? '✓' : ''}
                </button>
            ) : block.type === 'numbered' ? (
                <span className="list-item-marker" {...markerDragProps}>{listNumber}.</span>
            ) : block.type === 'bulleted' ? (
                <span className="list-item-marker" {...markerDragProps}>•</span>
            ) : (
                <span className="list-item-marker" {...markerDragProps}></span>
            );

            const sizeClass = ' block-size-' + (block.size || 'medium');
            return (
                <div
                    className={'block-row' + (isDragging ? ' dragging' : '')}
                    data-block-id={block.id}
                    style={{ marginLeft: (block.indent || 0) * LINE_INDENT_PX }}
                >
                    {marker}
                    {isEditing ? (
                        <div
                            ref={editableRef}
                            className={'block-editable' + sizeClass}
                            data-block-id={block.id}
                            contentEditable
                            suppressContentEditableWarning
                            onBlur={handleBlur}
                            onKeyDown={handleKeyDown}
                        />
                    ) : (
                        <div
                            className={'block-display' + sizeClass + (block.type === 'checklist' && block.checked ? ' checked' : '')}
                            onClick={(e) => { if (e.target.tagName === 'A') return; onStartEdit(); }}
                            dangerouslySetInnerHTML={{ __html: stripHtml(block.html).trim() ? linkify(block.html) : '<span class="block-placeholder">...</span>' }}
                        />
                    )}
                </div>
            );
        }

        function NoteEditor({ note, categories, onBack, onSave, onTrash, onAddCategory, onSaveTemplate, templates, isTemplate, hasPin, onSetPin, editorIconOrder, onChangeEditorIconOrder }) {
            const [draft, setDraft] = useState(note);
            const [editingBlockId, setEditingBlockId] = useState(null);
            const [confirmTrash, setConfirmTrash] = useState(false);
            const [previewPhoto, setPreviewPhoto] = useState(null);
            const [uploading, setUploading] = useState(false);
            const [dateCellActive, setDateCellActive] = useState(false);
            const [confirmRemoveRow, setConfirmRemoveRow] = useState(false);
            const [removedRowToast, setRemovedRowToast] = useState(null);
            const [showCategoryPicker, setShowCategoryPicker] = useState(false);
            const [showSaveTemplate, setShowSaveTemplate] = useState(false);
            const [showTemplateMenu, setShowTemplateMenu] = useState(false);
            const [showBackgroundPicker, setShowBackgroundPicker] = useState(false);
            const [showPinSetup, setShowPinSetup] = useState(false);
            // Holds which block the size menu applies to, captured at the moment
            // it's opened — by the time a row inside it is clicked, the block has
            // already blurred out of edit mode (clicking anything outside a
            // contentEditable blurs it) and editingBlockId would already be null.
            const [textSizeMenuBlockId, setTextSizeMenuBlockId] = useState(null);
            // Lets the single date-insert button in the line toolbar also work
            // for the title field: it decides where to insert by checking
            // document.activeElement at click time (reliable, since the button
            // uses onMouseDown+preventDefault to avoid stealing focus), and this
            // state just controls whether the button looks enabled while the
            // title — rather than a body line — is what's focused.
            const [titleFocused, setTitleFocused] = useState(false);
            const [copiedFlash, setCopiedFlash] = useState(false);
            const copiedFlashTimer = useRef(null);
            const [draggingBlockId, setDraggingBlockId] = useState(null);
            const cameraInputRef = useRef(null);
            const galleryInputRef = useRef(null);
            const filesInputRef = useRef(null);
            const titleInputRef = useRef(null);
            const mileageTableRef = useRef(null);
            const saveTimer = useRef(null);
            const removedRowToastTimer = useRef(null);
            const blockDragRef = useRef({ pointerId: null, blockId: null, timer: null, dragging: false, startX: 0, startY: 0 });
            const justDraggedBlockRef = useRef(false);
            // One shared CalendarPickerSheet serves the body line toolbar,
            // the title field, and the mileage table's date column. This
            // holds where a picked date should land, captured at the moment
            // the sheet opens (not read live later) — opening the sheet can
            // blur out of a line's edit mode or a text selection well before
            // the user actually picks a date, so reading state live in the
            // pick handler isn't reliable. One of:
            //   { kind: 'block', blockId, offset, html }
            //   { kind: 'title', selStart, selEnd, value }
            //   { kind: 'mileage', rowId }
            const dateTargetRef = useRef(null);
            const [showDatePickerSheet, setShowDatePickerSheet] = useState(false);
            // Set right after inserting a date, so the follow-up effect that
            // re-enters edit mode on this block can land the caret just past the
            // inserted text instead of wherever placeCursorAtDeepestEnd puts it.
            const pendingCaretOffsetRef = useRef(null);
            // In-memory-only undo stack for this editing session (not persisted) —
            // one snapshot per line-level action (a line committed, added, removed,
            // retyped, reformatted, checked, reordered, or a photo added/removed),
            // not per keystroke.
            const editHistoryRef = useRef([]);
            const [canUndoEdit, setCanUndoEdit] = useState(false);
            // Tracks whether the line Enter was just pressed on is the same
            // still-empty bulleted/numbered/checklist line as last time, so a
            // second consecutive Enter on it indents instead of creating yet
            // another empty line, and a third gives up on the list entirely.
            // Reset (blockId: null) the moment anything else happens to it.
            const emptyEnterRef = useRef({ blockId: null, indented: false });
            // Set when a mileage date is picked with no cell active and the
            // note had no table yet — MileageTable only mounts once
            // draft.table exists, so mileageTableRef.current is still null
            // at the exact moment the new row's setDraft call is queued.
            // The effect below waits for the table to actually show up
            // before asking MileageTable to focus the new row.
            const pendingMileageFocusRowIdRef = useRef(null);

            // Hardware/gesture back button: closes whichever sheet is open,
            // or — if nothing is — leaves the editor the same as tapping ←.
            useBackClose(true, onBack);
            useBackClose(confirmRemoveRow, () => setConfirmRemoveRow(false));
            useBackClose(!!previewPhoto, () => setPreviewPhoto(null));
            useBackClose(showBackgroundPicker, () => setShowBackgroundPicker(false));
            useBackClose(!!textSizeMenuBlockId, () => setTextSizeMenuBlockId(null));
            useBackClose(showPinSetup, () => setShowPinSetup(false));
            useBackClose(showTemplateMenu, () => setShowTemplateMenu(false));
            useBackClose(showSaveTemplate, () => setShowSaveTemplate(false));
            useBackClose(confirmTrash, () => setConfirmTrash(false));
            useBackClose(showCategoryPicker, () => setShowCategoryPicker(false));
            useBackClose(showDatePickerSheet, () => setShowDatePickerSheet(false));

            const resolvedEditorIconOrder = resolveIconOrder(editorIconOrder, DEFAULT_EDITOR_ICON_ORDER);
            const editorIconDrag = useIconReorder(resolvedEditorIconOrder, (order) => onChangeEditorIconOrder && onChangeEditorIconOrder(order));

            useEffect(() => {
                if (saveTimer.current) clearTimeout(saveTimer.current);
                saveTimer.current = setTimeout(() => {
                    onSave({ ...draft, updatedAt: Date.now() });
                }, 350);
                return () => clearTimeout(saveTimer.current);
            }, [draft]);

            const updateField = (field, value) => setDraft((d) => ({ ...d, [field]: value }));

            // Call before applying a line-level change to snapshot what the note
            // looked like just prior, so undoLastEdit can step back to it. Title,
            // background, and categoryIds are included too since
            // loadTemplateIntoDraft changes those alongside blocks/photos —
            // every other call site leaves them untouched, so snapshotting
            // them there is a no-op.
            const pushEditHistory = () => {
                editHistoryRef.current.push({ title: draft.title, blocks: draft.blocks, photos: draft.photos, background: draft.background, categoryIds: draft.categoryIds });
                if (editHistoryRef.current.length > 25) editHistoryRef.current.shift();
                setCanUndoEdit(true);
            };

            const undoLastEdit = () => {
                const prev = editHistoryRef.current.pop();
                if (!prev) return;
                setDraft((d) => ({ ...d, title: prev.title, blocks: prev.blocks, photos: prev.photos, background: prev.background, categoryIds: prev.categoryIds }));
                setEditingBlockId(null);
                setCanUndoEdit(editHistoryRef.current.length > 0);
            };

            const toggleDraftCategory = (id) => {
                setDraft((d) => {
                    const current = d.categoryIds || [];
                    const next = current.includes(id) ? current.filter(c => c !== id) : [...current, id];
                    return { ...d, categoryIds: next };
                });
            };

            const createAndSelectCategory = (name, color) => {
                const id = onAddCategory(name, color);
                setDraft((d) => ({ ...d, categoryIds: [...(d.categoryIds || []), id] }));
            };

            const commitBlockHtml = (blockId, rawHtml) => {
                const clean = stripZeroWidthSpace(sanitizeInlineHtml(rawHtml));
                const current = draft.blocks.find(b => b.id === blockId);
                if (current && current.html === clean) return;
                pushEditHistory();
                setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, html: clean } : b) }));
            };

            const setBlockType = (blockId, type) => {
                const current = draft.blocks.find(b => b.id === blockId);
                if (current && current.type === type) return;
                pushEditHistory();
                setDraft((d) => ({
                    ...d,
                    blocks: d.blocks.map((b) => b.id === blockId
                        ? { ...b, type, checked: type === 'checklist' ? !!b.checked : false }
                        : b),
                }));
            };

            const setBlockSize = (blockId, size) => {
                const current = draft.blocks.find(b => b.id === blockId);
                if (current && (current.size || 'medium') === size) return;
                pushEditHistory();
                setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, size } : b) }));
            };

            // These "open" functions stash where a picked date should land in
            // dateTargetRef, then open the shared CalendarPickerSheet. An
            // earlier design overlaid a real, invisible native <input
            // type="date"> on each button instead — that worked on Android,
            // but went through several rounds of real-device iOS failures
            // (the native picker would flash open and immediately auto-close
            // with today's date) that survived every gesture-timing fix
            // tried. The sheet sidesteps that entire class of bug: it's just
            // another sheet, like the size menu or background picker, with
            // no native picker for iOS to quietly sabotage.
            const openDateSheetForBlock = () => {
                if (!editingBlockId) return;
                const el = document.querySelector('.block-editable[data-block-id="' + editingBlockId + '"]');
                if (!el) return;
                dateTargetRef.current = {
                    kind: 'block',
                    blockId: editingBlockId,
                    offset: getCaretCharOffset(el),
                    html: sanitizeInlineHtml(el.innerHTML),
                };
                setShowDatePickerSheet(true);
            };

            const openDateSheetForTitle = () => {
                const el = titleInputRef.current;
                if (!el) return;
                dateTargetRef.current = {
                    kind: 'title',
                    selStart: el.selectionStart == null ? draft.title.length : el.selectionStart,
                    selEnd: el.selectionEnd == null ? draft.title.length : el.selectionEnd,
                    value: draft.title,
                };
                setShowDatePickerSheet(true);
            };

            // One button (in the line toolbar) serves both the title field
            // and body lines. It uses onMouseDown+preventDefault, like every
            // other line-toolbar button, so document.activeElement is still
            // whichever of the two was actually focused when this runs —
            // reliably saying which one to target — and opening the sheet
            // never blurs the field in the first place.
            const openDateSheetSmart = () => {
                const active = document.activeElement;
                if (active && active.classList && active.classList.contains('editor-title-input')) {
                    openDateSheetForTitle();
                } else if (editingBlockId) {
                    openDateSheetForBlock();
                }
            };

            // Mirrors the "Today" button: if a Date cell is currently
            // focused, target it directly. Otherwise leave rowId null and
            // let applyPickedDate add a fresh row once a date is actually
            // picked.
            const openDateSheetForMileage = () => {
                const table = mileageTableRef.current;
                const active = table && table.getActiveDateCell ? table.getActiveDateCell() : null;
                dateTargetRef.current = { kind: 'mileage', rowId: active ? active.rowId : null };
                setShowDatePickerSheet(true);
            };

            // Applies the picked date to whichever target openDateSheetFor*
            // stashed in dateTargetRef — a body line (splicing into the plain
            // text at the saved caret offset, then re-wrapping in whatever
            // bold/italic/underline chain the line already had — formatting is
            // always whole-line, never partial, so this is safe), the title
            // field, or a mileage table date cell. isoDateStr is the sheet's
            // own 'YYYY-MM-DD' value, or null if the sheet was dismissed
            // without picking anything.
            const applyPickedDate = (isoDateStr) => {
                setShowDatePickerSheet(false);
                const target = dateTargetRef.current;
                dateTargetRef.current = null;
                if (!isoDateStr || !target) return;
                const dateStr = new Date(isoDateStr + 'T00:00:00').toLocaleDateString();

                if (target.kind === 'block') {
                    const { blockId, html: sourceHtml } = target;
                    if (!draft.blocks.some(b => b.id === blockId)) return;
                    const plain = stripHtml(sourceHtml);
                    const offset = target.offset == null ? plain.length : Math.min(target.offset, plain.length);
                    const newPlain = plain.slice(0, offset) + dateStr + plain.slice(offset);
                    const chain = getWholeLineTagChain(sourceHtml);
                    const newHtml = wrapInTagChain(escapeHtml(newPlain), chain);
                    const caretTarget = offset + dateStr.length;
                    pushEditHistory();
                    setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, html: newHtml } : b) }));
                    // The day button in the sheet uses onMouseDown+preventDefault
                    // so the line normally never blurs out of edit mode while
                    // picking, but just in case: if the editable DOM node is
                    // still right there, update it directly —
                    // React won't otherwise touch a contentEditable's innerHTML on
                    // re-render, and the reseed effect below only fires on an edit
                    // mode *transition*, which won't happen if focus never left.
                    const liveEl = document.querySelector('.block-editable[data-block-id="' + blockId + '"]');
                    if (liveEl) {
                        liveEl.innerHTML = newHtml;
                        liveEl.focus();
                        setCaretCharOffset(liveEl, caretTarget);
                    } else {
                        pendingCaretOffsetRef.current = caretTarget;
                    }
                    setEditingBlockId(blockId);
                    return;
                }

                if (target.kind === 'title') {
                    const { selStart, selEnd, value } = target;
                    const newTitle = value.slice(0, selStart) + dateStr + value.slice(selEnd);
                    updateField('title', newTitle);
                    const caretTarget = selStart + dateStr.length;
                    // Same reasoning as the block case: refocus and restore
                    // the caret defensively, in case anything did blur it.
                    requestAnimationFrame(() => {
                        const el = titleInputRef.current;
                        if (el) { el.focus(); el.setSelectionRange(caretTarget, caretTarget); }
                    });
                    return;
                }

                if (target.kind === 'mileage') {
                    if (target.rowId) {
                        // Individual cell edits (typing, the Today button)
                        // aren't part of the line-undo system either — stay
                        // consistent.
                        updateMileageCell(target.rowId, 0, dateStr);
                        const rowIdx = draft.table ? draft.table.rows.findIndex(r => r.id === target.rowId) : -1;
                        if (rowIdx !== -1 && mileageTableRef.current) {
                            mileageTableRef.current.focusRowCell(rowIdx, 1);
                        }
                    } else {
                        // No cell was focused when the sheet opened — add a
                        // fresh row with the picked date already in it. If
                        // this is the note's first-ever mileage row, MileageTable
                        // hasn't mounted yet (it only renders once
                        // draft.table exists) — queue the focus request and
                        // let the effect below resolve it once that happens.
                        const newRowId = makeId();
                        setDraft((d) => {
                            const t = d.table || { columns: MILEAGE_COLUMNS, rows: [] };
                            const newRow = { id: newRowId, cells: [dateStr, '', '', ''] };
                            return { ...d, table: { ...t, rows: [...t.rows, newRow] } };
                        });
                        pendingMileageFocusRowIdRef.current = newRowId;
                    }
                }
            };

            // Covers the case where something *did* blur the line out of edit
            // mode: re-entering edit mode from applyPickedDate re-triggers
            // BlockLine's own effect (which reseeds the DOM and places the
            // caret at the end) — this runs after that child effect and
            // moves the caret to just past the inserted date.
            useEffect(() => {
                if (pendingCaretOffsetRef.current == null || !editingBlockId) return;
                const el = document.querySelector('.block-editable[data-block-id="' + editingBlockId + '"]');
                if (el) setCaretCharOffset(el, pendingCaretOffsetRef.current);
                pendingCaretOffsetRef.current = null;
            }, [editingBlockId]);

            // Resolves a mileage focus-advance request queued against a row
            // that didn't exist as a rendered cell yet at the time it was
            // requested (see pendingMileageFocusRowIdRef) — runs again on
            // every table change until the row (and MileageTable itself, if
            // this was the first-ever row) actually shows up.
            useEffect(() => {
                if (!pendingMileageFocusRowIdRef.current || !mileageTableRef.current || !draft.table) return;
                const rowIdx = draft.table.rows.findIndex(r => r.id === pendingMileageFocusRowIdRef.current);
                if (rowIdx === -1) return;
                mileageTableRef.current.focusRowCell(rowIdx, 1);
                pendingMileageFocusRowIdRef.current = null;
            }, [draft.table]);

            // Reads the live DOM (not stale React state) so a format toggle picks up
            // whatever was just typed, then writes the result straight back into the
            // DOM and refocuses — see the note above toggleWholeLineFormat for why
            // this avoids execCommand entirely.
            const toggleLineFormat = (tag) => {
                if (!editingBlockId) return;
                const el = document.querySelector('.block-editable');
                if (!el) return;
                const newHtml = sanitizeInlineHtml(toggleWholeLineFormat(el.innerHTML, tag));
                el.innerHTML = newHtml;
                el.focus();
                placeCursorAtDeepestEnd(el);
                const blockId = editingBlockId;
                pushEditHistory();
                setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, html: newHtml } : b) }));
            };

            // Master toggle: if all three are already on, turn all three off;
            // otherwise turn on whichever of the three aren't already active.
            const toggleAllFormats = () => {
                if (!editingBlockId) return;
                const el = document.querySelector('.block-editable');
                if (!el) return;
                const allActive = ['b', 'i', 'u'].every((tag) => hasWholeLineTag(el.innerHTML, tag));
                let html = el.innerHTML;
                ['b', 'i', 'u'].forEach((tag) => {
                    const has = hasWholeLineTag(html, tag);
                    if (allActive === has) {
                        html = toggleWholeLineFormat(html, tag);
                    }
                });
                const newHtml = sanitizeInlineHtml(html);
                el.innerHTML = newHtml;
                el.focus();
                placeCursorAtDeepestEnd(el);
                const blockId = editingBlockId;
                pushEditHistory();
                setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, html: newHtml } : b) }));
            };

            const toggleChecked = (blockId) => {
                // A drag release fires a synthetic click right after — swallow that
                // one so picking a checklist item up and dropping it never also
                // flips its checked state.
                if (justDraggedBlockRef.current) {
                    justDraggedBlockRef.current = false;
                    return;
                }
                pushEditHistory();
                setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, checked: !b.checked } : b) }));
            };

            const uncheckAll = () => {
                pushEditHistory();
                setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.type === 'checklist' && b.checked ? { ...b, checked: false } : b) }));
            };

            const copyContent = async () => {
                try {
                    await navigator.clipboard.writeText(noteToPlainText(draft));
                    if (copiedFlashTimer.current) clearTimeout(copiedFlashTimer.current);
                    setCopiedFlash(true);
                    copiedFlashTimer.current = setTimeout(() => setCopiedFlash(false), 1500);
                } catch (err) {
                    // Clipboard permission denied or unavailable — nothing
                    // useful to do beyond not pretending it worked.
                }
            };

            const reorderBlocks = (blocks, draggedId, targetId) => {
                const dragIdx = blocks.findIndex(b => b.id === draggedId);
                const targetIdx = blocks.findIndex(b => b.id === targetId);
                if (dragIdx === -1 || targetIdx === -1) return blocks;
                const reordered = [...blocks];
                const [moved] = reordered.splice(dragIdx, 1);
                reordered.splice(targetIdx, 0, moved);
                return reordered;
            };

            // Long-press-and-drag on a line's marker (checkbox/bullet/number)
            // reorders it — the same timer-based long-press-vs-tap trick used for
            // dragging note cards and category rows, so a quick tap still just
            // toggles the checkbox instead of starting a drag.
            const handleMarkerPointerDown = (e, blockId) => {
                e.currentTarget.setPointerCapture(e.pointerId);
                blockDragRef.current = { pointerId: e.pointerId, blockId, timer: null, dragging: false, startX: e.clientX, startY: e.clientY };
                blockDragRef.current.timer = setTimeout(() => {
                    blockDragRef.current.dragging = true;
                    setDraggingBlockId(blockId);
                    pushEditHistory();
                    if (navigator.vibrate) navigator.vibrate(12);
                }, 450);
            };

            const handleMarkerPointerMove = (e) => {
                if (blockDragRef.current.pointerId !== e.pointerId || !blockDragRef.current.blockId) return;
                if (!blockDragRef.current.dragging) {
                    const dx = Math.abs(e.clientX - blockDragRef.current.startX);
                    const dy = Math.abs(e.clientY - blockDragRef.current.startY);
                    if (dx > 14 || dy > 14) {
                        clearTimeout(blockDragRef.current.timer);
                        blockDragRef.current.blockId = null;
                    }
                    return;
                }
                e.preventDefault();
                const el = document.elementFromPoint(e.clientX, e.clientY);
                const rowEl = el && el.closest('[data-block-id]');
                const targetId = rowEl && rowEl.getAttribute('data-block-id');
                if (targetId && targetId !== blockDragRef.current.blockId) {
                    setDraft((d) => ({ ...d, blocks: reorderBlocks(d.blocks, blockDragRef.current.blockId, targetId) }));
                }
            };

            const handleMarkerPointerUp = () => {
                clearTimeout(blockDragRef.current.timer);
                if (blockDragRef.current.dragging) {
                    justDraggedBlockRef.current = true;
                }
                blockDragRef.current = { pointerId: null, blockId: null, timer: null, dragging: false, startX: 0, startY: 0 };
                setDraggingBlockId(null);
            };

            // Bulleted/numbered/checklist lines get a 3-stage Enter cycle on
            // an EMPTY line: 1st Enter (line has content) — normal, moves to
            // a new line of the same type/indent. 2nd Enter (that new line
            // is still empty) — indents it a level instead of adding yet
            // another line. 3rd Enter (still empty, already indented) —
            // gives up on the list and turns it into a plain text line.
            // emptyEnterRef distinguishes "1st time landing on this empty
            // line" from "2nd consecutive Enter on it", since a fresh empty
            // list line and an already-indented-but-still-empty one are
            // otherwise indistinguishable from block state alone. Reads the
            // live DOM (not draft.blocks) for the emptiness check — the
            // block's html in state doesn't get updated until blur/commit,
            // which BlockLine's onKeyDown does *just* before calling this,
            // but that update is async and hasn't landed in this closure's
            // `draft` yet.
            const handleEnter = (blockId) => {
                const current = draft.blocks.find(b => b.id === blockId);
                if (!current) return;
                const isListType = current.type === 'bulleted' || current.type === 'numbered' || current.type === 'checklist';
                const liveEl = document.querySelector('.block-editable[data-block-id="' + blockId + '"]');
                const isEmpty = stripHtml(liveEl ? liveEl.innerHTML : current.html).trim() === '';

                if (isListType && isEmpty) {
                    const alreadyIndentedThisLine = emptyEnterRef.current.blockId === blockId && emptyEnterRef.current.indented;
                    if (!alreadyIndentedThisLine) {
                        const nextIndent = Math.min((current.indent || 0) + 1, MAX_LINE_INDENT);
                        if (nextIndent !== (current.indent || 0)) {
                            pushEditHistory();
                            setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, indent: nextIndent } : b) }));
                        }
                        emptyEnterRef.current = { blockId, indented: true };
                        return;
                    }
                    pushEditHistory();
                    setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, type: 'text', indent: 0 } : b) }));
                    emptyEnterRef.current = { blockId: null, indented: false };
                    return;
                }

                emptyEnterRef.current = { blockId: null, indented: false };
                const newId = makeId();
                pushEditHistory();
                setDraft((d) => {
                    const idx = d.blocks.findIndex(b => b.id === blockId);
                    const blocks = [...d.blocks];
                    const chain = getWholeLineTagChain(current.html);
                    const newHtml = chain.length > 0 ? wrapInTagChain(ZWSP, chain) : '';
                    blocks.splice(idx + 1, 0, { id: newId, type: current.type, html: newHtml, checked: false, size: current.size, indent: current.indent });
                    return { ...d, blocks };
                });
                setEditingBlockId(newId);
            };

            // Mirrors the Enter cycle in reverse for an indented, empty
            // bulleted/numbered/checklist line: Backspace steps the indent
            // down one level at a time; once it's back at 0, the next
            // Backspace gives up on the list and converts it to plain text
            // (matching the Enter cycle's own "give up" step) — only once
            // it's a plain, unindented, empty text line does Backspace fall
            // through to the original behavior of deleting the line and
            // merging into the previous one.
            const handleBackspaceEmpty = (blockId) => {
                const current = draft.blocks.find(b => b.id === blockId);
                if (!current) return;
                // Any Backspace on an empty line invalidates whatever the
                // Enter cycle above was tracking for it — otherwise a stray
                // stale "already indented this line" flag could make the
                // *next* Enter press skip straight to converting to text
                // instead of indenting again.
                if (emptyEnterRef.current.blockId === blockId) emptyEnterRef.current = { blockId: null, indented: false };

                const isListType = current.type === 'bulleted' || current.type === 'numbered' || current.type === 'checklist';
                const indent = current.indent || 0;

                if (isListType && indent > 0) {
                    pushEditHistory();
                    setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, indent: indent - 1 } : b) }));
                    return;
                }
                if (isListType && indent === 0) {
                    pushEditHistory();
                    setDraft((d) => ({ ...d, blocks: d.blocks.map(b => b.id === blockId ? { ...b, type: 'text' } : b) }));
                    return;
                }

                if (draft.blocks.length <= 1) return;
                const idx = draft.blocks.findIndex(b => b.id === blockId);
                const nextFocusId = draft.blocks[idx - 1] ? draft.blocks[idx - 1].id : (draft.blocks[idx + 1] ? draft.blocks[idx + 1].id : null);
                pushEditHistory();
                setDraft((d) => ({ ...d, blocks: d.blocks.filter(b => b.id !== blockId) }));
                setEditingBlockId(nextFocusId);
            };

            // Reads the live DOM of the block currently being edited so we don't
            // rely on a stale React state snapshot when leaving edit mode.
            const getFlushedDraft = () => {
                const el = document.activeElement;
                if (el && el.classList && el.classList.contains('block-editable')) {
                    const blockId = el.getAttribute('data-block-id');
                    if (blockId) {
                        const clean = stripZeroWidthSpace(sanitizeInlineHtml(el.innerHTML));
                        return { ...draft, blocks: draft.blocks.map(b => b.id === blockId ? { ...b, html: clean } : b) };
                    }
                }
                return draft;
            };

            const handleAddPhotos = async (e) => {
                // The Files picker (unlike Gallery) has no accept restriction, so it
                // can return non-image files if someone browses into a folder full
                // of documents — filter those out instead of trying to render them.
                const files = Array.from(e.target.files || []).filter(f => f.type.startsWith('image/'));
                if (files.length === 0) return;
                pushEditHistory();
                setUploading(true);
                try {
                    const newPhotos = [];
                    for (const file of files) {
                        const raw = await readFileAsDataUrl(file);
                        const resized = await resizeImage(raw, 1280, 0.82);
                        newPhotos.push({ id: makeId(), dataUrl: resized });
                    }
                    setDraft((d) => ({ ...d, photos: [...d.photos, ...newPhotos] }));
                } finally {
                    setUploading(false);
                    if (cameraInputRef.current) cameraInputRef.current.value = '';
                    if (galleryInputRef.current) galleryInputRef.current.value = '';
                    if (filesInputRef.current) filesInputRef.current.value = '';
                }
            };

            const removePhoto = (id) => {
                pushEditHistory();
                setDraft((d) => ({ ...d, photos: d.photos.filter(p => p.id !== id) }));
            };

            // Replaces this note's content with a saved template's — reversible
            // via the Undo button, so there's no need for a separate "are you
            // sure" confirmation on top of that.
            const loadTemplateIntoDraft = (template) => {
                pushEditHistory();
                const blocks = (template.blocks && template.blocks.length > 0 ? template.blocks : [{ type: 'text', html: '' }])
                    .map((b) => ({ id: makeId(), type: b.type, html: b.html || '', checked: false }));
                const table = template.table
                    ? { columns: template.table.columns, rows: template.table.rows.map((r) => ({ id: makeId(), cells: [...r.cells] })) }
                    : null;
                const photos = (template.photos || []).map((p) => ({ id: makeId(), dataUrl: p.dataUrl }));
                setDraft((d) => ({
                    ...d,
                    title: template.name || d.title,
                    blocks,
                    table,
                    photos,
                    background: template.background || d.background,
                    categoryIds: (template.categoryIds && template.categoryIds.length > 0) ? template.categoryIds : d.categoryIds,
                }));
                setEditingBlockId(null);
                setShowTemplateMenu(false);
            };

            // Also creates the table (with these fixed mileage columns) on its
            // first press if one doesn't exist yet on this note.
            const addMileageRow = () => {
                setDraft((d) => {
                    const table = d.table || { columns: MILEAGE_COLUMNS, rows: [] };
                    const newRow = { id: makeId(), cells: ['', '', '', ''] };
                    return { ...d, table: { ...table, rows: [...table.rows, newRow] } };
                });
            };

            // Used by the Today button when no date cell is currently
            // focused: rather than doing nothing, add a fresh row pre-filled
            // with today's date instead of an empty one.
            const addMileageRowWithToday = () => {
                const todayStr = new Date().toLocaleDateString();
                const newRowIdx = draft.table ? draft.table.rows.length : 0;
                setDraft((d) => {
                    const table = d.table || { columns: MILEAGE_COLUMNS, rows: [] };
                    const newRow = { id: makeId(), cells: [todayStr, '', '', ''] };
                    return { ...d, table: { ...table, rows: [...table.rows, newRow] } };
                });
                if (mileageTableRef.current) {
                    mileageTableRef.current.focusRowCell(newRowIdx, 1);
                }
            };

            const removeLastMileageRow = () => {
                setDraft((d) => {
                    if (!d.table || d.table.rows.length === 0) return d;
                    const removed = d.table.rows[d.table.rows.length - 1];
                    if (removedRowToastTimer.current) clearTimeout(removedRowToastTimer.current);
                    setRemovedRowToast(removed);
                    removedRowToastTimer.current = setTimeout(() => setRemovedRowToast(null), 5000);
                    return { ...d, table: { ...d.table, rows: d.table.rows.slice(0, -1) } };
                });
            };

            const undoRemoveRow = () => {
                if (removedRowToastTimer.current) clearTimeout(removedRowToastTimer.current);
                setRemovedRowToast(null);
                setDraft((d) => {
                    if (!removedRowToast || !d.table) return d;
                    return { ...d, table: { ...d.table, rows: [...d.table.rows, removedRowToast] } };
                });
            };

            const updateMileageCell = (rowId, cellIndex, value) => {
                setDraft((d) => {
                    if (!d.table) return d;
                    return {
                        ...d,
                        table: {
                            ...d.table,
                            rows: d.table.rows.map(r => r.id === rowId
                                ? { ...r, cells: r.cells.map((c, i) => i === cellIndex ? value : c) }
                                : r),
                        },
                    };
                });
            };

            const handleBack = () => {
                const finalDraft = getFlushedDraft();
                onSave({ ...finalDraft, updatedAt: Date.now() });
                onBack();
            };

            const listNumbers = computeListNumbers(draft.blocks);
            const activeBlock = editingBlockId ? draft.blocks.find(b => b.id === editingBlockId) : null;
            const activeFormats = activeBlock
                ? { b: hasWholeLineTag(activeBlock.html, 'b'), i: hasWholeLineTag(activeBlock.html, 'i'), u: hasWholeLineTag(activeBlock.html, 'u') }
                : { b: false, i: false, u: false };
